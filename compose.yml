# =============================================================================
# Postgres Dev Environment — docker compose
# Multi-arch: no `platform:` pin; Docker pulls the matching manifest per host.
# =============================================================================
services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    image: postgres-dev:local
    container_name: postgres-dev
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5499:5499"
    volumes:
      - ./volumes/data:/var/lib/pgsql/data
      - ./volumes/logs:/var/log/postgresql
      - ./config:/etc/postgresql:ro
      - ./initdb:/docker-entrypoint-initdb.d:ro
      # Barman storage — basebackups and WAL archives. Persists outside the
      # container so backups survive image rebuilds and `compose down -v`.
      - ./backups:/var/lib/barman
    # Memory budget — postgres + barman receive-wal + cron + python tooling.
    # Bumped from 512m (S5) to fit the additional barman footprint (S17).
    mem_limit: 768m
    mem_reservation: 384m
    # Healthcheck: real-query as admin (proves init scripts ran AND auth works).
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$$POSTGRES_ADMIN_PASSWORD psql -h 127.0.0.1 -p 5499 -U admin -d postgres -tAc 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
