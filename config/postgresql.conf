# =============================================================================
# Postgres Dev Environment — postgresql.conf
# Mounted at /etc/postgresql/postgresql.conf, loaded via:
#   postgres -c config_file=/etc/postgresql/postgresql.conf
# =============================================================================

# --- Connections -------------------------------------------------------------
listen_addresses = '*'
port = 5499
max_connections = 50

# --- Authentication ----------------------------------------------------------
password_encryption = scram-sha-256

# --- HBA ---------------------------------------------------------------------
hba_file = '/etc/postgresql/pg_hba.conf'

# --- Memory ------------------------------------------------------------------
# Sized for a 512 MiB container budget (compose mem_limit).
shared_buffers = 128MB                  # ~25% of container RAM
effective_cache_size = 384MB            # ~75% of container RAM (planner hint, not allocated)
work_mem = 4MB                          # per-sort/hash; conservative for dev
maintenance_work_mem = 64MB             # vacuum, create index, etc.

# --- Timeouts (dev safety) ---------------------------------------------------
statement_timeout = 60s                 # abort runaway queries
idle_in_transaction_session_timeout = 5min  # kill zombie transactions
lock_timeout = 10s                      # cap waits on row/table locks

# --- WAL ---------------------------------------------------------------------
wal_level = logical                     # required for wal2json / logical replication
max_wal_size = 1GB                      # smaller than prod to limit disk usage in dev
min_wal_size = 80MB
wal_keep_size = 0                       # no extra WAL retention beyond replication needs

# --- Locale / timezone (must match initdb settings) -------------------------
timezone = 'UTC'
log_timezone = 'UTC'

# --- Logging -----------------------------------------------------------------
# Dual destination — postgres writes the same events twice in different formats:
#   /var/log/postgresql/postgresql-YYYY-MM-DD.log      (plain text, log_line_prefix)
#   /var/log/postgresql/postgresql-YYYY-MM-DD.log.json (jsonlog — '.json' is auto-appended)
# Note: with logging_collector=on, postgres redirects stderr to these files,
# so `docker logs` only shows the entrypoint output + collector handoff message.
# Use `scripts/logs.sh` (or `tail -f volumes/logs/*.log`) for live tailing.
log_destination = 'stderr,jsonlog'
logging_collector = on
log_directory = '/var/log/postgresql'
log_filename = 'postgresql-%Y-%m-%d.log'

# Dev: log every statement. Prod should set this much higher.
log_min_duration_statement = 0

# Rotation: daily or 100 MB, whichever first; truncate on rotation.
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on

# Lock and deadlock visibility
log_lock_waits = on
deadlock_timeout = 1s

# Stderr line format. The jsonlog destination ignores this and emits structured fields.
log_line_prefix = '%m [%p] %q%u@%d '

# --- SSL ---------------------------------------------------------------------
ssl = off                               # disabled in dev; enable in prod
