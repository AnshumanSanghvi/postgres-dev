# =============================================================================
# Postgres Dev Environment — postgresql.conf
# Mounted at /etc/postgresql/postgresql.conf, loaded via:
#   postgres -c config_file=/etc/postgresql/postgresql.conf
# =============================================================================

# --- Connections -------------------------------------------------------------
listen_addresses = '*'
port = 5499
max_connections = 50

# --- Authentication ----------------------------------------------------------
password_encryption = scram-sha-256

# --- HBA ---------------------------------------------------------------------
hba_file = '/etc/postgresql/pg_hba.conf'

# --- Memory ------------------------------------------------------------------
# Sized for a 512 MiB container budget (compose mem_limit).
shared_buffers = 128MB                  # ~25% of container RAM
effective_cache_size = 384MB            # ~75% of container RAM (planner hint, not allocated)
work_mem = 4MB                          # per-sort/hash; conservative for dev
maintenance_work_mem = 64MB             # vacuum, create index, etc.

# --- Timeouts (dev safety) ---------------------------------------------------
statement_timeout = 60s                 # abort runaway queries
idle_in_transaction_session_timeout = 5min  # kill zombie transactions
lock_timeout = 10s                      # cap waits on row/table locks

# --- WAL ---------------------------------------------------------------------
wal_level = logical                     # required for wal2json / logical replication
max_wal_size = 1GB                      # smaller than prod to limit disk usage in dev
min_wal_size = 80MB
wal_keep_size = 0                       # no extra WAL retention beyond replication needs

# --- Extensions: shared_preload_libraries ------------------------------------
# Load order: lightweight observability first, then preload-required extensions.
shared_preload_libraries = 'pg_stat_statements,auto_explain,pg_cron,pgaudit,pg_partman_bgw,plugin_debugger'

# pg_stat_statements: aggregate query performance over time
pg_stat_statements.track = 'all'        # also track statements inside functions
pg_stat_statements.max = 10000          # max distinct queries tracked

# auto_explain: log query plans for slow queries (no CREATE EXTENSION needed)
auto_explain.log_min_duration = '1s'    # only plans for queries >= 1s
auto_explain.log_analyze = on           # include actual row counts and timing
auto_explain.log_buffers = on           # include buffer usage
auto_explain.log_format = 'json'        # JSON-formatted plans (matches log file format)
auto_explain.log_nested_statements = on

# pg_cron: scheduled jobs. Metadata lives in 'postgres' database; jobs can be
# scheduled into any database via cron.schedule_in_database().
cron.database_name = 'postgres'
cron.use_background_workers = on        # required for cross-database job execution

# pgaudit: structured audit logging of all statements from all users.
# Output goes to the postgres log files (stderr text + JSON file).
pgaudit.log = 'all'
pgaudit.log_catalog = on
pgaudit.log_relation = on
pgaudit.log_statement_once = off

# pg_partman_bgw: background worker for partition maintenance.
# Runs as 'admin' user (created in initdb scripts). On very first boot the
# user may not exist when bgw starts — it will log warnings until the next
# restart, after which init scripts have created admin and bgw runs cleanly.
pg_partman_bgw.dbname = 'postgres'
pg_partman_bgw.interval = 3600          # seconds between maintenance runs
pg_partman_bgw.role = 'admin'

# --- search_path -------------------------------------------------------------
# Cluster default — applies to every database that doesn't override it.
# Schemas in this list must exist in every database (the `app` schema is
# created in template1 by initdb scripts, so all new DBs inherit it).
search_path = '"$user", app, public'

# --- Locale / timezone (must match initdb settings) -------------------------
timezone = 'UTC'
log_timezone = 'UTC'

# --- Logging -----------------------------------------------------------------
# Dual destination — postgres writes the same events twice in different formats:
#   /var/log/postgresql/postgresql-YYYY-MM-DD.log      (plain text, log_line_prefix)
#   /var/log/postgresql/postgresql-YYYY-MM-DD.log.json (jsonlog — '.json' is auto-appended)
# Note: with logging_collector=on, postgres redirects stderr to these files,
# so `docker logs` only shows the entrypoint output + collector handoff message.
# Use `scripts/logs.sh` (or `tail -f volumes/logs/*.log`) for live tailing.
log_destination = 'stderr,jsonlog'
logging_collector = on
log_directory = '/var/log/postgresql'
log_filename = 'postgresql-%Y-%m-%d.log'

# Dev: log every statement. Prod should set this much higher.
log_min_duration_statement = 0

# Rotation: daily or 100 MB, whichever first; truncate on rotation.
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on

# Lock and deadlock visibility
log_lock_waits = on
deadlock_timeout = 1s

# Stderr line format. The jsonlog destination ignores this and emits structured fields.
log_line_prefix = '%m [%p] %q%u@%d '

# --- SSL ---------------------------------------------------------------------
ssl = off                               # disabled in dev; enable in prod
