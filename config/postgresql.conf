# =============================================================================
# Postgres Dev Environment — postgresql.conf (Slice 2 baseline)
# Mounted at /etc/postgresql/postgresql.conf, loaded via:
#   postgres -c config_file=/etc/postgresql/postgresql.conf
# Subsequent slices add memory, timeout, WAL, logging, and extension settings.
# =============================================================================

# --- Connections ---
listen_addresses = '*'
port = 5499

# --- Authentication ---
# scram-sha-256 is the default for PG14+ but set explicitly for clarity.
password_encryption = scram-sha-256

# --- HBA ---
# Use the file mounted alongside this one.
hba_file = '/etc/postgresql/pg_hba.conf'

# --- Locale (must match initdb settings) ---
timezone = 'UTC'
log_timezone = 'UTC'

# --- SSL ---
# Disabled in dev. Match prod by enabling here when needed.
ssl = off
