# =============================================================================
# Barman global configuration
# Source: config/barman.conf — copied to /etc/barman.conf in the image.
# =============================================================================
[barman]
barman_user = barman
barman_home = /var/lib/barman
log_file = /var/log/barman/barman.log
log_level = INFO

# Where per-server config files live. /etc/barman.d/postgres-dev.conf defines
# the only server in this dev environment.
configuration_files_directory = /etc/barman.d

# pg_receivewal, pg_basebackup, psql live under /usr/pgsql-17/bin which is
# NOT on the barman user's default PATH. path_prefix is barman's documented
# escape hatch for this exact problem.
path_prefix = /usr/pgsql-17/bin

# Compression for basebackups. gzip gives a good ratio for postgres data files.
compression = gzip

# Concurrency for basebackups. 2 is plenty for the small dev cluster.
parallel_jobs = 2
