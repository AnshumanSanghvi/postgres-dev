# =============================================================================
# Barman per-server configuration: postgres-dev
# Streaming-only mode: Barman pulls WAL via pg_receivewal-equivalent. No SSH,
# no archive_command in postgresql.conf. Lower latency than archive_command,
# fewer moving parts.
#
# IMPORTANT: barman's INI parser does NOT strip inline comments. Comments must
# be on their own line; never put `# ...` after a value on the same line.
# =============================================================================
[postgres-dev]
description = "postgres-dev cluster (PG 17 on OL9-slim)"

# Both libpq connections use the BARMAN_USER role created by initdb/05.
# Password is provided via /var/lib/barman/.pgpass (generated at entrypoint
# from $BARMAN_PASSWORD).
conninfo            = host=127.0.0.1 port=5499 user=barman_repl dbname=postgres
streaming_conninfo  = host=127.0.0.1 port=5499 user=barman_repl dbname=postgres

# pg_basebackup over the streaming connection — no SSH, no rsync.
backup_method = postgres

# Continuous WAL pull via the physical replication slot created by initdb/05.
streaming_archiver = on
slot_name          = barman_slot
create_slot        = manual

# Archive-via-archive_command is OFF (we don't ship WAL via SSH).
archiver = off

# Recovery window: keep enough basebackups + WAL to PITR within the last
# 30 days. Cleanup script enforces a 5 GB hard cap if storage grows beyond
# the budget.
retention_policy        = RECOVERY WINDOW OF 30 DAYS
wal_retention_policy    = main

# Keep at least 2 basebackups regardless of retention window expiry.
minimum_redundancy = 2

# `barman check` thresholds. Weekly cron should always satisfy 8 days.
# WAL streaming should be near-real-time so a 1-hour gap means receive-wal died.
last_backup_maximum_age = 8 days
last_wal_maximum_age    = 1 hour
