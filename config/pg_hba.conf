# =============================================================================
# Postgres Dev Environment — pg_hba.conf
# All connections require scram-sha-256 authentication.
# =============================================================================
# TYPE        DATABASE       USER          ADDRESS         METHOD
local         all            all                           scram-sha-256
host          all            all           127.0.0.1/32    scram-sha-256
host          all            all           ::1/128         scram-sha-256
host          all            all           0.0.0.0/0       scram-sha-256
host          all            all           ::/0            scram-sha-256

# Barman replication user (S17) — local-only, scram-sha-256.
host          replication    barman_repl   127.0.0.1/32    scram-sha-256
host          replication    barman_repl   ::1/128         scram-sha-256
