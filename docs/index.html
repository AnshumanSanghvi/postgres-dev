    "rec_cm_hdd": {
      "id": "rec_cm_hdd",
      "type": "recommendation",
      "title": "Spinning HDD — Keep random_page_cost = 4.0, Focus on Buffer Cache",
      "explanation": "On spinning HDDs, <code>random_page_cost = 4.0</code> is genuinely accurate — a physical seek (5–15ms) really does cost ~4× a sequential read. The default is correct here. The best performance improvement on HDDs comes from <strong>maximising buffer cache hit rate</strong>: set <code>shared_buffers</code> to 25% of RAM and <code>effective_cache_size</code> to 75% of RAM so more data is served from memory rather than disk. Reducing random reads matters far more than tuning cost constants.",
      "when_not_to": "Do not reduce <code>random_page_cost</code> below 2.0 on spinning disks — this causes the planner to over-use indexes, which triggers random disk seeks and catastrophic query times as the disk head thrashes.",
      "sql_example": "-- Keep the default — it's correct for spinning disk\nrandom_page_cost = 4.0\nseq_page_cost = 1.0\n\n-- Instead, maximise buffer cache to minimise physical I/O\nshared_buffers = '8GB'           -- 25% of 32GB server\neffective_cache_size = '24GB'    -- 75% of 32GB server\n\n-- Check current buffer cache hit ratio\n-- Target: > 99%\nSELECT\n  SUM(blks_hit) * 100.0 / NULLIF(SUM(blks_hit) + SUM(blks_read), 0)\n  AS cache_hit_pct\nFROM pg_stat_database;",
      "tags": [
        "HDD",
        "on-premise"
      ],
      "source": "The Hidden PostgreSQL Setting PDF"
    },
    "rec_cm_effective_cache": {
      "id": "rec_cm_effective_cache",
      "type": "recommendation",
      "title": "Set effective_cache_size to 75% of Total RAM",
      "explanation": "<code>effective_cache_size</code> does <strong>not</strong> allocate memory — it's a hint that tells the planner how much total memory (shared_buffers + OS page cache) is available for caching data. The planner uses this to estimate whether an index scan's random pages are likely to be cache hits (cheap) or disk reads (expensive). Set too low and the planner assumes cache misses everywhere, making index scans look artificially expensive. The correct value is approximately 75% of your total server RAM.",
      "when_not_to": "Setting this higher than actual RAM + buffer cache doesn't hurt (it's just a hint), but setting it wildly higher than reality causes the planner to assume everything is cached when it isn't — and it picks index scans that end up doing expensive real disk I/O.",
      "sql_example": "-- Set to 75% of total server RAM\n-- Example: 64GB server\neffective_cache_size = '48GB'\n\n-- Example: 16GB server\neffective_cache_size = '12GB'\n\n-- Quick check of current setting\nSHOW effective_cache_size;\n\n-- How to find your total RAM on Linux:\n-- free -g\n-- Or in psql:\nSELECT pg_size_pretty(pg_size_bytes(current_setting('effective_cache_size')));",
      "tags": [
        "memory",
        "all"
      ],
      "source": "The Hidden PostgreSQL Setting PDF"
    },
    "rec_cm_oltp": {
      "id": "rec_cm_oltp",
      "type": "recommendation",
      "title": "OLTP Cost Profile — Maximise Index Usage",
      "explanation": "OLTP workloads (logins, lookups, row-level inserts/updates) need fast index access above all else. The cost profile below is tuned for SSD storage and favours index scans by making random I/O cheap. <code>cpu_tuple_cost</code> is lowered to reflect that modern CPUs process rows very quickly. This profile works well for applications where most queries touch < 1000 rows and must complete in < 10ms.",
      "when_not_to": "If the same server also runs heavy analytics queries (multi-million row scans), those queries may get overly aggressive index scan plans. Use per-session <code>work_mem</code> and parallelism overrides for analytics rather than changing the global profile.",
      "sql_example": "-- OLTP profile (assumes SSD storage)\n-- In postgresql.conf:\nrandom_page_cost = 1.1\nseq_page_cost = 1.0\ncpu_tuple_cost = 0.01\ncpu_index_tuple_cost = 0.005\ncpu_operator_cost = 0.0025\neffective_cache_size = '75% of RAM'\n\n-- Reload\nSELECT pg_reload_conf();\nANALYZE;\n\n-- Monitor top queries\nSELECT query, calls, mean_exec_time\nFROM pg_stat_statements\nORDER BY total_exec_time DESC LIMIT 20;",
      "tags": [
        "OLTP",
        "SSD"
      ],
      "source": "The Hidden PostgreSQL Setting PDF"
    },
    "rec_cm_analytics": {
      "id": "rec_cm_analytics",
      "type": "recommendation",
      "title": "Analytics Cost Profile — Favour Parallelism and Seq Scans",
      "explanation": "Analytics workloads scan millions of rows and perform complex aggregations. A slightly higher <code>random_page_cost</code> (1.2 vs 1.1) gently favours sequential scans for large reads while still permitting index scans for selective filters. Lower <code>cpu_tuple_cost</code> favours CPU-intensive operations over I/O. Increase <code>default_statistics_target</code> so the planner has finer-grained histograms for range queries on datetime and numeric columns.",
      "when_not_to": "Do not use this profile on a primary OLTP server — the slightly higher random_page_cost can cause index avoidance on short OLTP queries that depend on fast index lookups.",
      "sql_example": "-- Analytics profile (SSD assumed)\nrandom_page_cost = 1.2\nseq_page_cost = 1.0\ncpu_tuple_cost = 0.005\neffective_cache_size = '75% of RAM'\ndefault_statistics_target = 200  -- finer histograms for range queries\n\n-- Parallelism for analytics\nmax_parallel_workers_per_gather = 4\nmax_parallel_workers = 8\nparallel_tuple_cost = 0.1\nparallel_setup_cost = 1000\n\n-- Per-session memory for large sorts/hashes\n-- (set in application or connection string, not globally)\nSET work_mem = '256MB';",
      "tags": [
        "analytics",
        "SSD"
      ],
      "source": "The Hidden PostgreSQL Setting PDF"
    },
    "rec_cm_mixed": {
      "id": "rec_cm_mixed",
      "type": "recommendation",
      "title": "Mixed Workload — SSD Baseline with Per-Session Analytics Overrides",
      "explanation": "A single global cost profile cannot perfectly serve both OLTP and analytics. Use the SSD-optimised OLTP baseline globally so short queries always get fast index access. For analytics queries, override <code>work_mem</code> and parallelism per-session in the application connection or via a role setting. This gives OLTP queries the fast path and analytics queries opt-in to more resources without compromising each other.",
      "when_not_to": "If analytics volume is very high (many concurrent users running large queries), consider a dedicated read replica tuned specifically for analytics — this lets you tune each server independently without compromises.",
      "sql_example": "-- Global settings (SSD baseline)\nrandom_page_cost = 1.1\nseq_page_cost = 1.0\neffective_cache_size = '75% of RAM'\n\n-- Per-session override for analytics queries\n-- Set in application code before running analytics:\nSET work_mem = '256MB';\nSET max_parallel_workers_per_gather = 4;\n\n-- Your analytics query here...\n\n-- Reset after\nRESET work_mem;\nRESET max_parallel_workers_per_gather;\n\n-- Or set permanently for an analytics role:\nALTER ROLE analyst SET work_mem = '256MB';\nALTER ROLE analyst SET max_parallel_workers_per_gather = 4;",
      "tags": [
        "OLTP",
        "analytics",
        "mixed"
      ],
      "source": "The Hidden PostgreSQL Setting PDF"
    },
    "rec_cm_verify_plans": {
      "id": "rec_cm_verify_plans",
      "type": "recommendation",
      "title": "Verify Plan Quality After a Config or Upgrade Change",
      "explanation": "After changing cost parameters or upgrading PostgreSQL, the planner may choose different plans for existing queries. Some will improve, some may regress. The workflow: (1) reset <code>pg_stat_statements</code> to get a clean baseline, (2) run <code>ANALYZE</code> to ensure statistics are fresh for the new config, (3) let traffic run for 1–2 hours, (4) query <code>pg_stat_statements</code> for queries that got slower. For specific regressions, compare EXPLAIN output before and after the change.",
      "when_not_to": "Don't roll back a correct config change just because one query regressed. Investigate whether the regressed query has a missing index or stale statistics — those are the real problems. The config change just made the pre-existing problem visible.",
      "sql_example": "-- Step 1: Establish a clean baseline after change\nSELECT pg_stat_statements_reset();\n\n-- Step 2: Update statistics for the new config\nANALYZE;\n\n-- Step 3: After an hour, check for regressions\nSELECT\n  LEFT(query, 80) AS query_snippet,\n  calls,\n  ROUND(mean_exec_time::numeric, 1) AS avg_ms,\n  ROUND(max_exec_time::numeric, 1) AS max_ms\nFROM pg_stat_statements\nWHERE calls > 50\nORDER BY mean_exec_time DESC\nLIMIT 20;\n\n-- Step 4: For a specific regressed query, compare plans\nEXPLAIN (ANALYZE, BUFFERS) <the regressed query>;",
      "tags": [
        "all",
        "ops"
      ],
      "source": "The Hidden PostgreSQL Setting PDF, Query Plan 1.md"
    },

      "question": "What memory-related symptom are you experiencing?",
      "context": "PostgreSQL's default memory settings assume a small server from the early 2000s. On any modern machine with gigabytes of RAM, the defaults leave most of it unused — leaving sorts spilling to disk, buffer cache constantly cold, and parallelism starved. Tuning these four numbers correctly is often the highest-ROI change you can make.",

    "diag_mem_work_mem": {
      "id": "diag_mem_work_mem",
      "type": "diagnostic",
      "metric": "work_mem — per-operation sort/hash memory",
      "question": "Check whether your sorts and hashes are spilling to disk due to insufficient work_mem",
      "context": "<code>work_mem</code> is the memory budget for a single sort or hash operation. The default is <strong>4MB</strong> — enough for a table with ~100k rows. With millions of rows, sort and hash operations immediately overflow to disk. The tell-tale signs are: <code>Sort Method: external merge  Disk: NkB</code> in EXPLAIN output, or <code>Hash  Batches: N</code> where N > 1. <strong>Critical caution</strong>: work_mem is per-operation per-connection. With 200 connections each running 4 operations, <code>work_mem = 256MB</code> can peak at 200GB of RAM consumption. Always set per-session or per-role, not globally high.",
      "threshold": {
        "bad": "EXPLAIN shows 'Sort Method: external merge  Disk:' or 'Hash Batches: N > 1' — operations spilling to disk",
        "ok": "EXPLAIN shows 'Sort Method: quicksort  Memory: NkB' but N is close to work_mem limit — risk of future spill",
        "good": "Sort in memory with headroom to spare, Batches: 1 in all Hash nodes"
      },
      "sql": "-- Check current setting\nSHOW work_mem;\n\n-- Run your query with EXPLAIN to detect spill\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT customer_id, COUNT(*), SUM(total)\nFROM orders GROUP BY customer_id ORDER BY SUM(total) DESC;\n-- Look for:\n-- 'Sort Method: external merge  Disk: 48752kB'  ← spilling\n-- 'HashAggregate  Batches: 4'                    ← spilling\n-- 'Hash  Batches: 8  Memory Usage: 625kB'        ← spilling\n\n-- Test: temporarily raise and rerun\nSET work_mem = '64MB';\nEXPLAIN (ANALYZE, BUFFERS) <same query>;\n-- Did 'external merge' become 'quicksort Memory:'?\n-- Did Batches drop to 1?",
      "options": [
        {
          "label": "'external merge Disk:' appeared — confirmed spill",
          "next": "rec_mem_work_mem"
        },
        {
          "label": "'Batches: N > 1' in a Hash or HashAggregate node",
          "next": "rec_mem_work_mem"
        },
        {
          "label": "No spill but query is still slow — different issue",
          "next": "diag_explain_analyze"
        },
        {
          "label": "Skip — show me how to fix sort/hash spill",
          "next": "rec_mem_work_mem",
          "skip": true
        }
      ]
    },
    "diag_mem_shared_buffers": {
      "id": "diag_mem_shared_buffers",
      "type": "diagnostic",
      "metric": "Buffer cache hit ratio",
      "question": "Check your buffer cache hit ratio to see if data is being served from RAM or disk",
      "context": "<code>shared_buffers</code> is PostgreSQL's internal buffer cache — the pool of RAM it manages directly for frequently-accessed data pages. The default is <strong>128MB</strong>, which is absurdly small on any modern server. The buffer cache hit ratio tells you what fraction of page reads are served from RAM vs disk. Below 95%, you're regularly reading from disk and your queries are I/O-bound. Below 90% is a serious problem. Also set <code>effective_cache_size</code> — this is a <em>hint</em> to the planner about total cached memory (shared_buffers + OS page cache). It doesn't allocate RAM but influences plan choices.",
      "threshold": {
        "bad": "Cache hit ratio < 90% — the database is regularly going to disk for data that should be in RAM",
        "ok": "Cache hit ratio 90–98% — acceptable but shared_buffers can likely be increased",
        "good": "Cache hit ratio > 99% — most data is served from RAM, disk I/O is minimal"
      },
      "sql": "-- Overall buffer cache hit ratio (target: > 99%)\nSELECT\n  SUM(blks_hit) * 100.0 /\n  NULLIF(SUM(blks_hit) + SUM(blks_read), 0) AS cache_hit_pct\nFROM pg_stat_database\nWHERE datname = current_database();\n\n-- Per-table cache hit ratio (find cold tables)\nSELECT\n  relname,\n  heap_blks_hit * 100.0 / NULLIF(heap_blks_hit + heap_blks_read, 0)\n    AS cache_hit_pct,\n  pg_size_pretty(pg_total_relation_size(relid)) AS size\nFROM pg_statio_user_tables\nWHERE heap_blks_hit + heap_blks_read > 1000\nORDER BY cache_hit_pct ASC NULLS LAST\nLIMIT 20;\n\n-- Check current shared_buffers setting\nSHOW shared_buffers;",
      "options": [
        {
          "label": "Cache hit ratio < 95% — shared_buffers is too small",
          "next": "rec_mem_shared_buffers"
        },
        {
          "label": "Cache hit ratio is good (>99%) but queries still hit disk (BUFFERS output)",
          "next": "rec_mem_effective_cache"
        },
        {
          "label": "specific tables have very low cache hit",
          "next": "rec_mem_shared_buffers"
        },
        {
          "label": "Skip — show me how to set shared_buffers correctly",
          "next": "rec_mem_shared_buffers",
          "skip": true
        }
      ]
    },
    "diag_mem_maintenance": {
      "id": "diag_mem_maintenance",
      "type": "diagnostic",
      "metric": "maintenance_work_mem setting",
      "question": "Check whether maintenance_work_mem is limiting VACUUM or index build performance",
      "context": "<code>maintenance_work_mem</code> controls how much RAM is available for maintenance operations: <code>VACUUM</code>, <code>CREATE INDEX</code>, <code>ALTER TABLE ... ADD CONSTRAINT</code>, <code>CLUSTER</code>, and <code>pg_restore</code>. The default is <strong>64MB</strong>. A <code>CREATE INDEX</code> on a 100GB table with only 64MB will do thousands of disk passes. Increasing this to 1–2GB can cut index build time by 10× and makes autovacuum significantly more effective at processing dead tuples.",
      "threshold": {

        "ok": "maintenance_work_mem = 256MB–512MB — better but still conservative for large maintenance tasks",

    "diag_mem_full_profile": {
      "id": "diag_mem_full_profile",
      "type": "diagnostic",
      "metric": "Total server RAM available for PostgreSQL",
      "question": "Check your total RAM to calculate the right memory profile",
      "context": "PostgreSQL's four key memory parameters — <code>shared_buffers</code>, <code>effective_cache_size</code>, <code>work_mem</code>, and <code>maintenance_work_mem</code> — all scale with your server's total RAM. The formulas are: <code>shared_buffers = 25% RAM</code>, <code>effective_cache_size = 75% RAM</code>, <code>maintenance_work_mem = min(2GB, RAM / 8)</code>, and <code>work_mem = (RAM - shared_buffers) / (max_connections × 3)</code>. This last formula accounts for the fact that multiple operations can run per connection.",
      "threshold": {
        "bad": "Any parameter still at PostgreSQL default on a server with > 4GB RAM — significant performance left unclaimed",
        "ok": "Some parameters tuned but not all — partial improvement",
        "good": "All four parameters tuned to server RAM — memory is fully utilised"
      },
      "sql": "-- Find total server RAM\nSELECT pg_size_pretty(pg_size_bytes(current_setting('shared_buffers'))) AS shared_buffers,\n       current_setting('effective_cache_size') AS effective_cache_size,\n       current_setting('work_mem') AS work_mem,\n       current_setting('maintenance_work_mem') AS maintenance_work_mem,\n       current_setting('max_connections') AS max_connections;\n\n-- On Linux: check total RAM\n-- free -h\n\n-- Calculate suggested work_mem:\n-- work_mem = (total_RAM * 0.75 - shared_buffers) / (max_connections * 3)\n-- Example: (48GB - 16GB) / (200 * 3) = ~54MB per operation",

    "rec_mem_work_mem": {
      "id": "rec_mem_work_mem",
      "type": "recommendation",
      "title": "Increase work_mem — Per-Session, Not Globally",
      "explanation": "<code>work_mem</code> controls how much RAM each sort or hash operation gets before spilling to disk. The default 4MB causes spills on any reasonably sized query. The right fix is to set it <strong>per-session or per-role</strong>, not globally. Per-session ensures analytics roles get large budgets without risking OOM on OLTP connections. A rule of thumb: set globally to 16–64MB as a floor, and give analytics roles 256MB–1GB via <code>ALTER ROLE</code>.",
      "when_not_to": "Never set <code>work_mem</code> to hundreds of megabytes globally. With 200 connections each running 4 sort/hash operations simultaneously, global work_mem = 256MB can consume 200GB of RAM and trigger an OOM kill of the PostgreSQL process.",
      "sql_example": "-- Global floor (safe even with many connections)\n-- In postgresql.conf:\nwork_mem = '32MB'\n\n-- Per-role increase for analytics users\nALTER ROLE analyst SET work_mem = '512MB';\nALTER ROLE reporting SET work_mem = '256MB';\n\n-- Per-session for a specific large query\nSET work_mem = '1GB';\nSELECT ... your heavy analytics query ...;\nRESET work_mem;  -- always reset after\n\n-- Confirm the spill is gone\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT customer_id, COUNT(*), SUM(total)\nFROM orders GROUP BY customer_id;\n-- Should now show: 'Sort Method: quicksort  Memory: 128kB'\n-- and: 'Batches: 1'",
      "tags": [
        "memory",
        "analytics",
        "OLTP"
      ],
      "source": "Query Plan 1.md, PostgreSQL for Real-Time Apps PDF"
    },
    "rec_mem_shared_buffers": {
      "id": "rec_mem_shared_buffers",
      "type": "recommendation",
      "title": "Set shared_buffers to 25% of Total RAM",
      "explanation": "<code>shared_buffers</code> is PostgreSQL's internal buffer pool. Everything else equal, more shared_buffers means more data served from RAM instead of disk. The standard recommendation is <strong>25% of total RAM</strong>. On a 64GB server, that's 16GB. Going beyond 40% gives diminishing returns because PostgreSQL also relies on the OS page cache (which <code>effective_cache_size</code> hints at). After changing <code>shared_buffers</code>, a PostgreSQL <strong>restart</strong> is required — it allocates shared memory at startup. Also always set <code>effective_cache_size = 75% of RAM</code> at the same time.",
      "when_not_to": "Setting shared_buffers above 40% of RAM can starve the OS page cache, which PostgreSQL also relies on. On systems running other memory-intensive processes alongside PostgreSQL, stay closer to 20–25%.",
      "sql_example": "-- In postgresql.conf (requires restart):\nshared_buffers = '16GB'          -- 25% of 64GB server\neffective_cache_size = '48GB'    -- 75% of 64GB server\n\n-- Restart required:\n-- sudo systemctl restart postgresql\n\n-- After restart: verify new setting\nSHOW shared_buffers;\n\n-- Check cache hit ratio improves over the next hour\nSELECT\n  SUM(blks_hit) * 100.0 /\n  NULLIF(SUM(blks_hit) + SUM(blks_read), 0) AS cache_hit_pct\nFROM pg_stat_database\nWHERE datname = current_database();\n-- Target: > 99%",
      "tags": [
        "memory",
        "all"
      ],
      "source": "PostgreSQL for Real-Time Apps PDF"
    },
    "rec_mem_effective_cache": {
      "id": "rec_mem_effective_cache",
      "type": "recommendation",
      "title": "Set effective_cache_size to 75% of Total RAM",
      "explanation": "<code>effective_cache_size</code> is a <strong>hint to the planner</strong> — it doesn't allocate any memory. It tells the planner how much total cached memory (shared_buffers + OS page cache) is available. The planner uses this to estimate whether it can assume pages are cached (cheap) or require disk reads (expensive). With the default 512MB, the planner thinks almost nothing is cached and over-avoids index scans. Set to 75% of RAM on a dedicated PostgreSQL server. No restart needed.",
      "when_not_to": "This is a pure hint — setting it high doesn't allocate memory or risk OOM. The only risk is setting it far above actual cached memory, which causes the planner to over-optimise for cache hits that don't materialise. On a shared server with other processes, set to 50–60% of RAM instead.",
      "sql_example": "-- No restart needed (pg_reload_conf is sufficient)\n-- In postgresql.conf:\neffective_cache_size = '48GB'  -- 75% of 64GB server\neffective_cache_size = '12GB'  -- 75% of 16GB server\n\n-- Reload (no restart)\nSELECT pg_reload_conf();\nSHOW effective_cache_size;\n\n-- The planner immediately uses this new hint\n-- Run EXPLAIN on a slow query to see if plan improves\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM orders WHERE customer_id = 12345;",
      "tags": [
        "memory",
        "planner"
      ],
      "source": "The Hidden PostgreSQL Setting PDF"
    },
    "rec_mem_maintenance": {
      "id": "rec_mem_maintenance",
      "type": "recommendation",
      "title": "Increase maintenance_work_mem for Faster VACUUM and Index Builds",
      "explanation": "<code>maintenance_work_mem</code> controls RAM for <code>VACUUM</code>, <code>CREATE INDEX</code>, <code>ALTER TABLE</code>, <code>CLUSTER</code>, and <code>pg_restore</code>. At 64MB (default), a <code>CREATE INDEX</code> on a large table takes 10× longer than necessary. At 1–2GB, PostgreSQL can sort the entire index in a single pass. This also dramatically speeds up autovacuum — each autovacuum worker process uses this budget to collect dead tuple IDs before flushing. A good formula: <code>min(2GB, RAM / 8)</code>. No restart needed.",
      "when_not_to": "Don't set this above 2GB — PostgreSQL itself has internal limits on how much this helps. Also note that if you run many autovacuum workers simultaneously, total consumption = workers × maintenance_work_mem. With 4 workers and 2GB each, that's 8GB just for VACUUM.",
      "sql_example": "-- In postgresql.conf (no restart needed)\nmaintenance_work_mem = '1GB'   -- 16–32GB server\nmaintenance_work_mem = '2GB'   -- 64GB+ server\n\n-- Reload\nSELECT pg_reload_conf();\n\n-- Per-session for an immediate one-off operation\nSET maintenance_work_mem = '2GB';\nCREATE INDEX CONCURRENTLY idx_orders_created\nON orders (created_at DESC);\n\n-- For autovacuum specifically (check worker count too)\nSHOW autovacuum_max_workers;  -- typically 3\n-- 3 workers × 1GB = 3GB peak for vacuum\n-- Ensure total RAM budget accommodates this",
      "tags": [
        "memory",
        "maintenance",
        "VACUUM"
      ],
      "source": "PostgreSQL for Real-Time Apps PDF"
    },
    "rec_mem_profile_8gb": {
      "id": "rec_mem_profile_8gb",
      "type": "recommendation",

      "explanation": "On an 8GB server, be conservative with <code>work_mem</code> since you may have 100+ connections. Set <code>shared_buffers = 2GB</code> (25%), <code>effective_cache_size = 6GB</code> (75%), and keep <code>work_mem</code> low globally with higher values for specific roles.",

    "part_sym_root": {
      "id": "part_sym_root",
      "type": "question",
      "question": "What is your partitioning problem?",
      "context": "Partitioning splits a logical table into multiple physical child tables. The key benefit: queries that filter on the partition key only scan the relevant child table(s), skipping all others — called <strong>partition pruning</strong>. Without pruning, partitioning adds overhead without benefit. Partitioning also simplifies data lifecycle: dropping an old partition is instantaneous vs a long DELETE.",
      "options": [
        {
          "label": "My large table is slow even with good indexes",
          "next": "diag_part_table_size"
        },
        {
          "label": "I need to delete old data regularly (archiving / retention)",
          "next": "diag_part_lifecycle"
        },
        {
          "label": "I'm already partitioned but queries are still slow",
          "next": "diag_part_pruning"
        },
        {
          "label": "Should I partition at all? (unsure if it's worth it)",
          "next": "diag_part_decision"
        }
      ]
    },
    "diag_part_table_size": {
      "id": "diag_part_table_size",
      "type": "diagnostic",
      "metric": "Table row count and query filter pattern",
      "question": "Check table size and whether your queries filter on a column suitable for partitioning",
      "context": "Partitioning helps when: (1) the table has <strong>100M+ rows</strong> (or >100GB), (2) the majority of queries filter on a <strong>high-cardinality range column</strong> (timestamp, date, ID range), and (3) indexes alone can't shrink the working set enough because the table has grown past the point where indexes fit in cache. If your queries always say <code>WHERE created_at >= '2024-01-01'</code>, partitioning by month means those queries never even look at 2022 or 2023 data.",
      "threshold": {
        "bad": "Table > 100M rows AND queries do time-range or tenant-scoped filters — strong candidate for partitioning",
        "ok": "Table 10M–100M rows — indexes may still suffice; benchmark before partitioning",
        "good": "Table < 10M rows — partitioning adds overhead without meaningful benefit; use indexes instead"
      },
      "sql": "-- Check table size and row count\nSELECT\n  relname,\n  n_live_tup AS estimated_rows,\n  pg_size_pretty(pg_total_relation_size(oid)) AS total_size\nFROM pg_stat_user_tables\nWHERE relname = 'your_table_name'\nORDER BY pg_total_relation_size(oid) DESC;\n\n-- Check your top slow queries to find the filter column\nSELECT LEFT(query, 120), mean_exec_time, calls\nFROM pg_stat_statements\nWHERE mean_exec_time > 100\nORDER BY total_exec_time DESC\nLIMIT 10;\n\n-- Check if there's a natural time-range or ID-range in the filters",
      "options": [
        {
          "label": "Table > 100M rows, queries always filter by timestamp/date",
          "next": "rec_part_range_time"
        },
        {
          "label": "Table > 100M rows, queries filter by tenant_id or category",
          "next": "rec_part_list"
        },
        {
          "label": "Table is large but queries don't filter on any consistent column",
          "next": "rec_part_hash"
        },
        {
          "label": "Table < 10M rows — probably not worth partitioning",
          "next": "rec_part_not_needed"
        },
        {
          "label": "Skip — help me choose a partitioning strategy",
          "next": "rec_part_range_time",
          "skip": true
        }
      ]
    },
    "diag_part_lifecycle": {
      "id": "diag_part_lifecycle",
      "type": "diagnostic",
      "metric": "Data retention pattern and DELETE performance",
      "question": "Check how much old data needs to be deleted and how your current DELETE performs",
      "context": "Deleting old rows with <code>DELETE FROM events WHERE created_at < NOW() - INTERVAL '1 year'</code> on a 500M-row table can take <strong>hours</strong> and generate enormous WAL traffic, dead tuples, and autovacuum pressure. With range partitioning, deleting a year of data becomes <code>DROP TABLE events_2023</code> — instantaneous, generates no WAL, no dead tuples, no vacuum needed. If you regularly archive or purge old data, this alone justifies partitioning.",
      "threshold": {
        "bad": "Regular DELETE of millions of rows taking > 1 minute — clear lifecycle management problem",
        "ok": "Batch DELETE with chunking to avoid lock escalation — functional but inefficient",
        "good": "DROP PARTITION — instant, zero cleanup overhead"
      },
      "sql": "-- Check how much data falls in your 'old' range\nSELECT\n  date_trunc('month', created_at) AS month,\n  COUNT(*) AS rows,\n  pg_size_pretty(SUM(pg_column_size(t.*))) AS est_size\nFROM your_table t\nWHERE created_at < NOW() - INTERVAL '1 year'\nGROUP BY 1\nORDER BY 1;\n\n-- Estimate DELETE time on a small batch first\nBEGIN;\nEXPLAIN (ANALYZE, BUFFERS)\nDELETE FROM your_table\nWHERE created_at < '2022-01-01'\nAND ctid = ANY(ARRAY(\n  SELECT ctid FROM your_table\n  WHERE created_at < '2022-01-01' LIMIT 1000\n));\nROLLBACK;",
      "options": [
        {
          "label": "Regular bulk DELETE taking too long — need fast data expiry",
          "next": "rec_part_lifecycle"
        },
        {
          "label": "Need to retain data but archive it to cold storage",
          "next": "rec_part_lifecycle"
        },
        {
          "label": "Skip — show me partition-based data lifecycle management",
          "next": "rec_part_lifecycle",
          "skip": true
        }
      ]
    },
    "diag_part_pruning": {
      "id": "diag_part_pruning",
      "type": "diagnostic",
      "metric": "Partition pruning in EXPLAIN output",
      "question": "Check whether PostgreSQL is actually pruning partitions or scanning all of them",
      "context": "Partition pruning is the whole point of partitioning — the planner should skip partitions whose ranges don't match the WHERE clause. If the plan shows <code>Seq Scan on messages_2024_w01</code> only, pruning worked. If it shows <code>Append → Seq Scan on messages_2024_w01, Seq Scan on messages_2024_w02, ...</code> for ALL 52 weekly partitions, pruning <strong>failed</strong>. The most common causes: (1) the WHERE clause uses a function on the partition key (<code>DATE(created_at) = '2024-01-01'</code> won't prune a <code>RANGE (created_at)</code> partition), (2) the partition key is cast implicitly, (3) the parameter is not a constant at planning time.",
      "threshold": {
        "bad": "EXPLAIN shows Append node scanning all N partitions despite a selective WHERE — pruning failed",
        "ok": "EXPLAIN shows Append but only scanning a few relevant partitions — partial pruning",
        "good": "EXPLAIN shows direct scan of exactly the relevant partition(s) — full pruning"
      },
      "sql": "-- Check partition pruning in the query plan\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM messages\nWHERE created_at >= '2024-01-01'\nAND created_at < '2024-01-08';\n-- Good: shows only 'messages_2024_w01'\n-- Bad: shows Append with all 52 partitions\n\n-- Check if partitions exist\nSELECT tablename, pg_size_pretty(pg_total_relation_size(tablename::regclass))\nFROM pg_tables\nWHERE tablename LIKE 'messages_%'\nORDER BY tablename;\n\n-- Enable partition pruning (should be on by default)\nSHOW enable_partition_pruning;",
      "options": [
        {
          "label": "All partitions are being scanned — pruning is not happening",
          "next": "rec_part_pruning_fix"
        },
        {
          "label": "Pruning works but queries within the partition are still slow",
          "next": "rec_part_local_index"
        },
        {
          "label": "Skip — show me how to ensure pruning works",
          "next": "rec_part_pruning_fix",
          "skip": true
        }
      ]
    },
    "diag_part_decision": {
      "id": "diag_part_decision",
      "type": "diagnostic",
      "metric": "Table size, query pattern, and maintenance needs",
      "question": "Evaluate whether partitioning will actually help your situation",
      "context": "Partitioning has real costs: it adds planning overhead (scanning partition metadata), can complicate foreign keys, and requires careful index design on each child table. The benefits only materialise when partition pruning eliminates large chunks of data from query scans. The question is: do your queries consistently filter on a column that would be your partition key? If not, the planner can't prune — and you get overhead with no benefit.",
      "threshold": {
        "bad": "Table < 50M rows OR queries don't filter on a consistent column — partitioning will hurt more than help",
        "ok": "Table 50M–100M rows with occasional range filters — borderline, depends on query mix",
        "good": "Table > 100M rows AND >80% of queries filter on a consistent timestamp/date/ID column — strong candidate"
      },
      "sql": "-- Table size check\nSELECT\n  relname,\n  n_live_tup,\n  pg_size_pretty(pg_total_relation_size(oid)) AS total_size\nFROM pg_stat_user_tables\nORDER BY pg_total_relation_size(oid) DESC LIMIT 10;\n\n-- Query pattern check: what columns appear in WHERE clauses?\nSELECT LEFT(query, 200) AS query, calls, mean_exec_time\nFROM pg_stat_statements\nWHERE mean_exec_time > 50\nORDER BY total_exec_time DESC LIMIT 20;\n-- Look for consistent filter patterns (created_at, tenant_id, etc.)",
      "options": [
        {
          "label": "> 100M rows, queries consistently filter by date/time",
          "next": "rec_part_range_time"
        },
        {
          "label": "> 100M rows, queries consistently filter by tenant or category",
          "next": "rec_part_list"
        },
        {
          "label": "< 50M rows — partitioning not recommended yet",
          "next": "rec_part_not_needed"
        },
        {
          "label": "Skip — show me the partitioning decision matrix",
          "next": "rec_part_range_time",
          "skip": true
        }
      ]
    },
    "rec_part_range_time": {
      "id": "rec_part_range_time",
      "type": "recommendation",
      "title": "RANGE Partitioning by Timestamp — Best for Time-Series Data",
      "explanation": "RANGE partitioning on a timestamp column is the most common and effective strategy for event logs, messages, orders, and metrics. Weekly partitions work well for high-volume tables (50GB+ of new data per day). Monthly partitions work for moderate-volume tables. The <code>pg_partman</code> extension automates partition creation and maintenance — without it, you must create new partitions manually before data arrives.",
      "when_not_to": "Don't use RANGE partitioning if queries almost never filter by date — the planner can't prune and you get planning overhead with no benefit. Also avoid range partitioning if the timestamp column has many NULLs — NULL values don't match any partition range and inserts will fail unless you add a DEFAULT partition.",
      "sql_example": "-- Create the parent table\nCREATE TABLE messages (\n  id        BIGSERIAL,\n  room_id   INTEGER NOT NULL,\n  user_id   INTEGER NOT NULL,\n  content   TEXT NOT NULL,\n  created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()\n) PARTITION BY RANGE (created_at);\n\n-- Create weekly partitions\nCREATE TABLE messages_2024_w01\n  PARTITION OF messages\n  FOR VALUES FROM ('2024-01-01') TO ('2024-01-08');\n\nCREATE TABLE messages_2024_w02\n  PARTITION OF messages\n  FOR VALUES FROM ('2024-01-08') TO ('2024-01-15');\n\n-- Indexes must be created on each partition (or the parent)\nCREATE INDEX idx_messages_2024_w01_room_created\n  ON messages_2024_w01 (room_id, created_at DESC);\n\n-- Verify pruning works\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM messages\nWHERE created_at >= '2024-01-01' AND created_at < '2024-01-08';\n-- Should show: Seq Scan on messages_2024_w01 only\n\n-- Automated partition management with pg_partman\n-- SELECT partman.create_parent('public.messages', 'created_at', 'native', 'weekly');",
      "tags": [
        "partitioning",
        "time-series",
        "analytics"
      ],
      "source": "Advanced Partitioning PDF, PostgreSQL for Real-Time Apps PDF"
    },
    "rec_part_list": {
      "id": "rec_part_list",
      "type": "recommendation",
      "title": "LIST Partitioning by Tenant or Category",
      "explanation": "LIST partitioning assigns specific discrete values to each partition — ideal for multi-tenant databases (each tenant gets their own partition) or category-scoped data (each region or product category). Queries with <code>WHERE tenant_id = 123</code> or <code>WHERE region = 'EU'</code> instantly prune to the relevant partition. Each tenant's data is physically isolated, which also makes per-tenant VACUUM and archiving efficient.",
      "when_not_to": "LIST partitioning struggles with high cardinality partition keys (thousands of tenants — you'd need thousands of partitions). Beyond ~200–500 partitions, planning overhead becomes significant. For high-cardinality cases, use HASH partitioning instead.",
      "sql_example": "-- Multi-tenant LIST partitioning\nCREATE TABLE user_events (\n  id        BIGSERIAL,\n  tenant_id INTEGER NOT NULL,\n  user_id   INTEGER NOT NULL,\n  event_type TEXT NOT NULL,\n  created_at TIMESTAMP DEFAULT NOW()\n) PARTITION BY LIST (tenant_id);\n\n-- One partition per tenant (practical for < 200 tenants)\nCREATE TABLE user_events_tenant_1\n  PARTITION OF user_events FOR VALUES IN (1);\n\nCREATE TABLE user_events_tenant_2\n  PARTITION OF user_events FOR VALUES IN (2);\n\n-- Catch-all for new tenants\nCREATE TABLE user_events_default\n  PARTITION OF user_events DEFAULT;\n\n-- Verify pruning\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM user_events WHERE tenant_id = 1;\n-- Should show: Seq Scan on user_events_tenant_1 only",
      "tags": [
        "partitioning",
        "multi-tenant"
      ],
      "source": "Advanced Partitioning PDF"
    },
    "rec_part_hash": {
      "id": "rec_part_hash",
      "type": "recommendation",
      "title": "HASH Partitioning for Even Distribution Without a Range Key",
      "explanation": "HASH partitioning distributes rows evenly across N partitions using a hash of the partition key. Unlike RANGE or LIST, it doesn't enable pruning for range queries — the benefit is purely physical: smaller partitions mean smaller indexes that fit better in memory, and parallel operations can run per-partition. Best for large tables where queries are by primary key (hash of ID) or where the goal is to spread I/O load rather than prune by time or category.",
      "when_not_to": "Do not use HASH partitioning expecting query pruning — it only prunes when the WHERE clause specifies the exact hash key value. Also, once the number of partitions is chosen, changing it requires a full table rebuild.",
      "sql_example": "-- HASH partitioning on user_id for even distribution\nCREATE TABLE user_profiles (\n  user_id   BIGINT NOT NULL,\n  data      JSONB,\n  created_at TIMESTAMP DEFAULT NOW()\n) PARTITION BY HASH (user_id);\n\n-- 8 partitions for even distribution\nCREATE TABLE user_profiles_p0\n  PARTITION OF user_profiles FOR VALUES WITH (MODULUS 8, REMAINDER 0);\nCREATE TABLE user_profiles_p1\n  PARTITION OF user_profiles FOR VALUES WITH (MODULUS 8, REMAINDER 1);\n-- ... repeat for p2 through p7\n\n-- Benefits: each partition is 1/8 the size\n-- Indexes on each partition are smaller and fit in buffer cache better",
      "tags": [
        "partitioning",
        "distribution"
      ],
      "source": "Advanced Partitioning PDF"
    },
    "rec_part_lifecycle": {
      "id": "rec_part_lifecycle",
      "type": "recommendation",
      "title": "Partition-Based Data Lifecycle — Instant Drop vs Slow DELETE",
      "explanation": "With RANGE partitioning, deleting a year of old data becomes <code>DROP TABLE messages_2023</code> — completes in milliseconds, generates zero WAL, leaves no dead tuples, requires no VACUUM. Compare to <code>DELETE FROM messages WHERE created_at < '2024-01-01'</code> on a 500M-row table: hours of runtime, gigabytes of WAL, massive dead tuple accumulation, and hours of autovacuum recovery. The lifecycle pattern is: partition by time period → when period expires, detach and drop.",
      "when_not_to": "Don't drop partitions if you have foreign keys referencing them — FK constraints must be removed first. Also ensure your application doesn't hold long-running transactions that span the drop (snapshot isolation may prevent the drop from completing).",
      "sql_example": "-- Automated weekly partition creation function\nCREATE OR REPLACE FUNCTION create_weekly_partition()\nRETURNS void AS $$\nDECLARE\n  start_date DATE;\n  end_date   DATE;\n  part_name  TEXT;\nBEGIN\n  start_date := date_trunc('week', CURRENT_DATE + INTERVAL '1 week');\n  end_date   := start_date + INTERVAL '1 week';\n  part_name  := 'messages_' || to_char(start_date, 'YYYY_\"w\"WW');\n  EXECUTE format(\n    'CREATE TABLE IF NOT EXISTS %I PARTITION OF messages FOR VALUES FROM (%L) TO (%L)',\n    part_name, start_date, end_date\n  );\nEND;\n$$ LANGUAGE plpgsql;\n\n-- Drop old partitions instantly (no VACUUM needed)\nDROP TABLE IF EXISTS messages_2023_w01;  -- instant!\n\n-- Safe: detach first, then drop (preserves data briefly)\nALTER TABLE messages DETACH PARTITION messages_2023_w01;\nDROP TABLE messages_2023_w01;\n\n-- Schedule with pg_cron\n-- SELECT cron.schedule('create-weekly-partition', '0 2 * * 0', 'SELECT create_weekly_partition()');",
      "tags": [
        "partitioning",
        "lifecycle",
        "time-series"
      ],
      "source": "Advanced Partitioning PDF, PostgreSQL for Real-Time Apps PDF"
    },
    "rec_part_pruning_fix": {
      "id": "rec_part_pruning_fix",
      "type": "recommendation",
      "title": "Fix Partition Pruning — Ensure WHERE Clause Matches Partition Key",
      "explanation": "Pruning fails when the WHERE clause expression doesn't directly compare the partition key column to a constant. Common mistakes: <code>DATE(created_at) = '2024-01-01'</code> (function wraps the key — no pruning), <code>created_at::date = '2024-01-01'</code> (cast wraps the key — no pruning), using a parameter whose value isn't known at planning time. The fix: compare the column directly without wrapping it in a function, and ensure parameters are cast to match the column type exactly.",
      "when_not_to": "Pruning also won't work on inherited partition tables (old-style pre-PG10 partitioning). Ensure you're using declarative partitioning (PARTITION BY, introduced in PostgreSQL 10).",
      "sql_example": "-- WRONG: function on partition key — no pruning\nSELECT * FROM messages WHERE DATE(created_at) = '2024-01-05';\n\n-- RIGHT: direct comparison — pruning works\nSELECT * FROM messages\nWHERE created_at >= '2024-01-05'\nAND created_at < '2024-01-06';\n\n-- WRONG: implicit cast\nSELECT * FROM messages WHERE created_at::date = '2024-01-05';\n\n-- RIGHT: cast the constant, not the column\nSELECT * FROM messages\nWHERE created_at >= '2024-01-05'::timestamptz\nAND created_at < '2024-01-06'::timestamptz;\n\n-- Verify pruning is enabled\nSHOW enable_partition_pruning; -- should be 'on'\n\n-- Confirm pruning in plan\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM messages\nWHERE created_at >= '2024-01-01' AND created_at < '2024-01-08';\n-- Should show single partition, not Append with all partitions",
      "tags": [
        "partitioning",
        "pruning"
      ],
      "source": "Advanced Partitioning PDF"
    },
    "rec_part_local_index": {
      "id": "rec_part_local_index",
      "type": "recommendation",
      "title": "Add Local Indexes on Partitions for Sub-Partition Query Speed",
      "explanation": "Partition pruning eliminates whole partitions from the scan, but within the selected partition(s), you still need indexes for fast row lookup. Indexes created on the parent table are automatically inherited by child partitions (PostgreSQL 11+). Create the index on the parent and it propagates. For common query patterns like <code>WHERE room_id = ? AND created_at DESC</code>, a composite index on <code>(room_id, created_at DESC)</code> on the parent table will be present on every partition. Partial indexes on recent partitions can also dramatically reduce index size.",
      "when_not_to": "Don't create redundant indexes on both parent and individual child tables — they'll be duplicated. Use <code>CREATE INDEX ON parent_table (...)</code> and PostgreSQL propagates to all current and future partitions.",
      "sql_example": "-- Create index on parent — propagates to all partitions\nCREATE INDEX CONCURRENTLY idx_messages_room_created\nON messages (room_id, created_at DESC);\n\n-- Verify all partitions have the index\nSELECT tablename, indexname\nFROM pg_indexes\nWHERE tablename LIKE 'messages_%'\nAND indexname LIKE 'idx_messages_room_created%'\nORDER BY tablename;\n\n-- Partial index on the most recent (hot) partition only\n-- for the 95% of queries that only read recent messages:\nCREATE INDEX idx_messages_recent_room\nON messages_2024_w52 (room_id, created_at DESC)\nWHERE created_at > NOW() - INTERVAL '7 days';\n-- 1/10th the size, 95% of queries hit it",
      "tags": [
        "partitioning",
        "indexing"
      ],
      "source": "Advanced Partitioning PDF, PostgreSQL for Real-Time Apps PDF"
    },
    "rec_part_not_needed": {
      "id": "rec_part_not_needed",
      "type": "recommendation",
      "title": "Partitioning Not Recommended — Use Indexes Instead",
      "explanation": "For tables under 50M rows, well-designed indexes almost always outperform partitioning. Partitioning adds planning overhead (the planner must inspect partition metadata on every query), complicates foreign key constraints, and requires careful maintenance of per-partition indexes. The break-even point where partitioning starts paying off is roughly 100M+ rows with consistent filter patterns on the partition key. Below that, a composite index or partial index achieves the same goal with less complexity.",
      "when_not_to": "Reconsider partitioning if the table is growing rapidly and will reach 100M+ rows within the next 6–12 months — it's easier to partition now than to migrate later. Also reconsider if data lifecycle (bulk delete of old rows) is a pain point regardless of table size.",
      "sql_example": "-- Instead of partitioning a 10M-row table,\n-- add a well-designed composite index:\nCREATE INDEX CONCURRENTLY idx_orders_customer_date\nON orders (customer_id, created_at DESC)\nWHERE status != 'archived'; -- partial index for active rows only\n\n-- Check if this resolves your slow query\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM orders\nWHERE customer_id = 123\nAND created_at >= NOW() - INTERVAL '90 days'\nORDER BY created_at DESC\nLIMIT 50;",
      "tags": [
        "partitioning",
        "indexing"
      ],
      "source": "Advanced Partitioning PDF"
    },
    "par_sym_root": {
      "id": "par_sym_root",
      "type": "question",
      "question": "What parallelism symptom are you experiencing?",
      "context": "PostgreSQL can split certain queries across multiple CPU cores — parallel seq scans, parallel aggregates, parallel hash joins. The query planner decides if parallelism is worth it based on estimated cost and configuration limits. When it works, a 4-core parallel query can finish in 1/4 of the single-core time. When it doesn't fire, CPU sits idle while the query runs on one core.",
      "options": [
        {
          "label": "Large query is using only 1 CPU core — parallelism isn't activating",
          "next": "diag_par_not_firing"
        },
        {
          "label": "EXPLAIN shows 'Workers Planned: 2' but 'Workers Launched: 0'",
          "next": "diag_par_not_launched"
        },
        {
          "label": "Parallel queries are consuming too many resources",
          "next": "diag_par_resource"
        },
        {
          "label": "I want to tune parallelism settings proactively",
          "next": "diag_par_settings"
        }
      ]
    },
    "diag_par_not_firing": {
      "id": "diag_par_not_firing",
      "type": "diagnostic",
      "metric": "Parallel eligibility conditions",
      "question": "Check whether your query and table meet the conditions for parallelism to activate",
      "context": "The planner only considers parallelism when: (1) <code>max_parallel_workers_per_gather</code> > 0, (2) the estimated rows × cost exceeds <code>parallel_setup_cost</code> (default: 1000 cost units — roughly a ~7,000 row table), (3) the query doesn't have constructs that block parallelism (certain functions marked <code>PARALLEL UNSAFE</code>, <code>FOR UPDATE</code>, <code>LIMIT</code> in some cases), and (4) the table's <code>parallel_workers</code> setting isn't 0. If <code>Workers Planned: 0</code> appears in EXPLAIN, none of these conditions fired.",
      "threshold": {
        "bad": "Workers Planned: 0 on a large table query — parallelism not even being considered",
        "ok": "Workers Planned: 2, Workers Launched: 2, but Gather node overhead is high — parallelism firing but not helping",
        "good": "Workers Planned: 4, Workers Launched: 4, execution time reduced vs single-worker baseline"
      },
      "sql": "-- Check current parallel settings\nSHOW max_parallel_workers_per_gather;  -- 0 = parallelism disabled\nSHOW max_parallel_workers;\nSHOW max_worker_processes;\nSHOW parallel_setup_cost;\nSHOW parallel_tuple_cost;\nSHOW min_parallel_table_scan_size;\n\n-- Check if parallelism is firing for your query\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT COUNT(*), AVG(total) FROM orders\nWHERE created_at >= '2024-01-01';\n-- Look for: 'Gather' node with Workers Planned / Workers Launched\n-- 'Parallel Seq Scan' or 'Parallel Hash' means it's working\n\n-- Check if a specific table blocks parallelism\nSELECT relname, reloptions\nFROM pg_class WHERE relname = 'orders';\n-- parallel_workers=0 in reloptions means parallelism disabled for this table",
      "options": [
        {
          "label": "max_parallel_workers_per_gather is 0 — parallelism globally disabled",
          "next": "rec_par_enable"
        },
        {
          "label": "Workers Planned: 0 — table too small or cost too low",
          "next": "rec_par_threshold"
        },
        {
          "label": "Workers Planned > 0 but Workers Launched: 0",
          "next": "diag_par_not_launched"
        },
        {
          "label": "Skip — show me how to enable and tune parallelism",
          "next": "rec_par_enable",
          "skip": true
        }
      ]
    },
    "diag_par_not_launched": {
      "id": "diag_par_not_launched",
      "type": "diagnostic",
      "metric": "Worker process availability vs configuration limits",
      "question": "Check whether worker processes are available to be launched",
      "context": "<code>Workers Planned: 2  Workers Launched: 0</code> means the planner wanted parallel workers but couldn't get any at runtime. This almost always means the <code>max_worker_processes</code> pool is exhausted — all worker slots are occupied by other queries or background tasks. <code>max_worker_processes</code> is the total process budget; <code>max_parallel_workers</code> is the subset reserved for query parallelism; <code>max_parallel_workers_per_gather</code> is per-query. If <code>max_worker_processes = 8</code> and autovacuum is using 3 + logical replication is using 3, only 2 remain for query workers.",
      "threshold": {
        "bad": "Workers Planned: N, Workers Launched: 0 — no workers available at runtime",
        "ok": "Workers Planned: 4, Workers Launched: 2 — partial parallelism, still better than none",
        "good": "Workers Planned: N, Workers Launched: N — full parallelism achieved"
      },
      "sql": "-- Check current process budget\nSHOW max_worker_processes;           -- total process budget\nSHOW max_parallel_workers;           -- subset for query workers\nSHOW max_parallel_workers_per_gather; -- per query max\n\n-- Check who is using worker processes right now\nSELECT backend_type, COUNT(*)\nFROM pg_stat_activity\nGROUP BY backend_type\nORDER BY count DESC;\n-- Look for: autovacuum worker, logical replication worker, walsender\n\n-- Check autovacuum worker count\nSHOW autovacuum_max_workers;\n\n-- Budget calculation:\n-- Available for parallelism = max_worker_processes\n--   - autovacuum_max_workers\n--   - replication workers\n--   - background workers (extensions)",
      "options": [
        {
          "label": "max_worker_processes is too low — pool is exhausted",
          "next": "rec_par_worker_budget"
        },
        {
          "label": "Autovacuum or replication consuming all worker slots",
          "next": "rec_par_worker_budget"
        },
        {
          "label": "Skip — show me how to fix worker launch failure",
          "next": "rec_par_worker_budget",
          "skip": true
        }
      ]
    },
    "diag_par_resource": {
      "id": "diag_par_resource",
      "type": "diagnostic",
      "metric": "CPU and memory impact of parallel queries",
      "question": "Check whether parallel queries are over-consuming CPU or memory",
      "context": "Parallel queries can use <strong>N times</strong> the memory of a single-worker query — each worker gets its own <code>work_mem</code> budget for sort and hash operations within the parallel portion. A query with <code>max_parallel_workers_per_gather = 8</code> and <code>work_mem = 256MB</code> can consume 2GB+ of RAM just for that one query. On busy OLTP servers, too much parallelism also causes CPU contention as many workers compete with each other and with regular connections.",
      "threshold": {
        "bad": "Parallel queries visibly degrading OLTP latency or triggering OOM — too many workers per query",
        "ok": "Some CPU contention during analytics queries but OLTP latency only slightly elevated",
        "good": "Analytics queries use full cores without impacting OLTP connections"
      },
      "sql": "-- Check how many parallel queries are running right now\nSELECT pid, query_start, state, LEFT(query, 80) AS query\nFROM pg_stat_activity\nWHERE backend_type = 'parallel worker'\nORDER BY query_start;\n\n-- Check memory usage per connection\nSELECT\n  application_name,\n  state,\n  wait_event_type,\n  LEFT(query, 60) AS query\nFROM pg_stat_activity\nWHERE state != 'idle'\nORDER BY query_start;",
      "options": [
        {
          "label": "Too many workers per query — need to cap per-query parallelism",
          "next": "rec_par_limit"
        },
        {
          "label": "Specific table or query is too aggressive — want to disable just for that",
          "next": "rec_par_disable_table"
        },
        {
          "label": "Skip — show me how to reduce parallel resource impact",
          "next": "rec_par_limit",
          "skip": true
        }
      ]
    },
    "diag_par_settings": {
      "id": "diag_par_settings",
      "type": "diagnostic",
      "metric": "Current parallelism configuration vs CPU count",
      "question": "Check your current parallel settings against the number of available CPU cores",
      "context": "A good baseline for parallel settings: <code>max_worker_processes = number_of_CPUs</code>, <code>max_parallel_workers = number_of_CPUs</code>, <code>max_parallel_workers_per_gather = half_of_CPUs</code>. This leaves half the CPUs for OLTP queries while allowing analytics to use the other half. <code>parallel_setup_cost</code> and <code>parallel_tuple_cost</code> control how aggressively the planner uses parallelism — lower values favour it, higher values reserve it for truly expensive operations.",
      "threshold": {
        "bad": "max_parallel_workers_per_gather = 2 on a 32-core server — massively underutilising hardware",
        "ok": "max_parallel_workers_per_gather = 4–8 on a 16-core server — reasonable baseline",
        "good": "max_parallel_workers_per_gather = half of available cores, with OLTP queries unaffected"
      },
      "sql": "-- Current settings\nSHOW max_worker_processes;\nSHOW max_parallel_workers;\nSHOW max_parallel_workers_per_gather;\nSHOW parallel_setup_cost;\nSHOW parallel_tuple_cost;\nSHOW min_parallel_table_scan_size;\n\n-- Count available CPUs (Linux)\n-- nproc\n-- Or check pg_config:\nSELECT COUNT(*) FROM generate_series(1, 100) -- not useful\n-- Use: SELECT current_setting('max_worker_processes') to see current limit",
      "options": [
        {
          "label": "Settings look low for my CPU count — want to increase",
          "next": "rec_par_tune"
        },
        {
          "label": "Settings look right but parallelism isn't firing",
          "next": "diag_par_not_firing"
        },
        {
          "label": "Skip — show me the recommended settings for my server",
          "next": "rec_par_tune",
          "skip": true
        }
      ]
    },
    "rec_par_enable": {
      "id": "rec_par_enable",
      "type": "recommendation",
      "title": "Enable Parallelism — Set max_parallel_workers_per_gather > 0",
      "explanation": "The quickest parallelism enablement is setting <code>max_parallel_workers_per_gather = 2</code>. This immediately allows the planner to assign 2 workers to eligible queries (large seq scans, aggregates). Combined with <code>max_parallel_workers = max_worker_processes</code>, this unlocks CPU-level scaling for analytics queries with no schema changes. After enabling, run EXPLAIN on your slow analytics queries to confirm a <code>Gather</code> node appears — that's the collector that gathers results from parallel workers.",
      "when_not_to": "Do not enable parallelism on databases with very high concurrent OLTP load and limited CPUs — parallel workers contend with OLTP connections for CPU time. On a 4-core server with 200 OLTP connections, parallelism may hurt more than help.",
      "sql_example": "-- In postgresql.conf (no restart needed):\nmax_worker_processes = 16          -- total background process budget\nmax_parallel_workers = 16          -- subset for query parallelism\nmax_parallel_workers_per_gather = 4 -- per-query maximum\nparallel_setup_cost = 1000          -- default: don't parallelize tiny queries\nparallel_tuple_cost = 0.1           -- per-tuple overhead across processes\nmin_parallel_table_scan_size = '8MB' -- minimum table size to consider\n\n-- Reload\nSELECT pg_reload_conf();\n\n-- Verify parallelism fires\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT COUNT(*), SUM(total) FROM orders;\n-- Should show: Gather  (Workers Planned: 4  Workers Launched: 4)\n--              → Parallel Seq Scan on orders",
      "tags": [
        "parallelism",
        "analytics"
      ],
      "source": "Parallel Query Magic PDF"
    },
    "rec_par_threshold": {
      "id": "rec_par_threshold",
      "type": "recommendation",
      "title": "Lower the Parallel Threshold for Smaller Tables",
      "explanation": "The planner won't use parallelism unless the estimated cost exceeds <code>parallel_setup_cost</code> (default: 1000 cost units, roughly a 7,000-row table). For many workloads, the crossover point should be much lower. Reduce <code>parallel_setup_cost</code> and <code>min_parallel_table_scan_size</code> to let the planner consider parallelism for smaller tables. Also reduce <code>min_parallel_index_scan_size</code> if you want parallel index scans.",
      "when_not_to": "Don't set <code>parallel_setup_cost</code> to 0 — the setup cost is real (forking workers takes time). Setting it too low causes the planner to parallelize tiny queries where the coordination overhead exceeds the benefit.",
      "sql_example": "-- Lower thresholds to allow parallelism on medium-sized tables\n-- In postgresql.conf:\nparallel_setup_cost = 500          -- was 1000 (fire earlier)\nmin_parallel_table_scan_size = '4MB' -- was 8MB\nmin_parallel_index_scan_size = '256kB' -- was 512kB\n\nSELECT pg_reload_conf();\n\n-- Test on your medium-sized table\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT COUNT(*) FROM medium_table WHERE status = 'active';\n-- Did a Gather / Parallel Seq Scan appear?",
      "tags": [
        "parallelism",
        "analytics"
      ],
      "source": "Parallel Query Magic PDF"
    },
    "rec_par_worker_budget": {
      "id": "rec_par_worker_budget",
      "type": "recommendation",
      "title": "Increase max_worker_processes to Fix 'Workers Launched: 0'",
      "explanation": "<code>max_worker_processes</code> is the total PostgreSQL process budget — shared between parallel query workers, autovacuum workers, logical replication workers, and background workers from extensions. When this pool is full, new worker requests fail silently and <code>Workers Launched: 0</code> results. The fix: increase <code>max_worker_processes</code>, then set <code>max_parallel_workers</code> to the portion reserved for query parallelism. A PostgreSQL restart is required to change <code>max_worker_processes</code>.",
      "when_not_to": "Each worker process consumes RAM (a few MB for the process itself). On memory-constrained servers, be careful not to set this so high that workers OOM. Also ensure you're not mistaking 'Workers Launched: 0 during off-peak' for a true bug — workers may launch fine during peak load.",
      "sql_example": "-- Calculate your worker budget:\n-- autovacuum_max_workers (default: 3)\n-- + logical replication workers\n-- + extension background workers\n-- + desired parallel query workers\n-- = max_worker_processes\n\n-- Example for a server with 16 cores:\n-- 3 autovacuum + 2 replication + 1 extension + 8 parallel = 14\nmax_worker_processes = 16       -- requires PostgreSQL restart\nmax_parallel_workers = 8        -- subset of above for query parallelism\nmax_parallel_workers_per_gather = 4\n\n-- Restart required for max_worker_processes change:\n-- sudo systemctl restart postgresql\n\n-- Verify after restart\nSHOW max_worker_processes;\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT COUNT(*) FROM large_table;\n-- Should now show Workers Launched: 4 (or whatever you configured)",
      "tags": [
        "parallelism",
        "configuration"
      ],
      "source": "Parallel Query Magic PDF"
    },
    "rec_par_limit": {
      "id": "rec_par_limit",
      "type": "recommendation",
      "title": "Limit Per-Query Parallelism to Protect OLTP Latency",
      "explanation": "On mixed OLTP + analytics servers, uncapped parallelism from analytics queries can starve OLTP connections of CPU. The solution: cap per-query parallelism globally and give analytics roles a higher limit via <code>ALTER ROLE</code>. This lets regular OLTP queries run on 1 worker (fast, light) while analytics roles can request more workers per query.",
      "when_not_to": "Don't cap parallelism so low that analytics queries can't benefit — a cap of 1 is essentially disabling it. Find the right balance by measuring OLTP p99 latency under concurrent analytics load.",
      "sql_example": "-- Global conservative cap (protects OLTP)\n-- In postgresql.conf:\nmax_parallel_workers_per_gather = 2  -- max 2 workers per query globally\n\n-- Analytics role gets more workers\nALTER ROLE analyst SET max_parallel_workers_per_gather = 8;\n\n-- Per-session override for a specific large query\nSET max_parallel_workers_per_gather = 8;\nSELECT ... your heavy analytics query ...;\nRESET max_parallel_workers_per_gather;\n\n-- Monitor OLTP latency during analytics load\nSELECT mean_exec_time, calls, LEFT(query, 60)\nFROM pg_stat_statements\nWHERE calls > 1000\nORDER BY mean_exec_time DESC LIMIT 10;",
      "tags": [
        "parallelism",
        "OLTP",
        "analytics"
      ],
      "source": "Parallel Query Magic PDF"
    },
    "rec_par_disable_table": {
      "id": "rec_par_disable_table",
      "type": "recommendation",
      "title": "Disable Parallelism for a Specific Table or Query",
      "explanation": "Some tables should never use parallelism — very small lookup tables, tables accessed via simple PK lookups, or tables where the overhead of launching workers exceeds any benefit. Set <code>parallel_workers = 0</code> on the table to permanently opt it out. For a specific query, use a session-level override. Never use <code>SET enable_parallel_query = OFF</code> globally in production — it affects all queries.",
      "when_not_to": "Don't disable parallelism on large tables accessed by analytics queries — you'll lose significant throughput. Only disable it for tables you've verified via EXPLAIN that the Gather overhead isn't worth it.",
      "sql_example": "-- Disable parallelism for a specific table\nALTER TABLE small_lookup_table SET (parallel_workers = 0);\n\n-- Re-enable parallelism for a table\nALTER TABLE small_lookup_table RESET (parallel_workers);\n\n-- Disable for a specific session/query (diagnostic)\nSET max_parallel_workers_per_gather = 0;\n-- Run the specific query...\nRESET max_parallel_workers_per_gather;\n\n-- Check which tables have parallelism disabled\nSELECT relname, reloptions\nFROM pg_class\nWHERE reloptions::text LIKE '%parallel_workers%'\nAND relkind = 'r';",
      "tags": [
        "parallelism",
        "table-level"
      ],
      "source": "Parallel Query Magic PDF"
    },
    "rec_par_tune": {
      "id": "rec_par_tune",
      "type": "recommendation",
      "title": "Tuned Parallelism Configuration for Your Server",
      "explanation": "The recommended starting configuration: <code>max_worker_processes</code> = total CPUs, <code>max_parallel_workers</code> = total CPUs, <code>max_parallel_workers_per_gather</code> = half of CPUs. This lets a single analytics query use half the machine while always leaving half the cores free for OLTP. Tune <code>parallel_setup_cost</code> down from 1000 to 500 if you want parallelism to activate on smaller tables. Enable <code>enable_parallel_hash = ON</code> for parallel hash joins (PostgreSQL 11+).",
      "when_not_to": "Don't use these settings on a server with > 200 concurrent OLTP connections and < 8 CPUs — workers will contend with connections. Use a read replica for analytics instead.",
      "sql_example": "-- Recommended parallel configuration (16-core server)\n-- In postgresql.conf:\nmax_worker_processes = 16\nmax_parallel_workers = 16\nmax_parallel_workers_per_gather = 8  -- half of cores per query\nparallel_setup_cost = 500            -- lower threshold\nparallel_tuple_cost = 0.1\nmin_parallel_table_scan_size = '4MB'\nenable_parallel_hash = on            -- parallel hash joins (PG11+)\n\n-- Reload\nSELECT pg_reload_conf();\n\n-- Verify with a large aggregate query\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT date_trunc('day', created_at), COUNT(*), SUM(total)\nFROM orders\nWHERE created_at >= '2024-01-01'\nGROUP BY 1 ORDER BY 1;\n-- Should show: Gather with 8 Workers Launched",
      "tags": [
        "parallelism",
        "analytics",
        "configuration"
      ],
      "source": "Parallel Query Magic PDF"
    },
    "rw_sym_root": {
      "id": "rw_sym_root",
      "type": "question",
      "question": "What kind of query rewriting problem are you dealing with?",
      "context": "Query rewriting addresses structural anti-patterns in SQL that cause exponential or unnecessary work — even with perfect indexes. These are logical problems, not configuration problems.",
      "options": [
        {
          "label": "Subquery in SELECT or WHERE runs once per row",
          "next": "diag_rw_correlated"
        },
        {
          "label": "Query uses OFFSET/LIMIT for pagination and gets slower on later pages",
          "next": "diag_rw_offset"
        },
        {
          "label": "IN (...) list with hundreds or thousands of values",
          "next": "diag_rw_in_list"
        },
        {
          "label": "CTE (WITH clause) is slow or the planner won't optimize it",
          "next": "diag_rw_cte"
        },
        {
          "label": "Getting top-N rows per group (e.g. latest order per customer)",
          "next": "diag_rw_topn"
        }
      ]

    "diag_rw_correlated": {

    "rec_rw_lateral": {
      "id": "rec_rw_lateral",
      "type": "recommendation",
      "title": "Rewrite Correlated Subquery as LATERAL Join",
      "priority": "high",
      "explanation": "A LATERAL join evaluates once per outer row (like a correlated subquery) but the planner can use hash or merge strategies, push predicates, and apply indexes properly. Use CROSS JOIN LATERAL or LEFT JOIN LATERAL depending on whether you need rows with no match.",
      "steps": [
        "Identify the correlated column reference in the subquery (e.g. o.customer_id).",
        "Move the subquery into a LATERAL subquery in the FROM clause.",
        "Join on a constant TRUE (for CROSS JOIN LATERAL) or use LEFT JOIN LATERAL ... ON TRUE for optional rows.",
        "Run EXPLAIN ANALYZE to verify the SubPlan node is gone and replaced with a Hash Join or Nested Loop with Index Scan."
      ],
      "code": "-- BEFORE (correlated subquery — O(n²)):\nSELECT o.*, recent.total_spent\nFROM orders o\nWHERE o.status = 'active'\n  AND (SELECT SUM(amount) FROM payments p WHERE p.order_id = o.id) > 1000;\n\n-- AFTER (LATERAL join — single pass with proper join strategy):\nSELECT o.*, lat.total_spent\nFROM orders o\nCROSS JOIN LATERAL (\n  SELECT SUM(amount) AS total_spent\n  FROM payments p\n  WHERE p.order_id = o.id  -- correlated ref moved here\n) lat\nWHERE o.status = 'active'\n  AND lat.total_spent > 1000;\n\n-- For optional matches (may return NULL):\nLEFT JOIN LATERAL (\n  SELECT ...\n) lat ON TRUE",
      "expected_impact": "Eliminates O(n²) subquery re-execution. Typically 10–1000× improvement for large outer result sets. Planner can now use Hash Join instead of nested SubPlan evaluation."
    },

      "explanation": "When the outer query returns very few rows (< 100), a correlated subquery has low total cost even though it executes once per row. It is not worth rewriting today, but it will become a problem if the outer set grows.",
      "steps": [
        "Add a comment in the query noting it uses a correlated subquery.",
        "Ensure the outer WHERE clause has good selectivity and uses indexes.",
        "Set a monitoring alert for when the outer query row count exceeds 500.",
        "Plan to rewrite as LATERAL join if growth is expected."
      ],
      "code": "-- Acceptable pattern when outer_table returns < 100 rows:\n-- Add index on correlated column in subquery table:\nCREATE INDEX ON payments(order_id);  -- ensures subquery is fast per invocation\n\n-- Verify outer selectivity:\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT COUNT(*) FROM orders WHERE status = 'active';  -- should be small",
      "expected_impact": "No immediate change needed. Ensures the pattern stays acceptable as the dataset grows by maintaining proper indexing."
    },
    "rec_rw_keyset": {
      "id": "rec_rw_keyset",
      "type": "recommendation",
      "title": "Replace OFFSET Pagination with Keyset (Cursor) Pagination",
      "priority": "high",
      "explanation": "Keyset pagination uses the last seen value of the sort column as a WHERE clause filter instead of OFFSET. This lets PostgreSQL use an index seek directly to the correct position — O(1) regardless of page number. It requires a stable sort key (usually a unique, indexed column like id or created_at).",
      "steps": [
        "Add a composite index on (sort_column, id) if not present.",
        "In your application, store the last seen sort_column value and id from each page.",
        "Replace OFFSET N LIMIT M with WHERE sort_column < :last_value ORDER BY sort_column DESC LIMIT M.",
        "For ties in sort_column, add a tiebreaker: AND (sort_column, id) < (:last_val, :last_id).",
        "Verify EXPLAIN shows Index Scan with small actual rows equal to LIMIT."
      ],
      "code": "-- BEFORE (OFFSET — reads 10,020 rows to return 20):\nSELECT id, created_at, title\nFROM articles\nORDER BY created_at DESC, id DESC\nOFFSET 10000 LIMIT 20;\n\n-- AFTER (Keyset — reads exactly 20 rows):\n-- Application stores: last_created_at = '2024-01-15 10:30:00', last_id = 4521\nSELECT id, created_at, title\nFROM articles\nWHERE (created_at, id) < ('2024-01-15 10:30:00', 4521)  -- cursor position\nORDER BY created_at DESC, id DESC\nLIMIT 20;\n\n-- Required index:\nCREATE INDEX idx_articles_keyset ON articles(created_at DESC, id DESC);\n\n-- Application pattern (Python example):\n-- page1 = execute('SELECT ... ORDER BY created_at DESC, id DESC LIMIT 20')\n-- last = page1[-1]\n-- page2 = execute('SELECT ... WHERE (created_at,id) < (%s,%s) ... LIMIT 20', [last.created_at, last.id])",
      "expected_impact": "Constant O(1) page cost regardless of page depth. Page 1000 is as fast as page 1. Eliminates the linear scan growth that makes OFFSET unusable at scale."
    },

      "type": "recommendation",
      "title": "Small OFFSET — Ensure Proper Index on Sort Column",
