<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PostgreSQL Optimization Decision Tree</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3348;
    --accent: #4F46E5;
    --accent-light: #818cf8;
    --text: #e2e8f0;
    --text-muted: #8892a4;
    --text-dim: #4a5568;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --code-bg: #0d1117;
    --radius: 10px;
  }

  /* ── Light theme overrides ── */
  html.light {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface2: #eef0f7;
    --border: #d6dae8;
    --accent: #4F46E5;
    --accent-light: #6366f1;
    --text: #1a202c;
    --text-muted: #4a5568;
    --text-dim: #a0aec0;
    --green: #059669;
    --yellow: #d97706;
    --red: #dc2626;
    --code-bg: #eef0f7;
  }

  /* Light-mode SQL highlighting adjustments */
  html.light .kw { color: #7c3aed; }
  html.light .fn  { color: #1d4ed8; }
  html.light .str { color: #15803d; }
  html.light .cmt { color: #94a3b8; }
  html.light .num { color: #c2410c; }
  html.light .op  { color: #0369a1; }
  html.light pre  { color: #1a202c; }

  html.light .context code { background: rgba(0,0,0,.06); color: #4f46e5; }
  html.light .code-header  { background: rgba(0,0,0,.03); }
  html.light .warning-box  { background: rgba(245,158,11,.06); }
  html.light .rec-header   { background: linear-gradient(135deg, rgba(79,70,229,.1), rgba(79,70,229,.02)); }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky; top: 0; z-index: 100;
  }
  header .logo { font-size: 26px; }
  header h1 { font-size: 18px; font-weight: 700; color: var(--text); }
  header p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .badge {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: .5px;
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 61px);
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sidebar-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    text-transform: uppercase;
    padding: 0 8px 10px;
  }
  .topic-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
    background: transparent;
    cursor: pointer;
    text-align: left;
    width: 100%;
    transition: background .15s;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
  }
  .topic-btn:hover { background: var(--surface2); color: var(--text); }
  .topic-btn.active {
    background: rgba(79,70,229,.15);
    color: var(--accent-light);
    border: 1px solid rgba(79,70,229,.3);
  }
  .topic-btn.locked { opacity: .38; cursor: not-allowed; }
  .topic-btn .icon { font-size: 16px; flex-shrink: 0; }
  .topic-btn .num {
    font-size: 10px;
    background: var(--surface2);
    border-radius: 4px;
    padding: 2px 5px;
    margin-left: auto;
    color: var(--text-dim);
  }
  .topic-btn.active .num { background: rgba(79,70,229,.25); color: var(--accent-light); }
  .topic-btn.done .num { background: rgba(16,185,129,.15); color: var(--green); }

  /* ── Main ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ── Breadcrumb ── */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 28px;
    min-height: 24px;
  }
  .crumb {
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 5px;
    border: 1px solid transparent;
    transition: all .15s;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .crumb:hover { border-color: var(--border); color: var(--text); background: var(--surface2); }
  .crumb.current { color: var(--accent-light); cursor: default; }
  .crumb.current:hover { border-color: transparent; background: transparent; }
  .crumb-sep { color: var(--text-dim); font-size: 12px; }
  .crumb-home { cursor: pointer; color: var(--text-muted); font-size: 14px; }
  .crumb-home:hover { color: var(--text); }

  /* ── Question card ── */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-bottom: 24px;
    animation: fadeIn .2s ease;
  }
  .question-card .q-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent-light);
    margin-bottom: 10px;
  }
  .question-card h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 14px;
  }
  .question-card .context {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    padding: 12px 16px;
  }
  .context code {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 11px;
    background: rgba(255,255,255,.06);
    padding: 1px 5px;
    border-radius: 3px;
    color: #a5b4fc;
  }

  /* ── Options ── */
  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
    animation: fadeIn .2s ease;
  }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    transition: all .15s;
    width: 100%;
  }
  .option-btn:hover {
    border-color: var(--accent);
    background: rgba(79,70,229,.08);
    transform: translateX(3px);
  }
  .option-btn .arrow {
    margin-left: auto;
    color: var(--text-dim);
    font-size: 16px;
    flex-shrink: 0;
    transition: transform .15s;
  }
  .option-btn:hover .arrow { transform: translateX(3px); color: var(--accent-light); }
  .option-btn .opt-icon {
    width: 32px; height: 32px;
    background: rgba(79,70,229,.12);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    color: var(--accent-light);
    font-weight: 700;
  }

  /* ── Recommendation card ── */
  .rec-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeIn .2s ease;
    margin-bottom: 24px;
  }
  .rec-header {
    background: linear-gradient(135deg, rgba(79,70,229,.2), rgba(79,70,229,.05));
    border-bottom: 1px solid var(--border);
    padding: 22px 28px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .rec-icon {
    width: 44px; height: 44px;
    background: rgba(79,70,229,.2);
    border: 1px solid rgba(79,70,229,.4);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .rec-header-text .r-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 6px;
  }
  .rec-header-text h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }
  .rec-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; }

  .rec-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .rec-explanation {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
  }
  .rec-explanation strong { color: var(--text); }

  .warning-box {
    background: rgba(245,158,11,.07);
    border: 1px solid rgba(245,158,11,.25);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #fbbf24;
    line-height: 1.6;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .warning-box .w-icon { flex-shrink: 0; margin-top: 1px; }

  /* ── Tags ── */
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid;
  }
  .tag-oltp { background: rgba(79,70,229,.1); color: #818cf8; border-color: rgba(79,70,229,.3); }
  .tag-analytics { background: rgba(16,185,129,.1); color: #6ee7b7; border-color: rgba(16,185,129,.3); }
  .tag-write { background: rgba(239,68,68,.1); color: #fca5a5; border-color: rgba(239,68,68,.3); }
  .tag-read { background: rgba(16,185,129,.1); color: #6ee7b7; border-color: rgba(16,185,129,.3); }
  .tag-default { background: rgba(255,255,255,.05); color: var(--text-muted); border-color: var(--border); }

  .source-line {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* ── Code block ── */
  .code-wrap {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: rgba(255,255,255,.03);
    border-bottom: 1px solid var(--border);
  }
  .code-header span { font-size: 11px; color: var(--text-dim); font-family: monospace; }
  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-muted);
    font-size: 11px;
    padding: 3px 8px;
    cursor: pointer;
    transition: all .15s;
  }
  .copy-btn:hover { background: var(--surface2); color: var(--text); }
  .copy-btn.copied { color: var(--green); border-color: var(--green); }
  pre {
    padding: 16px 18px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    font-size: 12.5px;
    line-height: 1.65;
    color: #e2e8f0;
    white-space: pre;
  }

  /* SQL syntax highlighting */
  .kw { color: #c792ea; font-weight: 600; }
  .fn { color: #82aaff; }
  .str { color: #c3e88d; }
  .cmt { color: #546e7a; font-style: italic; }
  .num { color: #f78c6c; }
  .op { color: #89ddff; }

  /* ── Back button ── */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    margin-bottom: 24px;
    transition: all .15s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--text); background: rgba(79,70,229,.08); }

  /* ── Restart button ── */
  .restart-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(79,70,229,.12);
    border: 1px solid rgba(79,70,229,.3);
    border-radius: 8px;
    color: var(--accent-light);
    font-size: 13px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all .15s;
    font-weight: 600;
  }
  .restart-btn:hover { background: rgba(79,70,229,.22); }

  /* ── Coming soon ── */
  .coming-soon {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    color: var(--text-dim);
    padding: 60px 40px;
    text-align: center;
  }
  .coming-soon .cs-icon { font-size: 48px; opacity: .4; }
  .coming-soon h3 { font-size: 18px; color: var(--text-muted); }
  .coming-soon p { font-size: 13px; max-width: 380px; line-height: 1.6; }

  /* ── Progress bar ── */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    border-radius: 2px;
    transition: width .3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Diagnostic step card ── */
  .diag-card {
    background: var(--surface);
    border: 1px solid rgba(245,158,11,.35);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeIn .2s ease;
    margin-bottom: 24px;
  }
  .diag-header {
    background: linear-gradient(135deg, rgba(245,158,11,.12), rgba(245,158,11,.03));
    border-bottom: 1px solid rgba(245,158,11,.2);
    padding: 20px 28px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .diag-icon {
    width: 40px; height: 40px;
    background: rgba(245,158,11,.15);
    border: 1px solid rgba(245,158,11,.35);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .diag-header-text .d-step {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: #f59e0b; margin-bottom: 5px;
  }
  .diag-header-text h2 { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .diag-body { padding: 22px 28px; display: flex; flex-direction: column; gap: 18px; }

  .diag-explanation {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
  }
  .diag-explanation strong { color: var(--text); }

  /* Threshold grid */
  .threshold-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  @media (max-width: 700px) { .threshold-grid { grid-template-columns: 1fr; } }
  .threshold-cell {
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    line-height: 1.5;
  }
  .threshold-cell .th-label {
    font-size: 10px; font-weight: 700; letter-spacing: .8px;
    text-transform: uppercase; margin-bottom: 6px;
    display: flex; align-items: center; gap: 5px;
  }
  .threshold-bad  { background: rgba(239,68,68,.07);   border: 1px solid rgba(239,68,68,.25); color: #fca5a5; }
  .threshold-ok   { background: rgba(245,158,11,.07);  border: 1px solid rgba(245,158,11,.25); color: #fbbf24; }
  .threshold-good { background: rgba(16,185,129,.07);  border: 1px solid rgba(16,185,129,.25); color: #6ee7b7; }
  .threshold-bad  .th-label { color: #f87171; }
  .threshold-ok   .th-label { color: #fbbf24; }
  .threshold-good .th-label { color: #34d399; }
  html.light .threshold-bad  { color: #b91c1c; }
  html.light .threshold-ok   { color: #92400e; }
  html.light .threshold-good { color: #065f46; }
  html.light .threshold-bad  .th-label { color: #dc2626; }
  html.light .threshold-ok   .th-label { color: #d97706; }
  html.light .threshold-good .th-label { color: #059669; }

  /* Collapsible SQL block */
  .diag-sql-toggle {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 7px;
    color: var(--text-muted);
    font-size: 12px;
    padding: 8px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all .15s;
    width: fit-content;
  }
  .diag-sql-toggle:hover { border-color: var(--accent); color: var(--accent-light); }
  .diag-sql-container { display: none; }
  .diag-sql-container.open { display: block; animation: fadeIn .15s ease; }

  /* Skip button */
  .skip-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px dashed var(--text-dim);
    border-radius: 7px;
    color: var(--text-dim);
    font-size: 12px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all .15s;
    font-style: italic;
  }
  .skip-btn:hover { border-color: var(--text-muted); color: var(--text-muted); }

  /* "I don't know where to start" entry button */
  .guided-entry-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    border-radius: 8px;
    border: 1px dashed rgba(245,158,11,.4);
    background: rgba(245,158,11,.05);
    cursor: pointer;
    text-align: left;
    width: 100%;
    color: #f59e0b;
    font-size: 13px;
    font-weight: 600;
    transition: all .15s;
    margin-bottom: 10px;
  }
  .guided-entry-btn:hover { background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.7); }
  html.light .guided-entry-btn { color: #b45309; border-color: rgba(180,83,9,.4); background: rgba(180,83,9,.05); }
  html.light .guided-entry-btn:hover { background: rgba(180,83,9,.1); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* ── Theme toggle button ── */
  .theme-toggle {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: background .15s, border-color .15s, transform .15s;
    flex-shrink: 0;
  }
  .theme-toggle:hover { background: var(--border); transform: scale(1.08); }
</style>
</head>
<body>

<header>
  <div class="logo">🐘</div>
  <div>
    <h1>PostgreSQL Optimization Decision Tree</h1>
    <p>Interactive guide to choosing the right optimization for your problem</p>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle light / dark theme" aria-label="Toggle theme">
    <span id="themeIcon">☀️</span>
  </button>
  <span class="badge">v1.0 — All 11 Subtopics</span>
</header>

<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar">
    <button class="guided-entry-btn" onclick="selectTopic('guided')" title="Start from a symptom — we'll guide you to the right diagnosis">
      <span>🧭</span> I don't know where to start
    </button>
    <div class="sidebar-title">Optimization Topics</div>
    <button class="topic-btn active done" onclick="selectTopic('indexing')">
      <span class="icon">🗂️</span> Indexing Strategy
      <span class="num">✓</span>
    </button>
    <button class="topic-btn" onclick="selectTopic('explain')">
      <span class="icon">🔍</span> Query Planner & EXPLAIN
      <span class="num">✓</span>
    </button>
    <button class="topic-btn" onclick="selectTopic('cost')">
      <span class="icon">⚙️</span> Planner Cost Tuning
      <span class="num">✓</span>
    </button>
    <button class="topic-btn" onclick="selectTopic('memory')">
      <span class="icon">🧠</span> Memory Configuration
      <span class="num">✓</span>
    </button>
    <button class="topic-btn" onclick="selectTopic('partitioning')">
      <span class="icon">📦</span> Partitioning
      <span class="num">✓</span>
    </button>
    <button class="topic-btn" onclick="selectTopic('parallel')">
      <span class="icon">⚡</span> Parallelism
      <span class="num">✓</span>
    </button>
    <button class="topic-btn" onclick="selectTopic('rewriting')">
      <span class="icon">✏️</span> Query Rewriting
      <span class="num">✓</span>
    </button>
    <button class="topic-btn" onclick="selectTopic('wal')">

      "type": "recommendation",
      "title": "Evidence-First: Find What to Index",
      "explanation": "Never index speculatively. Use <code>pg_stat_statements</code> to find the heaviest queries, then index the columns used in <code>WHERE</code>, <code>JOIN ON</code>, and <code>ORDER BY</code> clauses of those specific queries. Every index slows writes — only add indexes backed by real workload evidence.",
      "when_not_to": "Do not index columns used only in SELECT lists, or columns in low-frequency queries. Do not index 'just in case'.",
      "sql_example": "-- Step 1: Find your slowest / most costly queries\nSELECT\n  query,\n  calls,\n  ROUND(mean_exec_time::numeric, 2) AS avg_ms,\n  ROUND(total_exec_time::numeric, 2) AS total_ms\nFROM pg_stat_statements\nORDER BY total_exec_time DESC\nLIMIT 20;\n\n-- Step 2: For those queries, check existing indexes:\nSELECT indexname, indexdef\nFROM pg_indexes\nWHERE tablename = 'your_table';\n\n-- Step 3: Create the index (CONCURRENTLY = no table lock)\nCREATE INDEX CONCURRENTLY idx_name ON table (column);\n\n-- Step 4: Validate with EXPLAIN ANALYZE:\nEXPLAIN (ANALYZE, BUFFERS) your_slow_query;",
      "tags": [
        "Evidence-based",
        "pg_stat_statements",
        "Discovery"
      ],
      "source": "15 PostgreSQL Indexing Techniques"
    },
    "idx_write_overhead": {
      "id": "idx_write_overhead",
      "type": "question",
      "question": "What is causing write performance degradation?",
      "context": "Each index adds write overhead: more WAL, more page updates, more autovacuum work. In write-heavy systems, fewer targeted indexes often outperform aggressive indexing.",
      "options": [
        {
          "label": "Too many indexes — want to find and remove unused ones",
          "next": "idx_unused"
        },
        {
          "label": "Need to balance read speed vs write cost",
          "next": "idx_write_balance"
        },
        {
          "label": "Indexes are growing large due to heavy UPDATE/DELETE",
          "next": "idx_bloat"
        }
      ]

    "idx_unused": {
      "id": "idx_unused",
      "type": "recommendation",
      "title": "Remove Unused Indexes",
      "explanation": "Unused indexes waste disk space, slow every write, and increase autovacuum work — all with zero read benefit. <code>pg_stat_user_indexes</code> tracks how many times each index has been scanned. An index with <code>idx_scan = 0</code> for months is a pure liability.",
      "when_not_to": "Check that the statistics collection period is representative. A monthly report query legitimately uses an index once a month. Also verify stats weren't recently reset with <code>pg_stat_reset()</code>.",
      "sql_example": "-- Find unused indexes (sorted by wasted space):\nSELECT\n  schemaname,\n  relname          AS table_name,\n  indexrelname     AS index_name,\n  idx_scan         AS times_used,\n  pg_size_pretty(pg_relation_size(indexrelid)) AS wasted_size\nFROM pg_stat_user_indexes\nWHERE idx_scan = 0\n  AND indexrelname NOT LIKE 'pg_%'\nORDER BY pg_relation_size(indexrelid) DESC;\n\n-- Drop safely (CONCURRENTLY avoids locking):\nDROP INDEX CONCURRENTLY idx_name_to_drop;\n\n-- Check when stats were last reset:\nSELECT stats_reset FROM pg_stat_bgwriter;",
      "tags": [
        "Write-heavy",
        "Cleanup",
        "Maintenance"
      ],
      "source": "15 PostgreSQL Indexing Techniques"
    },
    "idx_write_balance": {
      "id": "idx_write_balance",
      "type": "recommendation",
      "title": "Balance Read Speed vs Write Overhead",
      "explanation": "Every index means more WAL, more page updates, more vacuum work, and heavier autovacuum cycles. In <strong>write-heavy OLTP</strong> systems, fewer targeted indexes outperform aggressive indexing. In <strong>read-heavy analytics</strong> systems, wide indexing is acceptable. Know your workload ratio before adding any index.",
      "when_not_to": "This is not a binary decision — measure with pgbench or production traffic before and after adding indexes.",
      "sql_example": "-- Understand the write-to-read ratio for a table:\nSELECT\n  relname,\n  seq_scan + idx_scan                         AS total_reads,\n  n_tup_ins + n_tup_upd + n_tup_del           AS total_writes,\n  ROUND(\n    (n_tup_ins + n_tup_upd + n_tup_del)::numeric\n    / NULLIF(seq_scan + idx_scan, 0) * 100, 1\n  ) AS write_pct\nFROM pg_stat_user_tables\nWHERE relname = 'your_table';\n\n-- write_pct > 50% → write-heavy → be very selective about indexes\n-- write_pct < 10% → read-heavy  → more indexes are acceptable\n\n-- Always build new indexes without locking:\nCREATE INDEX CONCURRENTLY idx_name ON table (column);",
      "tags": [
        "Write-heavy",
        "OLTP",
        "Trade-offs"
      ],
      "source": "15 PostgreSQL Indexing Techniques"
    },
    "idx_bloat": {
      "id": "idx_bloat",
      "type": "recommendation",
      "title": "Index Bloat — Detection and Remediation",
      "explanation": "PostgreSQL's MVCC model leaves dead tuples after UPDATE/DELETE. Autovacuum reclaims heap space but indexes accumulate bloat over time — a 200MB index that grows to 2GB without matching data growth is bloated. Bloated indexes are slower to scan and consume more buffer cache. Fix with <code>REINDEX CONCURRENTLY</code> — it rebuilds the index without taking a lock.",
      "when_not_to": "REINDEX CONCURRENTLY requires extra disk space during the rebuild (old + new index coexist temporarily). On very large indexes, schedule during low-traffic periods.",
      "sql_example": "-- Spot potentially bloated indexes (large relative to table):\nSELECT\n  i.indexrelname,\n  pg_size_pretty(pg_relation_size(i.indexrelid)) AS index_size,\n  pg_size_pretty(pg_relation_size(t.relid))      AS table_size\nFROM pg_stat_user_indexes i\nJOIN pg_stat_user_tables  t ON i.relid = t.relid\nORDER BY pg_relation_size(i.indexrelid) DESC\nLIMIT 20;\n\n-- Precise bloat (requires pgstattuple extension):\nCREATE EXTENSION IF NOT EXISTS pgstattuple;\nSELECT * FROM pgstattuple('idx_orders_customer_id');\n\n-- Fix without any table lock:\nREINDEX INDEX CONCURRENTLY idx_orders_customer_id;\n\n-- Rebuild all indexes on a table:\nREINDEX TABLE CONCURRENTLY orders;",
      "tags": [
        "Bloat",
        "Maintenance",
        "MVCC"
      ],
      "source": "15 PostgreSQL Indexing Techniques, Autovacuum"
    },
    "idx_health": {
      "id": "idx_health",
      "type": "question",
      "question": "What kind of index health issue are you seeing?",
      "context": "Indexes require ongoing maintenance. They bloat from MVCC dead tuples, become unused as query patterns change, and need regular review as workloads evolve.",
      "options": [
        {
          "label": "Index is much larger than expected (bloat)",
          "next": "idx_bloat"

        {
          "label": "Indexes don't seem to be scanned — want to clean up",

        }
      ]

    "idx_audit": {
      "id": "idx_audit",
      "type": "recommendation",
      "title": "Regular Index Audit — Workloads Evolve",
      "explanation": "The best index from last year may be irrelevant today. Make index review a habit: check scan counts, index growth, query pattern changes, and partial index hit rates. Indexing is a <strong>continuous optimization loop</strong>, not a one-time setup.",
      "when_not_to": "Do not run pg_stat_reset() without recording the reset time — you'll lose all historical scan data and can't distinguish 'never used' from 'recently reset'.",
      "sql_example": "-- Full index health overview:\nSELECT\n  t.relname                                         AS table_name,\n  i.indexrelname                                    AS index_name,\n  i.idx_scan                                        AS total_scans,\n  pg_size_pretty(pg_relation_size(i.indexrelid))    AS index_size,\n  ROUND(\n    pg_relation_size(i.indexrelid)::numeric\n    / NULLIF(pg_relation_size(t.relid), 0) * 100, 1\n  )                                                 AS idx_to_table_pct\nFROM pg_stat_user_indexes i\nJOIN pg_stat_user_tables  t ON i.relid = t.relid\nORDER BY pg_relation_size(i.indexrelid) DESC;\n\n-- Monitor query patterns for changes:\nSELECT query, calls, mean_exec_time\nFROM pg_stat_statements\nORDER BY total_exec_time DESC\nLIMIT 30;",
      "tags": [
        "Audit",
        "Maintenance",
        "Monitoring"
      ],
      "source": "15 PostgreSQL Indexing Techniques"
    },
    "idx_constraints": {
      "id": "idx_constraints",
      "type": "question",
      "question": "What type of data constraint do you need?",
      "context": "PostgreSQL can enforce complex business rules at the database level using indexes and constraints, eliminating entire categories of race conditions that application-level validation cannot prevent.",
      "options": [
        {
          "label": "Enforce uniqueness on a column or set of columns",
          "next": "idx_unique"
        },
        {
          "label": "Prevent overlapping date/time ranges (e.g. room bookings)",
          "next": "idx_exclusion"
        },
        {
          "label": "Atomic upsert — insert if not exists, update if exists",
          "next": "idx_upsert"
        }
      ]
    },
    "idx_unique": {
      "id": "idx_unique",
      "type": "recommendation",
      "title": "UNIQUE Index — Data Integrity + Planner Efficiency",
      "explanation": "UNIQUE indexes do double duty: prevent duplicate data AND help the planner. Because the planner knows at most one row matches a UNIQUE index lookup, it chooses more efficient plans. Use UNIQUE indexes on natural keys (email, username, external IDs) in addition to your primary key.",
      "when_not_to": "Do not create redundant UNIQUE indexes if the column is already a PRIMARY KEY. A PK constraint already creates a unique B-Tree index.",
      "sql_example": "-- Enforce unique email at the database level:\nCREATE UNIQUE INDEX idx_users_email_unique\n  ON users (email);\n\n-- Partial unique index: enforce uniqueness only for active records\nCREATE UNIQUE INDEX idx_users_username_active\n  ON users (username)\n  WHERE is_deleted = FALSE;\n\n-- The planner benefit — compare these two plans:\n-- Without UNIQUE: rows estimated could be many\n-- With UNIQUE:    planner knows rows=1 → simpler, faster plan\nEXPLAIN SELECT * FROM users WHERE email = 'test@example.com';\n-- Shows: Index Scan (rows=1) — planner is fully confident",
      "tags": [
        "Data integrity",
        "Uniqueness",
        "Planner efficiency"
      ],
      "source": "15 PostgreSQL Indexing Techniques"
    },
    "idx_exclusion": {
      "id": "idx_exclusion",
      "type": "recommendation",
      "title": "Exclusion Constraints for Non-Overlapping Ranges",
      "explanation": "A UNIQUE constraint only prevents exact duplicates. An <strong>EXCLUSION constraint</strong> prevents rows where a specified comparison operator returns true — perfect for preventing overlapping time ranges, booking conflicts, or IP range collisions. This makes conflicts <em>impossible</em> at the database level, eliminating race conditions that application-level validation can never fully prevent. Requires the <code>btree_gist</code> extension.",
      "when_not_to": "Exclusion constraints use GiST indexes which have higher write overhead than B-Tree. Reserve for cases where the constraint logic genuinely cannot be expressed as a UNIQUE constraint.",
      "sql_example": "-- Enable required extension:\nCREATE EXTENSION btree_gist;\n\n-- Room booking: prevent overlapping reservations for same room\nCREATE TABLE room_bookings (\n  room_id    INTEGER,\n  guest_name TEXT,\n  stay_range TSTZRANGE,\n  EXCLUDE USING GIST (\n    room_id    WITH =,\n    stay_range WITH &&   -- && = overlap operator\n  )\n);\n\n-- This succeeds:\nINSERT INTO room_bookings\n  VALUES (101, 'Alice', '[2025-11-01, 2025-11-05)');\n\n-- This fails — overlapping range for same room:\nINSERT INTO room_bookings\n  VALUES (101, 'Bob',   '[2025-11-03, 2025-11-07)');\n-- ERROR: conflicting key value violates exclusion constraint",
      "tags": [
        "Range types",
        "GiST",
        "Data integrity",
        "Concurrency"
      ],
      "source": "8 PostgreSQL Features"
    },

    "sym_slow_query": {
      "id": "sym_slow_query",
      "type": "question",

    "sym_recently_degraded": {
      "id": "sym_recently_degraded",
      "type": "question",
      "question": "What changed around the time performance degraded?",
      "context": "PostgreSQL's query planner relies on statistics about your data. Stale stats after bulk loads, deletions, or schema changes are one of the most common causes of sudden slowness.",

    "diag_explain_analyze": {
      "id": "diag_explain_analyze",
      "type": "diagnostic",
      "metric": "Query Execution Plan",
      "question": "Let's look at your query's execution plan",
      "context": "`EXPLAIN (ANALYZE, BUFFERS)` actually <strong>runs your query</strong> and records exactly what PostgreSQL did — which tables it scanned, which indexes it used, how many rows it processed at each step, and how long each step took. It is the single most powerful diagnostic tool for slow queries. Run the query below, paste your query where indicated, and look for the signals in the interpretation guide.",
      "threshold": {
        "bad": "Seq Scan on a table with thousands+ rows · Sort node showing 'Disk: NNkB' (spilled to disk) · Nested Loop with many rows on outer side",
        "ok": "Index Scan or Bitmap Index Scan · Reasonable row estimates",
        "good": "Index Only Scan with Heap Fetches: 0 · Row estimates close to actual rows · All steps in memory"
      },
      "sql": "EXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\n-- Paste your slow query below:\nSELECT ...\nFROM   your_table\nWHERE  ...;\n\n-- Key things to look for:\n-- 1. Any line starting with 'Seq Scan on' a large table?\n-- 2. 'Bitmap Heap Scan' → look for 'Heap Fetches: NNNN'\n-- 3. Any Sort node with '  Disk: NNkB'?\n-- 4. Look at 'actual rows' vs 'rows' (estimate) — big gaps are a warning",
      "options": [
        {
          "label": "I see 'Seq Scan' on a large table (no index is being used)",
          "next": "idx_seq_scan"
        },
        {
          "label": "I see 'Bitmap Heap Scan' with a high Heap Fetches number",
          "next": "diag_bitmap_fetches"
        },
        {
          "label": "I see a Sort node that mentions 'Disk'",
          "next": "idx_sort"
        },
        {
          "label": "An index exists but the query is still slow",
          "next": "idx_exists_slow"
        },
        {
          "label": "The actual rows are very different from the estimated rows",
          "next": "diag_stale_stats"
        },
        {
          "label": "Skip — I'd rather browse index types directly",
          "next": "idx_root",
          "skip": true
        }
      ]
    },
    "diag_bitmap_fetches": {
      "id": "diag_bitmap_fetches",
      "type": "diagnostic",
      "metric": "Heap Fetches (Bitmap Heap Scan)",
      "question": "How high is the Heap Fetches count?",
      "context": "When PostgreSQL uses a <strong>Bitmap Index Scan</strong>, it first collects matching row IDs from the index, then goes back to the actual table to retrieve the full rows — each trip back is a <strong>Heap Fetch</strong>. Many heap fetches means your index found the rows but doesn't carry the columns your query needs, so Postgres makes a random disk read for each one. The fix is a <strong>covering index</strong> (using `INCLUDE`) that stores the needed columns right in the index.",
      "threshold": {
        "bad": "Heap Fetches > 10,000 with slow execution time — strong signal for a covering index",
        "ok": "Heap Fetches 1,000–10,000 — worth investigating if the query is latency-sensitive",
        "good": "Heap Fetches < 100, or an Index Only Scan with Heap Fetches: 0 (already covered)"
      },
      "sql": "-- Run this to see your current plan's heap fetches:\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT col1, col2, col3\nFROM   your_table\nWHERE  indexed_col = $1;\n\n-- In the output, look for:\n--   ->  Bitmap Heap Scan on your_table\n--         Heap Fetches: 47382   ← this is what we're measuring\n\n-- To check if your index is 'visible' enough for Index Only Scan:\nSELECT relname, n_live_tup,\n       100 * idx_scan / NULLIF(seq_scan + idx_scan, 0) AS index_use_pct\nFROM   pg_stat_user_tables\nWHERE  relname = 'your_table';",
      "options": [
        {
          "label": "High (> 1,000 heap fetches) — index isn't covering enough columns",
          "next": "idx_covering"
        },
        {
          "label": "Low or zero — heap fetches aren't the bottleneck",
          "next": "idx_exists_slow"
        },
        {
          "label": "Skip — assume heap fetches are the issue",
          "next": "idx_covering",
          "skip": true
        }
      ]
    },
    "diag_stale_stats": {
      "id": "diag_stale_stats",
      "type": "diagnostic",
      "metric": "Table Statistics Age",
      "question": "Let's check if your table statistics are fresh",
      "context": "PostgreSQL decides <strong>how to run your query</strong> based on statistics: estimated row counts, value distributions, and table size. If those stats are stale — after a bulk load, mass delete, or fast-growing table — the planner may choose a Seq Scan when an index would be far faster, or pick the wrong join order. This is one of the most common causes of sudden performance regressions. Run the diagnostic query and check `last_analyze` and `n_dead_tup`.",
      "threshold": {
        "bad": "last_analyze NULL or more than a day ago on a busy table · n_dead_tup significantly higher than n_live_tup · actual rows in EXPLAIN far higher than estimated rows",
        "ok": "last_analyze within the past 24 hours · n_dead_tup < 20% of n_live_tup",
        "good": "autovacuum running regularly · last_autoanalyze recent · n_dead_tup near 0"
      },
      "sql": "-- Check statistics freshness for your table:\nSELECT relname,\n       n_live_tup,\n       n_dead_tup,\n       ROUND(100.0 * n_dead_tup / NULLIF(n_live_tup + n_dead_tup, 0), 1) AS dead_pct,\n       last_analyze,\n       last_autoanalyze\nFROM   pg_stat_user_tables\nWHERE  relname = 'your_table';\n\n-- If stats are stale, refresh them manually:\nANALYZE your_table;\n\n-- Then re-run your query and check if the plan improved.",
      "options": [
        {
          "label": "Stats are stale (old last_analyze, high dead_pct, or bad row estimates)",
          "next": "rec_analyze_stats"
        },
        {
          "label": "Stats look fresh — something else is causing the regression",
          "next": "diag_explain_analyze"
        },
        {
          "label": "Skip — take me to the query plan analysis",
          "next": "diag_explain_analyze",
          "skip": true
        }
      ]
    },
    "diag_param_sniff": {
      "id": "diag_param_sniff",
      "type": "diagnostic",
      "metric": "Plan Caching / Parameter Sensitivity",
      "question": "Check whether the query plan changes with different values",
      "context": "PostgreSQL caches plans for prepared statements. If a plan is compiled for a <strong>common value</strong> (e.g. status = 'active' matching 80% of rows), it may choose a Seq Scan — then reuse that same Seq Scan for a rare value that would benefit from an index. This is called <strong>parameter sniffing</strong> or plan instability. Comparing EXPLAIN output for fast vs slow values reveals the issue.",
      "threshold": {
        "bad": "EXPLAIN shows different plan nodes for fast vs slow values — plan is not optimal for the slow case",
        "ok": "Same plan structure but different row counts — planner is making do with one plan",
        "good": "Plan adapts correctly for all values — no action needed"
      },
      "sql": "-- Compare plans for a 'fast' vs 'slow' input value:\n-- (Use EXPLAIN without ANALYZE first to see the estimated plan)\n\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM your_table WHERE status = 'rare_value';\n-- Note the plan\n\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM your_table WHERE status = 'common_value';\n-- Compare — different plan? Same plan but slow?\n\n-- Check column statistics distribution:\nSELECT * FROM pg_stats\nWHERE tablename = 'your_table' AND attname = 'status';",
      "options": [
        {
          "label": "Different plans for different values — plan instability",
          "next": "idx_exists_slow"
        },
        {
          "label": "Same (wrong) plan for both values — likely needs a partial index",
          "next": "idx_partial"
        },
        {
          "label": "Skip — check the full query plan instead",
          "next": "diag_explain_analyze",
          "skip": true
        }
      ]
    },
    "rec_analyze_stats": {
      "id": "rec_analyze_stats",
      "type": "recommendation",
      "title": "Run ANALYZE to Refresh Stale Planner Statistics",
      "explanation": "The PostgreSQL query planner relies on statistics tables (`pg_statistic`) to estimate row counts and choose the best execution plan. When data changes significantly without a corresponding ANALYZE pass, the planner works with outdated information and can make catastrophically wrong decisions — like choosing a Seq Scan on a million-row table because it thinks only 10 rows exist. Running <code>ANALYZE your_table</code> refreshes these stats immediately. For long-term health, tune autovacuum's <code>autovacuum_analyze_scale_factor</code> to trigger more aggressively on large, frequently-updated tables.",
      "when_not_to": "ANALYZE briefly acquires a `SHARE UPDATE EXCLUSIVE` lock — it's safe to run on a live system but avoid running on many large tables simultaneously during peak traffic. On very large tables, prefer targeting specific columns: `ANALYZE your_table (col1, col2)` to reduce the time.",
      "sql_example": "-- Immediate fix: refresh statistics for one table\nANALYZE your_table;\n\n-- Refresh statistics for all tables in a schema\nANALYZE VERBOSE;  -- verbose shows what it's doing\n\n-- Tune autovacuum to analyze more aggressively on large tables\nALTER TABLE your_table SET (\n  autovacuum_analyze_scale_factor = 0.01,  -- analyze when 1% of rows change\n  autovacuum_analyze_threshold    = 100    -- minimum row change before analyzing\n);\n\n-- Check if statistics are now fresh:\nSELECT relname, last_analyze, last_autoanalyze\nFROM   pg_stat_user_tables\nWHERE  relname = 'your_table';",
      "tags": [
        "autovacuum",
        "planner",
        "statistics",
        "maintenance"
      ],
      "source": "Autovacuum & Query Plan articles"
    },
    "idx_upsert": {
      "id": "idx_upsert",
      "type": "recommendation",
      "title": "UPSERT with ON CONFLICT — Atomic Merge Operations",
      "explanation": "The classic 'insert if not exists, update if exists' pattern creates race conditions in application code. PostgreSQL's <code>ON CONFLICT</code> clause handles this <strong>atomically in a single statement</strong> — no race conditions, no error handling, no separate queries. Requires a UNIQUE index or constraint on the conflict target column.",
      "when_not_to": "<code>ON CONFLICT DO UPDATE</code> fires even if no actual change is made, which still triggers autovacuum overhead. For read-heavy caching patterns where duplicates are harmless, consider <code>ON CONFLICT DO NOTHING</code> instead.",
      "sql_example": "-- Prerequisite: UNIQUE index on the conflict target\nCREATE UNIQUE INDEX idx_user_stats_pk\n  ON user_stats (user_id);\n\n-- Atomic upsert: insert new user or increment existing counter\nINSERT INTO user_stats (user_id, page_views, last_visit)\nVALUES (12345, 1, NOW())\nON CONFLICT (user_id)\nDO UPDATE SET\n  page_views = user_stats.page_views + EXCLUDED.page_views,\n  last_visit = EXCLUDED.last_visit;\n\n-- Conditional update: only update if the new data is more recent\nINSERT INTO user_stats (user_id, page_views, last_visit)\nVALUES (12345, 1, NOW())\nON CONFLICT (user_id)\nDO UPDATE SET\n  page_views = user_stats.page_views + 1,\n  last_visit = EXCLUDED.last_visit\nWHERE user_stats.last_visit < EXCLUDED.last_visit;\n\n-- Silently ignore exact duplicates:\nINSERT INTO events (id, payload)\nVALUES ($1, $2)\nON CONFLICT (id) DO NOTHING;",
      "tags": [
        "UPSERT",
        "Concurrency",
        "Atomic",
        "OLTP"
      ],
      "source": "8 PostgreSQL Features"
    },

    "diag_qp_how_to_run": {
      "id": "diag_qp_how_to_run",
      "type": "diagnostic",
      "metric": "EXPLAIN ANALYZE output",
      "question": "Check what your query's execution plan looks like",
      "context": "<strong>EXPLAIN</strong> shows the plan the planner <em>intends</em> to use — no execution, no real timings. <strong>EXPLAIN ANALYZE</strong> actually runs the query and shows real timing and real row counts next to the planner's estimates. Always add <code>BUFFERS</code> to see cache hit/miss ratios. Read the output tree <strong>bottom-up</strong>: the most-indented node executes first and feeds its parent. The key numbers per node are: <code>actual time</code> (ms), <code>actual rows</code>, and <code>loops</code>. Total time for a node = <code>actual time × loops</code>.",
      "threshold": {
        "bad": "Any node where actual rows >> estimated rows (e.g. rows=1 but actual rows=50000) — the planner was misled",
        "ok": "Estimated and actual rows within 2–5× of each other — plan is mostly trustworthy",
        "good": "Estimated rows ≈ actual rows throughout the plan — statistics are fresh and the plan is reliable"
      },
      "sql": "-- Safe form: always use ANALYZE + BUFFERS\nEXPLAIN (ANALYZE, BUFFERS) SELECT * FROM orders WHERE customer_id = 12345;\n\n-- For INSERT/UPDATE/DELETE: wrap in a transaction and ROLLBACK\nBEGIN;\nEXPLAIN (ANALYZE, BUFFERS) DELETE FROM sessions WHERE expires_at < NOW();\nROLLBACK;\n\n-- JSON output for pganalyze / explain.dalibo.com\nEXPLAIN (ANALYZE, BUFFERS, FORMAT JSON) SELECT ...;",
      "options": [
        {
          "label": "I see 'Seq Scan ... Rows Removed by Filter: N' on a large table",
          "next": "diag_explain_analyze"
        },
        {
          "label": "I see 'Sort Method: external merge  Disk: NkB'",
          "next": "diag_qp_sort_agg"
        },
        {
          "label": "I see 'Nested Loop' with high loops × actual time",
          "next": "diag_qp_join_loops"
        },
        {
          "label": "Estimated rows vs actual rows differ massively",
          "next": "diag_stale_stats"
        },
        {
          "label": "Skip — show me how to read the plan tree",
          "next": "rec_qp_read_plan",
          "skip": true
        }
      ]
    },
    "diag_qp_join_loops": {
      "id": "diag_qp_join_loops",
      "type": "diagnostic",
      "metric": "Nested Loop loops × actual time",
      "question": "Check how many times the inner side of your Nested Loop is executing",
      "context": "A <strong>Nested Loop</strong> join iterates every row on the outer side and for each one, probes the inner side. The plan shows <code>loops=N</code> on the inner node — that's how many times it ran. <strong>Total inner cost = actual_time × loops</strong>. A Nested Loop with <code>loops=50000</code> and <code>actual time=0.16ms</code> per loop costs 8 full seconds — even though each lookup looks fast. The planner chooses Nested Loop when it thinks the outer set is small. If its row estimate was wrong (stale stats), it gets trapped with a huge outer set.",
      "threshold": {
        "bad": "loops > 1000 on the inner node — cumulative cost will dominate query time",
        "ok": "loops 100–1000 with index on inner join key — borderline, monitor actual time",
        "good": "loops < 100 with index on inner join key — Nested Loop is appropriate here"
      },
      "sql": "-- Find the expensive node: look for high loops × actual_time\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT o.*, c.name\nFROM orders o\nJOIN customers c ON o.customer_id = c.id\nWHERE o.order_date >= NOW() - INTERVAL '30 days';\n\n-- Check index existence on join key\nSELECT indexname, indexdef\nFROM pg_indexes\nWHERE tablename = 'customers' AND indexdef LIKE '%id%';\n\n-- Check row estimate vs actual on the outer node\n-- Look for: (cost=... rows=1 ...) (actual ... rows=50000 ...)\n-- rows=1 estimated but actual=50000 → stale stats",
      "options": [
        {
          "label": "loops > 1000 — this is the bottleneck",
          "next": "rec_qp_nested_loop_fix"
        },
        {
          "label": "loops are fine but the inner table has no index",
          "next": "rec_qp_nested_loop_fix"
        },
        {
          "label": "Row estimates look wrong (estimated 1, got 50000)",
          "next": "diag_stale_stats"
        },
        {
          "label": "Skip — show me how to fix Nested Loop",
          "next": "rec_qp_nested_loop_fix",
          "skip": true
        }
      ]
    },
    "diag_qp_sort_agg": {
      "id": "diag_qp_sort_agg",
      "type": "diagnostic",
      "metric": "Sort method / HashAggregate batches",
      "question": "Check whether your sort or aggregate is spilling to disk",
      "context": "Every <strong>Sort</strong> and <strong>Hash Join / HashAggregate</strong> gets its own <code>work_mem</code> budget. When the operation exceeds that budget, PostgreSQL spills to disk — shown as <code>Sort Method: external merge  Disk: 487520kB</code> or <code>HashAggregate  Batches: 4</code>. Disk spill is <strong>10–100× slower</strong> than in-memory operation. Two fixes exist: increase <code>work_mem</code> so the operation fits in RAM, or add a sorted index so the Sort node disappears entirely.",
      "threshold": {
        "bad": "'Sort Method: external merge  Disk: NkB' — spilling to disk. Any 'Batches: N' where N > 1 in Hash/HashAggregate.",
        "ok": "'Sort Method: top-N heapsort' — efficient for ORDER BY with LIMIT but still CPU-bound",
        "good": "'Sort Method: quicksort  Memory: NkB' — in-memory. Batches: 1 in Hash nodes."
      },
      "sql": "-- Run your query and look for these keywords:\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT customer_id, COUNT(*), SUM(total)\nFROM orders\nGROUP BY customer_id\nORDER BY SUM(total) DESC;\n\n-- Check current work_mem setting\nSHOW work_mem;\n\n-- Temporarily increase for this session and rerun\nSET work_mem = '256MB';\nEXPLAIN (ANALYZE, BUFFERS) <your query>;\n-- Did 'external merge' become 'quicksort'?\n-- Did Batches drop to 1?",
      "options": [
        {
          "label": "'external merge Disk: NkB' — spilling to disk",
          "next": "rec_qp_sort_disk"
        },
        {
          "label": "'Batches: N' > 1 in a Hash or HashAggregate node",
          "next": "rec_qp_hash_batches"
        },
        {
          "label": "Sort is in-memory but ORDER BY is slow — want to eliminate Sort entirely",
          "next": "rec_qp_sort_index"
        },
        {
          "label": "Skip — show me the fix",
          "next": "rec_qp_sort_disk",
          "skip": true
        }
      ]
    },
    "rec_qp_read_plan": {
      "id": "rec_qp_read_plan",
      "type": "recommendation",
      "title": "How to Read a PostgreSQL Query Plan Tree",
      "explanation": "The plan is a tree of <strong>nodes</strong>. Each node performs one operation. Execution is <strong>bottom-up</strong>: the most-indented node runs first, passes rows to its parent, and so on up to the root. Each node shows two sets of numbers: <em>planner estimates</em> (cost, rows, width) and <em>actuals</em> (actual time, actual rows, loops). The most important metric is <code>actual time × loops</code> — that's the real wall-clock cost of that node. Scan nodes (Seq Scan, Index Scan) retrieve data. Join nodes (Nested Loop, Hash Join, Merge Join) combine two inputs. Sort, Aggregate, and Limit operate on a single input. <code>Buffers: shared hit=N read=M</code> shows cache hit ratio — high <code>read</code> values mean disk I/O.",
      "when_not_to": "Do not run EXPLAIN ANALYZE on destructive statements (DELETE, UPDATE, TRUNCATE) without wrapping in BEGIN...ROLLBACK first — it will execute for real.",
      "sql_example": "-- Template: always use ANALYZE + BUFFERS\nEXPLAIN (ANALYZE, BUFFERS) <your SELECT here>;\n\n-- Key things to look for in the output:\n-- 1. Largest 'actual time' node = your bottleneck\n-- 2. 'rows=1' estimated but 'actual rows=50000' = stale stats\n-- 3. 'Sort Method: external merge' = spilling to disk\n-- 4. 'Nested Loop' with loops=50000 = 50000 inner probes\n-- 5. 'Hash  Batches: 8' = hash table spilling to disk\n-- 6. 'Rows Removed by Filter: 999999' = missing index\n-- 7. 'shared read=15000' = lots of disk I/O",
      "tags": [
        "all",
        "beginner"
      ],
      "source": "Query Plan 1.md, QueryPlan 2.md"
    },
    "rec_qp_nested_loop_fix": {
      "id": "rec_qp_nested_loop_fix",
      "type": "recommendation",
      "title": "Fix Nested Loop with Too Many Loops — Index the Inner Join Key",
      "explanation": "A Nested Loop with <code>loops=50000</code> performs 50,000 probes into the inner table. If the inner join key has an index, each probe is O(log n) and fast. Without an index, each probe is a full table scan — catastrophic. If the index exists but the planner still chooses Nested Loop when it shouldn't, the cause is usually stale statistics (planner underestimated the outer row count). Fix: run <code>ANALYZE</code> on the outer table and correct <code>random_page_cost</code> for SSD storage so the planner accurately prices Hash Join as cheaper.",
      "when_not_to": "Do not disable Nested Loop globally (<code>SET enable_nestloop = OFF</code>) in production — it's the correct choice when the outer set is genuinely small (< a few hundred rows) with a fast inner index. Disabling it degrades those queries.",
      "sql_example": "-- Step 1: Confirm inner table index exists\nSELECT indexname FROM pg_indexes\nWHERE tablename = 'customers' AND indexdef LIKE '%(id)%';\n\n-- Step 2: If missing, add it\nCREATE INDEX CONCURRENTLY idx_customers_id ON customers (id);\n\n-- Step 3: Also index the outer filter to shrink the outer set\nCREATE INDEX CONCURRENTLY idx_orders_date\nON orders (order_date)\nWHERE order_date >= NOW() - INTERVAL '90 days'; -- partial\n\n-- Step 4: Refresh stats so planner sees correct outer row count\nANALYZE orders;\n\n-- Step 5: Confirm plan changed to Hash Join\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT o.*, c.name\nFROM orders o JOIN customers c ON o.customer_id = c.id\nWHERE o.order_date >= NOW() - INTERVAL '30 days';\n\n-- Diagnostic only (never leave in production):\n-- SET enable_nestloop = OFF;",
      "tags": [
        "OLTP",
        "joins",
        "read-heavy"
      ],
      "source": "Query Plan 1.md, QueryPlan 2.md"
    },
    "rec_qp_sort_disk": {
      "id": "rec_qp_sort_disk",
      "type": "recommendation",
      "title": "Sort Spilling to Disk — Increase work_mem or Add a Sort Index",
      "explanation": "<code>Sort Method: external merge  Disk: 487520kB</code> means the sort exceeded <code>work_mem</code> and spilled ~487MB to disk. Disk sorts are 10–100× slower than in-memory. Two fixes: <strong>(1) Increase work_mem</strong> — set per-session for large queries, not globally (each operation × connection × work_mem adds up fast). <strong>(2) Add an index that provides pre-sorted rows</strong> — eliminates the Sort node entirely, which is always better. If adding a sort index isn't practical (complex expression, multiple sort keys), raising work_mem is the pragmatic fix.",
      "when_not_to": "Do not raise <code>work_mem</code> globally to a very high value. With 200 connections each running 4 operations, work_mem=256MB can consume 200GB of RAM. Set it per-session (<code>SET work_mem = '256MB'</code>) or per-role (<code>ALTER ROLE analyst SET work_mem = '512MB'</code>).",
      "sql_example": "-- Option 1: Per-session work_mem increase\nSET work_mem = '256MB';\nSELECT * FROM orders ORDER BY created_at DESC LIMIT 1000;\n-- Verify: re-run EXPLAIN ANALYZE — 'quicksort Memory:' instead of 'external merge Disk:'\n\n-- Option 2 (better): Index that eliminates the Sort node entirely\nCREATE INDEX CONCURRENTLY idx_orders_created_desc\nON orders (created_at DESC);\n-- Now the plan shows: Index Scan ... (no Sort node at all)\n-- Result: same query, 100-300x faster\n\n-- Per-role setting for analyst users:\nALTER ROLE analyst SET work_mem = '512MB';\n\n-- Check current setting:\nSHOW work_mem;",
      "tags": [
        "analytics",
        "memory",
        "read-heavy"
      ],
      "source": "Query Plan 1.md, QueryPlan 2.md"
    },
    "rec_qp_hash_batches": {
      "id": "rec_qp_hash_batches",
      "type": "recommendation",
      "title": "Hash Join Batching — Hash Table Exceeds work_mem",
      "explanation": "<code>Hash  Batches: 8  Memory Usage: 625kB</code> means the hash table was split into 8 batches because it couldn't fit in <code>work_mem</code>. Each batch requires re-scanning the probe side from disk, multiplying I/O cost by the batch count. Getting <code>Batches: 1</code> means everything fits in memory — single-pass, fastest possible. Increasing <code>work_mem</code> so the hash table fits entirely in RAM will typically give a 3–8× speedup on that join node.",
      "when_not_to": "Same caution as work_mem for sorts — set per-session or per-role, not globally high.",
      "sql_example": "-- Identify: look for 'Batches: N' where N > 1\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM orders o\nJOIN order_items oi ON o.id = oi.order_id;\n-- 'Hash  (Batches: 8  Memory Usage: 625kB)'\n-- → hash table needs ~5GB but work_mem is 4MB (default)\n\n-- Fix: increase work_mem for this session\nSET work_mem = '512MB';\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM orders o\nJOIN order_items oi ON o.id = oi.order_id;\n-- Now: 'Hash  (Batches: 1  Memory Usage: 5120kB)'\n-- Single pass — much faster",
      "tags": [
        "analytics",
        "joins",
        "memory"
      ],
      "source": "Query Plan 1.md"
    },
    "rec_qp_sort_index": {
      "id": "rec_qp_sort_index",
      "type": "recommendation",
      "title": "Eliminate Sort Nodes with a Pre-Sorted Index",
      "explanation": "When your query has <code>ORDER BY col DESC</code> and a Sort node appears in the plan, PostgreSQL is sorting in memory (or disk). An index on that column in the same sort direction provides rows <strong>already sorted</strong> — the Sort node disappears entirely. This is especially powerful for <code>ORDER BY ... LIMIT N</code> queries: instead of sorting millions of rows to find the top 1000, an index scan stops after reading just 1000 entries.",
      "when_not_to": "Only worth adding if ORDER BY is a frequent query pattern on this table. Each index adds write overhead. Verify with EXPLAIN that the plan actually uses the index — low-cardinality or very large fraction queries may still prefer a seq scan.",
      "sql_example": "-- Slow: Sort spilling or large in-memory sort\nSELECT * FROM events ORDER BY created_at DESC LIMIT 1000;\n-- Plan: Sort (cost=185234...) → Seq Scan\n\n-- Fix: descending index matches the ORDER BY direction\nCREATE INDEX CONCURRENTLY idx_events_created_desc\nON events (created_at DESC);\n\n-- Now: Index Scan (no Sort node)\n-- Index scans only 1000 entries instead of sorting 2M rows\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM events ORDER BY created_at DESC LIMIT 1000;",
      "tags": [
        "OLTP",
        "read-heavy",
        "indexing"
      ],
      "source": "Query Plan 1.md"
    },
    "cm_sym_root": {
      "id": "cm_sym_root",
      "type": "question",
      "question": "What does the planner appear to be getting wrong?",
      "context": "PostgreSQL's planner assigns a numeric cost to every possible plan and picks the lowest. Those costs are anchored to hardware assumptions from 2001 — spinning disks, tiny RAM. On modern servers those defaults are often badly wrong, causing the planner to make choices that look irrational.",
      "options": [
        {
          "label": "It picks Seq Scan over an index that clearly exists and fits",
          "next": "diag_cm_random_page"
        },
        {
          "label": "It picks Nested Loop over Hash Join on large datasets",
          "next": "diag_cm_join_choice"
        },
        {
          "label": "Plans changed unexpectedly after a hardware or config change",
          "next": "diag_cm_plan_changed"
        },
        {
          "label": "I want to tune proactively for my workload type",
          "next": "diag_cm_workload"
        }
      ]
    },
    "diag_cm_random_page": {
      "id": "diag_cm_random_page",
      "type": "diagnostic",
      "metric": "random_page_cost setting vs storage type",
      "question": "Check your random_page_cost setting and match it to your storage hardware",
      "context": "<code>random_page_cost</code> tells the planner how expensive a random disk page read is <em>relative</em> to a sequential one (<code>seq_page_cost = 1.0</code>). The default is <strong>4.0</strong> — meaning random reads cost 4× sequential reads. This was accurate for spinning HDDs in 2001. On modern <strong>NVMe SSDs</strong>, random and sequential I/O are nearly identical (within 10–20%). With the default 4.0 on SSD, the planner massively over-penalises index scans (which do random I/O) and wrongly prefers full table scans.",
      "threshold": {
        "bad": "random_page_cost = 4.0 (default) on SSD storage — planner will avoid indexes unnecessarily",
        "ok": "random_page_cost = 1.5–2.0 — better than default but still over-penalising index access on SSD",
        "good": "random_page_cost = 1.1 (SATA SSD) or 1.0 (NVMe) — planner accurately prices index vs seq scans"
      },
      "sql": "-- Check current setting\nSHOW random_page_cost;\n\n-- Check your storage type on Linux\n-- rota=0 = SSD/NVMe, rota=1 = spinning disk\n-- lsblk -d -o name,rota\n\n-- Confirm the planner is avoiding your index\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM orders WHERE customer_id = 12345 AND status = 'pending';\n-- Look for: 'Seq Scan' despite an index existing on (customer_id, status)\n\n-- Test: temporarily set to SSD value and re-run EXPLAIN\nSET random_page_cost = 1.1;\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM orders WHERE customer_id = 12345 AND status = 'pending';\n-- Did it switch to Index Scan?",
      "options": [
        {
          "label": "Running on NVMe SSD — random_page_cost is 4.0 (default)",
          "next": "rec_cm_nvme"
        },
        {
          "label": "Running on SATA/SAS SSD — random_page_cost is 4.0",
          "next": "rec_cm_ssd"
        },
        {
          "label": "Running on cloud network storage (EBS, GCP PD, Azure Disk)",
          "next": "rec_cm_cloud"
        },
        {
          "label": "Running on spinning HDD — random_page_cost is already 4.0",
          "next": "rec_cm_hdd"
        },
        {
          "label": "Skip — just show me the SSD fix",
          "next": "rec_cm_ssd",
          "skip": true
        }
      ]
    },
    "diag_cm_join_choice": {
      "id": "diag_cm_join_choice",
      "type": "diagnostic",
      "metric": "effective_cache_size + row estimate accuracy",
      "question": "Check whether the planner has accurate row estimates and cache size knowledge",
      "context": "The planner picks <strong>Nested Loop</strong> when it thinks the outer result set is small — because Nested Loop is cheapest when each inner probe is a fast index hit on a tiny outer set. If its row estimate for the outer side is wrong (says 1 row, actual is 50,000), it picks Nested Loop and gets trapped in 50,000 index lookups. The second factor is <code>effective_cache_size</code> — this tells the planner how much RAM the OS page cache holds. If set too low, the planner thinks hash tables won't be cached and penalises Hash Join.",
      "threshold": {
        "bad": "Estimated outer rows <<< actual rows (e.g. 1 vs 50000) AND random_page_cost = 4.0 — double misfire",
        "ok": "Estimates are off by 2–5× but random_page_cost is corrected — plan may still be suboptimal",
        "good": "Estimates within 2× of actual rows AND random_page_cost matches storage — planner chooses correctly"
      },
      "sql": "-- Step 1: Check row estimate accuracy on the outer join side\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT o.*, c.name FROM orders o\nJOIN customers c ON o.customer_id = c.id\nWHERE o.status = 'pending';\n-- Compare: (cost=... rows=?) vs (actual ... rows=?)\n\n-- Step 2: Check effective_cache_size\nSHOW effective_cache_size; -- should be ~75% of total RAM\n\n-- Step 3: Check random_page_cost\nSHOW random_page_cost;\n\n-- Step 4: If stats are stale, update them\nANALYZE orders;\nEXPLAIN (ANALYZE, BUFFERS) <same query>; -- did plan improve?",
      "options": [
        {
          "label": "Row estimates are badly wrong — stats are stale",
          "next": "rec_analyze_stats"
        },
        {
          "label": "effective_cache_size is set too low (well below 75% RAM)",
          "next": "rec_cm_effective_cache"
        },
        {
          "label": "random_page_cost is 4.0 on SSD — that's the root cause",
          "next": "rec_cm_ssd"
        },
        {
          "label": "Skip — show me a full fix for wrong join choice",
          "next": "rec_cm_effective_cache",
          "skip": true
        }
      ]
    },
    "diag_cm_plan_changed": {
      "id": "diag_cm_plan_changed",
      "type": "diagnostic",
      "metric": "Configuration change impact on plan cache",
      "question": "Identify what changed and why the plan regressed",
      "context": "Query plans can change when: (1) <code>random_page_cost</code> or other cost parameters changed, (2) a large data load ran and statistics are now stale, (3) a new index was added and the planner switched to it, (4) <code>work_mem</code> was changed and hash join thresholds shifted, or (5) PostgreSQL was upgraded and the planner logic improved (or changed). The key is to isolate <em>which</em> plan changed and compare EXPLAIN output before and after.",
      "threshold": {
        "bad": "A plan regressed after a config change with no statistics refresh — stale stats are misleading the new config",
        "ok": "Plan changed but performance is similar — monitor for a few days",
        "good": "Plan changed and performance improved — the new config is correct"
      },
      "sql": "-- Check which queries changed most recently\nSELECT query, mean_exec_time, calls, stddev_exec_time\nFROM pg_stat_statements\nWHERE calls > 100\nORDER BY mean_exec_time DESC\nLIMIT 20;\n\n-- Check current cost settings\nSHOW random_page_cost;\nSHOW effective_cache_size;\nSHOW work_mem;\n\n-- After any config change, always refresh statistics\nANALYZE; -- full database\n-- or targeted:\nANALYZE orders; ANALYZE customers;\n\n-- Reset pg_stat_statements to establish a fresh baseline\nSELECT pg_stat_statements_reset();",
      "options": [
        {
          "label": "random_page_cost was changed — need to recalibrate",
          "next": "diag_cm_random_page"
        },
        {
          "label": "Large data load happened — statistics are stale",
          "next": "rec_analyze_stats"
        },
        {
          "label": "PostgreSQL was upgraded — want to verify plan quality",
          "next": "rec_cm_verify_plans"
        },
        {
          "label": "Skip — show me how to stabilise plans",
          "next": "rec_cm_verify_plans",
          "skip": true
        }
      ]
    },
    "diag_cm_workload": {
      "id": "diag_cm_workload",
      "type": "diagnostic",
      "metric": "Workload type (OLTP vs Analytics vs Mixed)",
      "question": "Identify your primary workload pattern to choose the right cost profile",
      "context": "OLTP workloads (many short, fast queries — logins, lookups, inserts) benefit from low <code>random_page_cost</code> that favours index scans. Analytics workloads (few long queries scanning millions of rows) benefit from slightly higher <code>random_page_cost</code> that tolerates seq scans, plus more parallelism. Mixed workloads need a compromise baseline with per-session overrides for analytics queries.",
      "threshold": {
        "bad": "Using analytics cost settings on an OLTP server — index scans are avoided, latency spikes",
        "ok": "Default settings on a mixed workload — suboptimal for both but functional",
        "good": "Cost settings matched to primary workload type with per-session overrides for exceptions"
      },

    "rec_cm_nvme": {
      "id": "rec_cm_nvme",
      "type": "recommendation",
      "title": "NVMe SSD — Set random_page_cost = 1.0",
      "explanation": "NVMe SSDs deliver random I/O at virtually the same speed as sequential I/O — the gap is 10–20%, not 400%. Setting <code>random_page_cost = 1.0</code> (equal to <code>seq_page_cost</code>) tells the planner they are equivalent. This immediately makes index scans competitive with seq scans for the same data volume. Also set <code>effective_cache_size</code> to 75% of your total RAM — this tells the planner how much the OS page cache can hold, which influences whether it believes buffer hits are likely.",
      "when_not_to": "Never set <code>random_page_cost</code> below 1.0 — this creates a logical contradiction (random reads faster than sequential) and produces bad plans. After changing, run <code>ANALYZE</code> to force plan recalculation and monitor <code>pg_stat_statements</code> for any regressions.",
      "sql_example": "-- Apply in postgresql.conf (requires pg_reload_conf, not restart)\nrandom_page_cost = 1.0\nseq_page_cost = 1.0\neffective_cache_size = '48GB'  -- 75% of 64GB server\ncpu_tuple_cost = 0.01\ncpu_index_tuple_cost = 0.005\n\n-- Reload without restart\nSELECT pg_reload_conf();\nSHOW random_page_cost; -- verify\n\n-- Refresh statistics to force plan recalculation\nANALYZE;\n\n-- Monitor for regressions\nSELECT query, mean_exec_time, calls\nFROM pg_stat_statements\nWHERE mean_exec_time > 500\nORDER BY mean_exec_time DESC LIMIT 20;",
      "tags": [
        "NVMe",
        "SSD",
        "OLTP",
        "analytics"
      ],
      "source": "The Hidden PostgreSQL Setting PDF"
    },
    "rec_cm_ssd": {
      "id": "rec_cm_ssd",
      "type": "recommendation",
      "title": "SATA/SAS SSD — Set random_page_cost = 1.1",
      "explanation": "SATA/SAS SSDs are fast on random access — not quite NVMe but still far faster than spinning disks. The industry-standard value for SATA SSD is <code>random_page_cost = 1.1</code>. A real production e-commerce platform changed this single setting and reduced product search from 3.2 seconds to 180ms (17× improvement) — they had perfect indexes the planner was flat-out refusing to use at the default 4.0. After setting, also correct <code>effective_cache_size</code> to reflect your actual RAM.",
      "when_not_to": "After changing, monitor <code>pg_stat_statements</code> for a few hours. Some queries that were optimised around the old cost model may get slightly different plans. Run <code>ANALYZE</code> immediately after changing to invalidate cached plans.",
      "sql_example": "-- postgresql.conf\nrandom_page_cost = 1.1\nseq_page_cost = 1.0\neffective_cache_size = '48GB'  -- 75% of total RAM\n\n-- Reload (no restart needed)\nSELECT pg_reload_conf();\n\n-- Confirm impact on a problem query\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM orders\nWHERE customer_id = 12345 AND status = 'pending';\n-- Before: Seq Scan (cost=0.00..25000)\n-- After:  Index Scan using idx_orders_cust_status\n\n-- Track overall improvement\nSELECT query, mean_exec_time\nFROM pg_stat_statements\nORDER BY mean_exec_time DESC LIMIT 20;",
      "tags": [
        "SSD",
        "OLTP",
        "analytics"

      "source": "The Hidden PostgreSQL Setting PDF"
    },
    "rec_cm_cloud": {
      "id": "rec_cm_cloud",
      "type": "recommendation",
      "title": "Cloud Network Storage (EBS, GCP PD) — Set random_page_cost = 1.5",
      "explanation": "Cloud network-attached storage (AWS EBS, GCP Persistent Disk, Azure Managed Disk) has fast random access but adds network latency variance not present on local SSDs. A value of 1.5 is appropriate — more aggressive than the HDD default (4.0) but slightly more conservative than local SSD (1.1). On instances with local NVMe storage (AWS i3/i4i, GCP local SSD), use 1.0–1.1 instead.",

      "sql_example": "-- For cloud network-attached storage (EBS, GCP PD, etc.)\nrandom_page_cost = 1.5\nseq_page_cost = 1.0\neffective_cache_size = '75% of instance RAM'\n\n-- For cloud instances with LOCAL NVMe storage:\nrandom_page_cost = 1.0\n\n-- Reload and test\nSELECT pg_reload_conf();\nANALYZE;\nEXPLAIN (ANALYZE, BUFFERS) <your slow query>;",
