          "skip": true
        }
      ]
    },
    "rec_part_migration": {
      "id": "rec_part_migration",
      "type": "recommendation",
      "title": "Safe 4-Phase Migration to a Partitioned Table",
      "explanation": "Migrating an existing table to a partitioned structure without downtime requires a careful sequence. <strong>Never try to convert in-place</strong> — PostgreSQL has no native ALTER TABLE ... PARTITION command for existing data. The safe approach: create a new partitioned table in parallel, copy data in batches, then do a millisecond-scale rename cutover during a brief maintenance window.<br><br><strong>Phase 1 — Prepare:</strong> Analyse query patterns, choose partitioning strategy, test on a copy of production data.<br><strong>Phase 2 — Create partitioned structure:</strong> Build the new table with <code>PARTITION BY</code>, create initial partitions (use pg_partman for automation), recreate indexes locally on each partition.<br><strong>Phase 3 — Batch data migration:</strong> Copy data in date/id-range batches with <code>INSERT INTO ... SELECT ... WHERE created_at BETWEEN ...</code> to avoid long-running locks.<br><strong>Phase 4 — Cutover:</strong> In a transaction, rename old table to <code>_old</code> and new partitioned table to the original name. Application sees no change.",
      "when_not_to": "Do not migrate tables under 10GB — the complexity rarely pays off. Avoid migrating tables with complex foreign key relationships pointing TO them (FK constraints involving partitioned tables require careful handling). If you cannot tolerate even the brief rename-cutover window, use a logical replication-based migration instead.",
      "sql_example": "-- Phase 2: Create partitioned table with same structure\nCREATE TABLE user_events_new\n  (LIKE user_events INCLUDING ALL)\nPARTITION BY RANGE (created_at);\n\n-- Create initial monthly partitions (or use pg_partman)\nCREATE TABLE user_events_2024_01\n  PARTITION OF user_events_new\n  FOR VALUES FROM ('2024-01-01') TO ('2024-02-01');\n-- ... repeat per month\n\n-- Phase 3: Migrate data in batches (run repeatedly, adjusting dates)\nINSERT INTO user_events_new\nSELECT * FROM user_events\nWHERE created_at >= '2024-01-01' AND created_at < '2024-01-15';\n-- Continue in small batches to avoid locks...\n\n-- Phase 4: Atomic cutover (run during maintenance window)\nBEGIN;\n  ALTER TABLE user_events     RENAME TO user_events_old;\n  ALTER TABLE user_events_new RENAME TO user_events;\nCOMMIT;\n\n-- Automate future partition creation with pg_partman + pg_cron:\nCREATE EXTENSION pg_partman;\nSELECT partman.create_parent('public.user_events', 'created_at', 'native', 'monthly');\n\n-- Schedule maintenance at 2am daily:\nSELECT cron.schedule('partition-maintenance', '0 2 * * *',\n  'SELECT partman.run_maintenance();');",
      "tags": [
        "Partitioning",
        "Migration",
        "Zero-downtime",
        "pg_partman"
      ],
      "source": "Advanced PostgreSQL Partitioning Strategies"
    },
    "rec_rw_recursive_cte": {
      "id": "rec_rw_recursive_cte",
      "type": "recommendation",
      "title": "Recursive CTEs for Hierarchical and Graph Data",
      "explanation": "Hierarchical data — org charts, category trees, threaded comments, bill-of-materials, route finding — traditionally requires multiple round-trips to the database or loading entire tables into application memory. <strong>Recursive CTEs</strong> handle these in a single query. A recursive CTE has two parts joined by <code>UNION ALL</code>: the <strong>anchor</strong> (base case — where to start) and the <strong>recursive member</strong> (how to find the next level by joining back to the CTE itself). PostgreSQL iterates until no new rows are produced.",
      "when_not_to": "Recursive CTEs are always materialized — the result is computed fully before the outer query can use it. For very deep hierarchies (thousands of levels) or graphs with cycles, add a <code>depth</code> counter and a <code>WHERE depth < N</code> guard to prevent infinite recursion. For very large graphs, a dedicated graph extension (Apache AGE) may be more appropriate.",
      "sql_example": "-- Employee org chart: find all reports under a given manager\nWITH RECURSIVE subordinates AS (\n  -- Anchor: start with the target manager\n  SELECT id, name, manager_id, 1 AS depth\n  FROM employees\n  WHERE id = 2  -- VP Engineering\n\n  UNION ALL\n\n  -- Recursive: find employees managed by current results\n  SELECT e.id, e.name, e.manager_id, s.depth + 1\n  FROM employees e\n  JOIN subordinates s ON e.manager_id = s.id\n  WHERE s.depth < 10  -- guard against runaway recursion\n)\nSELECT\n  REPEAT('  ', depth - 1) || name AS org_chart,\n  depth\nFROM subordinates\nORDER BY depth, name;\n\n-- Bill-of-materials: total cost of a product with nested components\nWITH RECURSIVE component_costs AS (\n  SELECT component_id, quantity, unit_cost,\n         quantity * unit_cost AS total_cost\n  FROM bill_of_materials WHERE product_id = 100\n  UNION ALL\n  SELECT bom.component_id, cc.quantity * bom.quantity,\n         bom.unit_cost, cc.quantity * bom.quantity * bom.unit_cost\n  FROM component_costs cc\n  JOIN bill_of_materials bom ON bom.product_id = cc.component_id\n)\nSELECT SUM(total_cost) AS total_product_cost\nFROM component_costs;",
      "tags": [
        "Recursive CTE",
        "Hierarchical",
        "Graph",
        "Tree",
        "Query rewriting"
      ],
      "source": "8 PostgreSQL Features, QueryPlan 2"
    },
    "rec_rw_range_types": {
      "id": "rec_rw_range_types",
      "type": "recommendation",
      "title": "Range Types to Replace Complex start/end Column Pairs",
      "explanation": "Storing intervals as two separate columns — <code>start_date DATE, end_date DATE</code> — forces complex, error-prone query logic for overlap detection, gap finding, and containment checks. PostgreSQL's <strong>native range types</strong> (<code>DATERANGE</code>, <code>TSTZRANGE</code>, <code>INT4RANGE</code>, etc.) make intervals a first-class value with built-in operators: <code>&&</code> (overlap), <code>@></code> (contains), <code><@</code> (contained by), <code>-|-</code> (adjacent). A GiST index on a range column makes these queries fast even on millions of rows.",
      "when_not_to": "Range type columns are not compatible with simple <code>=</code> lookups or ORM query builders that generate <code>WHERE start <= ? AND end >= ?</code>. If your ORM cannot express range operators natively, the application layer may need raw SQL for range queries. Also, range types are a schema change — migrating existing start/end columns requires a data migration.",
      "sql_example": "-- Schema: use DATERANGE instead of separate start/end columns\nCREATE TABLE projects (\n  id       SERIAL PRIMARY KEY,\n  name     TEXT,\n  duration DATERANGE  -- replaces start_date + end_date\n);\n\nINSERT INTO projects (name, duration) VALUES\n  ('Website Redesign', '[2025-10-01, 2025-11-15)'),\n  ('API Development',  '[2025-11-10, 2025-12-20)'),\n  ('DB Migration',     '[2025-12-01, 2026-01-15)');\n\n-- GiST index for fast range queries:\nCREATE INDEX idx_projects_duration ON projects USING GIST (duration);\n\n-- Find all projects overlapping November 2025:\nSELECT name FROM projects\nWHERE duration && '[2025-11-01, 2025-12-01)'::daterange;\n\n-- Price tiers — find tier for a given quantity:\nCREATE TABLE pricing_tiers (\n  tier_name      TEXT,\n  quantity_range INT4RANGE,\n  price_per_unit NUMERIC\n);\nINSERT INTO pricing_tiers VALUES\n  ('Small',      '[1,10)',    10.00),\n  ('Medium',     '[10,100)',   8.50),\n  ('Enterprise', '[100,)',     5.50);\n\nSELECT price_per_unit FROM pricing_tiers\nWHERE quantity_range @> 75;  -- returns 8.50",
      "tags": [
        "Range types",
        "GiST",
        "Intervals",
        "Query rewriting",
        "Schema design"
      ],
      "source": "8 PostgreSQL Features"
    },
    "rec_rw_generated_columns": {
      "id": "rec_rw_generated_columns",
      "type": "recommendation",
      "title": "Generated Columns for Always-In-Sync Derived Values",
      "explanation": "Application-level computed columns — price with tax, full name from first+last, normalised search string — frequently get out of sync when source columns change. Database triggers are the traditional fix but add maintenance complexity. <strong>Generated columns</strong> (PostgreSQL 12+) compute a value automatically from other columns and keep it in sync with zero application code. They are stored in the table (<code>STORED</code> keyword), indexable, and guaranteed to always reflect their definition.<br><br>In PostgreSQL 18+, <strong>VIRTUAL</strong> generated columns are also supported (computed on read, not stored), saving disk space for expensive-to-store but cheap-to-compute values.",
      "when_not_to": "Generated columns cannot reference other generated columns, user-defined functions that are not immutable, or aggregate functions. They cannot be manually set — any attempt to INSERT or UPDATE the column directly will fail. For complex derivations that need conditional logic or cross-table lookups, a trigger or application layer is still needed.",
      "sql_example": "-- Always-correct price with tax:\nCREATE TABLE products (\n  id            SERIAL PRIMARY KEY,\n  name          TEXT,\n  base_price    NUMERIC(10,2),\n  tax_rate      NUMERIC(3,2) DEFAULT 0.10,\n  -- Auto-computed, always in sync, indexable:\n  price_with_tax NUMERIC(10,2)\n    GENERATED ALWAYS AS (base_price * (1 + tax_rate)) STORED\n);\n\nINSERT INTO products (name, base_price) VALUES ('Laptop', 999.99);\n-- price_with_tax automatically = 1099.99\n\n-- Full-text search column always in sync with content:\nCREATE TABLE articles (\n  id      SERIAL PRIMARY KEY,\n  title   TEXT,\n  content TEXT,\n  search_vector TSVECTOR\n    GENERATED ALWAYS AS\n      (to_tsvector('english', title || ' ' || content)) STORED\n);\nCREATE INDEX idx_articles_fts ON articles USING GIN(search_vector);\n\n-- Query — no function call needed at search time:\nSELECT title FROM articles\nWHERE search_vector @@ plainto_tsquery('english', 'postgresql performance');",
      "tags": [
        "Generated columns",
        "Schema design",
        "Derived data",
        "Full-text search"
      ],
      "source": "8 PostgreSQL Features"
    },
    "rec_wal_logical_replication": {
      "id": "rec_wal_logical_replication",
      "type": "recommendation",
      "title": "Logical Replication for Multi-Region HA and Read Scaling",
      "explanation": "<strong>Logical replication</strong> streams individual row-level changes (INSERT, UPDATE, DELETE) from a primary to one or more subscribers, unlike physical/streaming replication which ships raw WAL bytes. This makes it table-selective, version-flexible, and usable for multi-master setups. The primary creates a <strong>PUBLICATION</strong> (what to publish) and subscribers create a <strong>SUBSCRIPTION</strong> (where to send it).<br><br>Key properties: works across PostgreSQL major versions (useful for zero-downtime upgrades); can replicate specific tables only; subscribers can write to non-replicated tables (useful for local aggregations). For multi-master, conflict resolution is needed — the example uses an earliest-timestamp-wins trigger.",
      "when_not_to": "Logical replication does not replicate DDL (schema changes), sequences, or large objects. You must apply schema changes to subscribers manually before running them on the primary. It is also not a replacement for connection pooling — each subscription consumes a replication slot and WAL sender process. Ensure <code>max_replication_slots</code> and <code>max_wal_senders</code> are sized appropriately.",
      "sql_example": "-- Primary server: publish tables for replication\nCREATE PUBLICATION chat_replication\n  FOR TABLE messages, user_sessions, conversations;\n\n-- Secondary server (different region):\nCREATE SUBSCRIPTION chat_replica\n  CONNECTION 'host=primary.example.com port=5432 dbname=chatapp'\n  PUBLICATION chat_replication;\n\n-- Monitor replication lag:\nSELECT\n  slot_name,\n  pg_size_pretty(pg_wal_lsn_diff(\n    pg_current_wal_lsn(),\n    restart_lsn\n  )) AS replication_lag\nFROM pg_replication_slots;\n\n-- Multi-master conflict resolution (keep earliest timestamp):\nCREATE OR REPLACE FUNCTION resolve_message_conflict()\nRETURNS trigger AS $$\nBEGIN\n  IF NEW.created_at < OLD.created_at THEN\n    RETURN NEW;\n  ELSE\n    RETURN OLD;\n  END IF;\nEND;\n$$ LANGUAGE plpgsql;\n\n-- Check WAL sender capacity:\nSHOW max_wal_senders;     -- default 10\nSHOW max_replication_slots; -- must be >= number of subscribers",
      "tags": [
        "Replication",
        "HA",
        "Multi-region",
        "WAL",
        "Read scaling"
      ],
      "source": "PostgreSQL for Real-Time Apps"
    },
    "rec_conn_presence_tracking": {
      "id": "rec_conn_presence_tracking",
      "type": "recommendation",
      "title": "Real-Time Presence Tracking for WebSocket Applications",
      "explanation": "For real-time apps (chat, collaboration, gaming), tracking which users are online and in which rooms is a common problem. Traditional session storage doesn't scale. PostgreSQL can serve as a <strong>presence system</strong> using a sessions table with integer arrays (<code>room_ids INTEGER[]</code>) to track multi-room membership, combined with <code>LISTEN/NOTIFY</code> to broadcast state changes without polling.<br><br>The key insight: instead of querying for online users every N seconds, use a trigger on the sessions table to <code>PERFORM pg_notify('user_presence', ...)</code> — connected application servers receive the update instantly. Efficient online user counting uses <code>unnest(room_ids)</code> to expand arrays into rows, enabling per-room aggregation in a single query.",
      "when_not_to": "LISTEN/NOTIFY messages are fire-and-forget — if a subscriber is disconnected at the moment of NOTIFY, the message is lost. Do not use this pattern for guaranteed message delivery. For that, use a proper message queue (pg_queue, SKIP LOCKED queues, or an external broker). Also, NOTIFY payloads are limited to 8,000 bytes.",
      "sql_example": "-- Session table with array-based room membership\nCREATE TABLE user_sessions (\n  user_id      INTEGER NOT NULL,\n  session_id   UUID NOT NULL,\n  server_id    TEXT NOT NULL,\n  room_ids     INTEGER[],          -- multi-room membership\n  connected_at TIMESTAMPTZ DEFAULT NOW(),\n  last_seen    TIMESTAMPTZ DEFAULT NOW(),\n  PRIMARY KEY (user_id, session_id)\n);\n\n-- Trigger: broadcast any presence change via NOTIFY\nCREATE OR REPLACE FUNCTION notify_presence_change()\nRETURNS trigger AS $$\nBEGIN\n  PERFORM pg_notify(\n    'user_presence',\n    json_build_object(\n      'user_id', COALESCE(NEW.user_id, OLD.user_id),\n      'action',  TG_OP,\n      'rooms',   COALESCE(NEW.room_ids, OLD.room_ids)\n    )::text\n  );\n  RETURN COALESCE(NEW, OLD);\nEND;\n$$ LANGUAGE plpgsql;\n\nCREATE TRIGGER presence_notify\n  AFTER INSERT OR UPDATE OR DELETE ON user_sessions\n  FOR EACH ROW EXECUTE FUNCTION notify_presence_change();\n\n-- Count online users per room (last 30 seconds):\nSELECT\n  unnest(room_ids) AS room_id,\n  COUNT(DISTINCT user_id) AS online_count\nFROM user_sessions\nWHERE last_seen > NOW() - INTERVAL '30 seconds'\nGROUP BY 1;",
      "tags": [
        "Real-time",
        "WebSocket",
        "LISTEN/NOTIFY",
        "Arrays",
        "Presence"
      ],
      "source": "PostgreSQL for Real-Time Apps"
    }
  }
};

// ── State ─────────────────────────────────────────────────────────────────
let history = [];  // stack of node ids
let currentId = DATA.root;

// ── SQL Syntax Highlighting ───────────────────────────────────────────────
function highlightSQL(sql) {
  const keywords = ['SELECT','FROM','WHERE','JOIN','ON','CREATE','INDEX','TABLE','DROP',
    'ALTER','SET','INSERT','UPDATE','DELETE','INTO','VALUES','WITH','RECURSIVE',
    'AS','IN','NOT','AND','OR','LIKE','ORDER','BY','GROUP','HAVING','LIMIT',
    'OFFSET','DISTINCT','UNION','ALL','USING','INCLUDE','EXCLUDE','UNIQUE',
    'PRIMARY','KEY','EXTENSION','IF','EXISTS','CONCURRENTLY','SYSTEM','ANALYZE',
    'EXPLAIN','BUFFERS','BEGIN','COMMIT','ROLLBACK','CLUSTER','REINDEX',
    'GENERATED','ALWAYS','STORED','VIRTUAL','DEFAULT','REFERENCES','CONSTRAINT',
    'SHOW','RETURN','BEFORE','AFTER','FOR','EACH','ROW','EXECUTE','FUNCTION',
    'TRIGGER','LANGUAGE','RETURNS','NULL','NULLIF','ROUND','COALESCE',
    'LEFT','RIGHT','INNER','CROSS','LATERAL','PARTITION','RANGE','LIST','HASH',
    'MATERIALIZED','VIEW','REFRESH','RULE'];
  const fns = ['LOWER','UPPER','NOW','DATE_TRUNC','TO_TSVECTOR','PLAINTO_TSQUERY',
    'SIMILARITY','MD5','ARRAY','COALESCE','NULLIF','ROUND','COUNT','SUM','AVG',
    'MAX','MIN','ROW_NUMBER','RANK','DENSE_RANK','OVER','PARTITION','NTILE',
    'pg_size_pretty','pg_relation_size','pg_stat_reset','pg_reload_conf',
    'pg_try_advisory_lock','pg_advisory_unlock','pg_advisory_xact_lock',
    'pgstattuple','ts_rank'];

  let result = sql
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Comments
  result = result.replace(/(--[^\n]*)/g, '<span class="cmt">$1</span>');
  // Strings
  result = result.replace(/'([^']*)'/g, "<span class='str'>'$1'</span>");
  // Numbers
  result = result.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
  // Keywords
  keywords.forEach(kw => {
    result = result.replace(new RegExp(`\\b(${kw})\\b`, 'gi'),
      (m) => `<span class="kw">${m}</span>`);
  });
  // Functions
  fns.forEach(fn => {
    result = result.replace(new RegExp(`\\b(${fn})\\s*(?=\\()`, 'gi'),
      (m) => `<span class="fn">${m}</span>`);
  });
  return result;
}

// ── Tag helper ────────────────────────────────────────────────────────────
function tagClass(t) {
  const lower = t.toLowerCase();
  if (lower.includes('oltp')) return 'tag-oltp';
  if (lower.includes('analytics') || lower.includes('read')) return 'tag-analytics';
  if (lower.includes('write')) return 'tag-write';
  return 'tag-default';
}

// ── Render helpers ────────────────────────────────────────────────────────
function renderBreadcrumb() {
  const crumbs = ['idx_root', ...history];
  if (!crumbs.includes(currentId)) crumbs.push(currentId);

  return `<div class="breadcrumb">
    <span class="crumb-home" onclick="goHome()" title="Start over">⌂</span>
    ${crumbs.map((id, i) => {
      const node = DATA.nodes[id];
      if (!node) return '';
      const label = node.type === 'question'
        ? (node.question.length > 30 ? node.question.slice(0,30)+'…' : node.question)
        : node.title;
      const isCurrent = i === crumbs.length - 1;
      return `
        <span class="crumb-sep">›</span>
        <span class="crumb ${isCurrent ? 'current' : ''}"
              ${!isCurrent ? `onclick="jumpTo(${i})"` : ''}
              title="${label}">${label}</span>
      `;
    }).join('')}
  </div>`;
}

function renderProgress() {
  const depth = history.length;
  const pct = Math.min(depth * 14 + 8, 95);
  return `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
}

function renderQuestion(node) {
  const opts = node.options.map((o, i) => `
    <button class="option-btn" onclick="navigate('${o.next}')">
      <div class="opt-icon">${String.fromCharCode(65+i)}</div>
      <span>${o.label}</span>
      <span class="arrow">→</span>
    </button>
  `).join('');

  return `
    ${history.length > 0 ? `<button class="back-btn" onclick="goBack()">← Back</button>` : ''}
    ${renderBreadcrumb()}
    ${renderProgress()}
    <div class="question-card">
      <div class="q-label">Decision Point</div>
      <h2>${node.question}</h2>
      <div class="context">${node.context.replace(/`([^`]+)`/g, '<code>$1</code>')}</div>
    </div>
    <div class="options-grid">${opts}</div>
  `;
}

function renderRecommendation(node) {
  const tags = (node.tags || []).map(t =>
    `<span class="tag ${tagClass(t)}">${t}</span>`).join('');

  const sqlHtml = highlightSQL(node.sql_example || '');

  return `
    <button class="back-btn" onclick="goBack()">← Back</button>
    ${renderBreadcrumb()}
    ${renderProgress()}
    <div class="rec-card">
      <div class="rec-header">
        <div class="rec-icon">✅</div>
        <div class="rec-header-text">
          <div class="r-label">Recommendation</div>
          <h2>${node.title}</h2>
        </div>
      </div>
      <div class="rec-body">
        <div>
          <div class="rec-section-title">Why this approach</div>
          <div class="rec-explanation">${node.explanation}</div>
        </div>
        ${node.when_not_to ? `
        <div class="warning-box">
          <span class="w-icon">⚠️</span>
          <span><strong>When NOT to use this:</strong> ${node.when_not_to}</span>
        </div>` : ''}
        ${node.sql_example ? `
        <div>
          <div class="rec-section-title">Example SQL</div>
          <div class="code-wrap">
            <div class="code-header">
              <span>sql</span>
              <button class="copy-btn" onclick="copyCode(this)">Copy</button>
            </div>
            <pre>${sqlHtml}</pre>
          </div>
        </div>` : ''}
        <div>
          <div class="rec-section-title">Tags</div>
          <div class="tags">${tags}</div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
          <div class="source-line">📚 Source: ${node.source || 'PostgreSQL documentation'}</div>
          <button class="restart-btn" onclick="goHome()">↩ Start over</button>
        </div>
      </div>
    </div>
  `;
}

function renderDiagnostic(node) {
  const th = node.threshold || {};
  const thresholdHtml = (th.bad || th.ok || th.good) ? `
    <div>
      <div class="rec-section-title">How to interpret the result</div>
      <div class="threshold-grid">
        ${th.bad  ? `<div class="threshold-cell threshold-bad"><div class="th-label">🔴 Needs attention</div>${th.bad}</div>`  : ''}
        ${th.ok   ? `<div class="threshold-cell threshold-ok"><div class="th-label">🟡 Acceptable</div>${th.ok}</div>`   : ''}
        ${th.good ? `<div class="threshold-cell threshold-good"><div class="th-label">🟢 Healthy</div>${th.good}</div>` : ''}
      </div>
    </div>` : '';

  const sqlId = 'sql_' + node.id;
  const sqlHtml = node.sql ? `
    <div>
      <button class="diag-sql-toggle" onclick="toggleDiagSql('${sqlId}')">
        <span>📋</span> Show diagnostic query
        <span id="${sqlId}_arrow">▸</span>
      </button>
      <div class="diag-sql-container" id="${sqlId}">
        <div style="margin-top:10px;">
          <div class="code-wrap">
            <div class="code-header">
              <span>sql</span>
              <button class="copy-btn" onclick="copyCode(this)">Copy</button>
            </div>
            <pre>${highlightSQL(node.sql)}</pre>
          </div>
        </div>
      </div>
    </div>` : '';

  const opts = (node.options || []).map((o, i) => {
    const isSkip = o.skip === true;
    if (isSkip) return `
      <button class="skip-btn" onclick="navigate('${o.next}')">
        ⤼ ${o.label}
      </button>`;
    return `
      <button class="option-btn" onclick="navigate('${o.next}')">
        <span class="opt-icon">${String.fromCharCode(65 + i)}</span>
        <span>${o.label}</span>
        <span class="arrow">›</span>
      </button>`;
  }).join('');

  return `
    ${history.length > 0 ? `<button class="back-btn" onclick="goBack()">← Back</button>` : ''}
    ${renderBreadcrumb()}
    ${renderProgress()}
    <div class="diag-card">
      <div class="diag-header">
        <div class="diag-icon">🔬</div>
        <div class="diag-header-text">
          <div class="d-step">Diagnostic Step · ${node.metric || 'Check'}</div>
          <h2>${node.question}</h2>
        </div>
      </div>
      <div class="diag-body">
        <div class="diag-explanation">${node.context.replace(/`([^`]+)`/g, '<code>$1</code>')}</div>
        ${thresholdHtml}
        ${sqlHtml}
        <div>
          <div class="rec-section-title">What did you find?</div>
          <div class="options-grid">${opts}</div>
        </div>
      </div>
    </div>
  `;
}

function toggleDiagSql(id) {
  const container = document.getElementById(id);
  const arrow = document.getElementById(id + '_arrow');
  const isOpen = container.classList.toggle('open');
  if (arrow) arrow.textContent = isOpen ? '▾' : '▸';
}

function renderComingSoon(topicName) {
  return `
    <div class="coming-soon">
      <div class="cs-icon">🚧</div>
      <h3>${topicName}</h3>
      <p>This subtopic is being built. Content is sourced from the PostgreSQL optimization article library and will be added in a future session.</p>
    </div>
  `;
}

// ── Navigation ────────────────────────────────────────────────────────────
function render() {
  const main = document.getElementById('main');
  const node = DATA.nodes[currentId];
  if (!node) { main.innerHTML = '<p style="color:red">Node not found: ' + currentId + '</p>'; return; }
  main.innerHTML = node.type === 'question' ? renderQuestion(node)
    : node.type === 'diagnostic' ? renderDiagnostic(node)
    : renderRecommendation(node);
  main.scrollTop = 0;
}

function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  document.getElementById('themeIcon').textContent = isLight ? '🌙' : '☀️';
  try { localStorage.setItem('pg-tree-theme', isLight ? 'light' : 'dark'); } catch(e) {}
}

// Restore theme preference on load
(function() {
  try {
    if (localStorage.getItem('pg-tree-theme') === 'light') {
      document.documentElement.classList.add('light');
      // Icon will be set once DOM is ready; handled in DOMContentLoaded below
    }
  } catch(e) {}
})();

document.addEventListener('DOMContentLoaded', function() {
  try {
    if (localStorage.getItem('pg-tree-theme') === 'light') {
      const icon = document.getElementById('themeIcon');
      if (icon) icon.textContent = '🌙';
    }
  } catch(e) {}
});

function navigate(id) {
  history.push(currentId);
  currentId = id;
  render();
}

function goBack() {
  if (history.length === 0) return;
  currentId = history.pop();
  render();
}

function goHome() {
  history = [];
  currentId = DATA.root;
  render();
}

function jumpTo(index) {
  // history[0] is the first node visited; reconstruct the full path
  const path = [...history, currentId];
  const target = path[index];
  history = path.slice(0, index);
  currentId = target;
  render();
}

function selectTopic(t) {
  if (t === 'indexing') goHome();
  else if (t === 'guided') {
    history = [];
    currentId = 'sym_root';
    render();
  }
  else if (t === 'explain') { history = []; currentId = 'qp_sym_root'; render(); }
  else if (t === 'cost') { history = []; currentId = 'cm_sym_root'; render(); }
  else if (t === 'memory') { history = []; currentId = 'mem_sym_root'; render(); }
  else if (t === 'partitioning') { history = []; currentId = 'part_sym_root'; render(); }
  else if (t === 'parallel') { history = []; currentId = 'par_sym_root'; render(); }
  else if (t === 'rewriting') { history = []; currentId = 'rw_sym_root'; render(); }
  else if (t === 'wal') { history = []; currentId = 'wal_sym_root'; render(); }
  else if (t === 'connections') { history = []; currentId = 'conn_sym_root'; render(); }
  else if (t === 'vacuum') { history = []; currentId = 'vac_sym_root'; render(); }
  else if (t === 'caching') { history = []; currentId = 'cache_sym_root'; render(); }
}

function copyCode(btn) {
  const pre = btn.closest('.code-wrap').querySelector('pre');
  const text = pre.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
