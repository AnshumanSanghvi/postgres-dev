    "rec_rw_in_join": {
      "id": "rec_rw_in_join",
      "type": "recommendation",
      "title": "Replace Large IN List with Temporary Table or JOIN",
      "priority": "high",
      "explanation": "Large IN lists cause: parse time proportional to list size, plan tree bloat, and often a sequential scan when the planner loses confidence in the statistics. The correct pattern is to insert the values into a temporary table and JOIN against it, giving the planner accurate statistics and enabling Hash Join.",
      "steps": [
        "Create a temporary table with the values (or use a VALUES clause for medium lists).",
        "INSERT the list values into the temp table.",
        "JOIN the temp table instead of using IN.",
        "Add an index on the temp table column if joining large sets.",
        "For application code, use unnest($1::int[]) to pass arrays directly."
      ],
      "code": "-- BEFORE (large IN list — may force Seq Scan):\nSELECT * FROM orders WHERE customer_id IN (1, 2, 3, ..., 10000);\n\n-- AFTER OPTION 1: Temp table JOIN (best for very large lists):\nCREATE TEMP TABLE target_customers (customer_id INT PRIMARY KEY);\nINSERT INTO target_customers VALUES (1),(2),(3),...,(10000);\n\nSELECT o.*\nFROM orders o\nJOIN target_customers tc ON o.customer_id = tc.customer_id;\n\n-- AFTER OPTION 2: unnest for arrays (best for application code):\nSELECT * FROM orders\nWHERE customer_id = ANY($1::int[]);  -- pass array from application\n-- Or:\nSELECT o.*\nFROM orders o\nJOIN unnest($1::int[]) AS t(customer_id) ON o.customer_id = t.customer_id;\n\n-- AFTER OPTION 3: VALUES clause (medium lists, 100-1000):\nSELECT o.*\nFROM orders o\nJOIN (VALUES (1),(2),(3),...) AS t(customer_id) ON o.customer_id = t.customer_id;",
      "expected_impact": "Replaces linear parse time with a single array parameter. Enables Hash Join with accurate row estimates. Often 5–50× faster for lists > 500 values."
    },
    "rec_rw_in_small": {
      "id": "rec_rw_in_small",
      "type": "recommendation",
      "title": "Medium IN List — Use ANY($1::int[]) Array Syntax",
      "priority": "medium",
      "explanation": "For lists of 50–300 values that currently use Index Scans, the main improvement is switching to parameterized arrays (ANY) to avoid re-planning on each call. This also prevents plan cache pollution from unique IN lists.",
      "steps": [
        "Switch from IN (val1, val2, ...) to = ANY($1::int[]) in prepared statements.",
        "Pass the values as a PostgreSQL array from the application.",
        "This is equivalent semantically but enables plan caching and avoids query string bloat."
      ],
      "code": "-- BEFORE (literal IN list — unique query string, no plan caching):\nSELECT * FROM products WHERE id IN (101, 205, 399);\n\n-- AFTER (array parameter — single plan, reused for any size array):\n-- In application (Python/asyncpg example):\n-- await conn.fetch('SELECT * FROM products WHERE id = ANY($1)', [101, 205, 399])\n\n-- In SQL:\nSELECT * FROM products WHERE id = ANY($1::int[]);  -- $1 = ARRAY[101, 205, 399]",
      "expected_impact": "Better plan cache utilization, reduced parse overhead. Consistent query strings enable pg_stat_statements aggregation across different list sizes."
    },
    "rec_rw_cte_fence": {
      "id": "rec_rw_cte_fence",
      "type": "recommendation",
      "title": "Break CTE Materialization Fence with Subquery or NOT MATERIALIZED",
      "priority": "high",
      "explanation": "When a CTE is materialized (pre-12 default, or when the planner chooses to), it creates an optimization fence: outer WHERE predicates cannot be pushed into the CTE. The fix is to either convert the CTE to a subquery (inline it) or use NOT MATERIALIZED in PG12+. Reserve MATERIALIZED only when you explicitly need the result to be computed once (e.g., the CTE has side effects or volatile functions).",
      "steps": [
        "Check PostgreSQL version: SELECT version();",
        "In PG12+: add NOT MATERIALIZED to the CTE if the planner chose to materialize it incorrectly.",
        "Or convert the CTE to a subquery in the FROM clause — identical semantics, no fence.",
        "Keep MATERIALIZED only for CTEs with volatile functions (random(), now()) or when you explicitly want a single execution.",
        "Verify with EXPLAIN ANALYZE that 'CTE Scan' node is gone after the change."
      ],
      "code": "-- BEFORE (CTE creates optimization fence — full scan of 'active' rows, then filter by user_id):\nWITH active_orders AS (\n  SELECT * FROM orders WHERE status = 'active'  -- materialized, user_id filter not pushed in\n)\nSELECT * FROM active_orders WHERE user_id = 42;\n\n-- AFTER OPTION 1: NOT MATERIALIZED (PG12+):\nWITH active_orders AS NOT MATERIALIZED (\n  SELECT * FROM orders WHERE status = 'active'\n)\nSELECT * FROM active_orders WHERE user_id = 42;\n-- Planner can now push user_id = 42 into the scan\n\n-- AFTER OPTION 2: Convert to subquery (any version):\nSELECT * FROM (\n  SELECT * FROM orders WHERE status = 'active'\n) AS active_orders\nWHERE user_id = 42;\n-- Equivalent, no fence, planner has full freedom\n\n-- When MATERIALIZED is correct (volatile function, compute-once semantics):\nWITH snapshot AS MATERIALIZED (\n  SELECT *, random() AS rand_rank FROM candidates  -- random() must run once\n)\nSELECT * FROM snapshot WHERE rand_rank < 0.1;",
      "expected_impact": "Allows predicate pushdown into the CTE scan. Converts a full-CTE-result scan + filter into a direct index seek on the base table. Typically 10–100× improvement when the outer filter is highly selective."
    },
    "rec_rw_cte_multiref": {
      "id": "rec_rw_cte_multiref",
      "type": "recommendation",
      "title": "Use MATERIALIZED for CTEs Referenced Multiple Times",
      "priority": "medium",
      "explanation": "If a CTE is referenced more than once in the query and NOT MATERIALIZED is used (or default in PG12+), the CTE body may be executed multiple times — once per reference. In that case, MATERIALIZED is correct to force single execution. The trade-off is: predicate pushdown is blocked, but the expensive CTE computation runs only once.",
      "steps": [
        "Count how many times the CTE name appears in the query body.",
        "If referenced 2+ times and the CTE is expensive, add MATERIALIZED explicitly.",
        "If referenced once, use NOT MATERIALIZED or convert to subquery.",
        "Check EXPLAIN for repeated CTE Scan vs. single materialization cost."
      ],
      "code": "-- Multi-reference CTE: MATERIALIZED prevents double execution\nWITH expensive_agg AS MATERIALIZED (\n  SELECT customer_id, SUM(amount) AS total, COUNT(*) AS cnt\n  FROM orders\n  WHERE created_at > NOW() - INTERVAL '1 year'\n  GROUP BY customer_id\n)\nSELECT\n  e.customer_id,\n  e.total,\n  e.total / NULLIF(e.cnt, 0) AS avg_order,  -- first reference\n  RANK() OVER (ORDER BY e.total DESC) AS rank  -- second reference\nFROM expensive_agg e\nWHERE e.total > 1000;",
      "expected_impact": "Single execution of expensive aggregation instead of once per reference. Critical when CTE involves large GROUP BY or window function computation."
    },
    "rec_rw_window_topn": {
      "id": "rec_rw_window_topn",
      "type": "recommendation",
      "title": "Rewrite Top-N Per Group Using ROW_NUMBER() Window Function",
      "priority": "high",
      "explanation": "Window functions make a single pass over the data, partitioned by group, and assign row numbers. Wrapping this in a subquery and filtering WHERE rn <= N gives top-N per group in O(n log n) instead of O(n × groups). This is the standard pattern for this class of problem.",
      "steps": [
        "Wrap the base query with ROW_NUMBER() OVER (PARTITION BY group_col ORDER BY sort_col DESC).",
        "Place this in a subquery or CTE.",
        "In the outer query, filter WHERE rn <= N.",
        "Create a composite index on (group_col, sort_col DESC) to enable Index Scan within each partition window."
      ],
      "code": "-- BEFORE (correlated subquery — O(n × customers)):\nSELECT *\nFROM orders o1\nWHERE (\n  SELECT COUNT(*)\n  FROM orders o2\n  WHERE o2.customer_id = o1.customer_id\n    AND o2.created_at >= o1.created_at\n) <= 3;  -- top 3 orders per customer\n\n-- AFTER (window function — single pass):\nSELECT customer_id, order_id, amount, created_at\nFROM (\n  SELECT\n    customer_id,\n    order_id,\n    amount,\n    created_at,\n    ROW_NUMBER() OVER (\n      PARTITION BY customer_id\n      ORDER BY created_at DESC\n    ) AS rn\n  FROM orders\n) ranked\nWHERE rn <= 3;\n\n-- For top-1 only, DISTINCT ON is simpler:\nSELECT DISTINCT ON (customer_id)\n  customer_id, order_id, amount, created_at\nFROM orders\nORDER BY customer_id, created_at DESC;\n\n-- Supporting index:\nCREATE INDEX idx_orders_cust_date ON orders(customer_id, created_at DESC);",
      "expected_impact": "Reduces complexity from O(n × groups) to O(n log n). For 1M orders across 100k customers, this is the difference between ~100B comparisons and ~20M. Typically 50–500× improvement."
    },

    "diag_wal_checkpoint": {
      "id": "diag_wal_checkpoint",
      "type": "diagnostic",
      "metric": "Checkpoint frequency and dirty buffer pressure",
      "question": "Run the pg_stat_bgwriter query below. Are checkpoints happening more frequently than checkpoint_completion_target allows, and is buffers_backend high?",
      "context": "PostgreSQL writes dirty buffers to disk at checkpoints. If checkpoints happen too frequently (checkpoint_warning in logs), the system can't spread writes across the checkpoint interval, causing I/O bursts. buffers_backend > 0 means backends are writing dirty buffers themselves instead of bgwriter — a sign of checkpoint pressure.",
      "threshold": {
        "bad": "checkpoints_req > checkpoints_timed (forced checkpoints), buffers_backend > 0, logs show 'checkpoint occurring too frequently'.",
        "ok": "checkpoints_req ≈ 0, checkpoint_completion_target is 0.9, some I/O spikes but within acceptable range.",
        "good": "checkpoints_timed only, buffers_backend = 0, I/O is smooth."

    "rec_wal_async_commit": {
      "id": "rec_wal_async_commit",
      "type": "recommendation",
      "title": "Enable Asynchronous Commit for Latency-Sensitive Writes",
      "priority": "high",
      "explanation": "synchronous_commit = off removes the fsync wait from COMMIT, reducing per-commit latency from ~2–10ms to < 0.1ms. The trade-off: on a crash (not a normal shutdown), up to wal_writer_delay (default 200ms) of commits may be lost. There is NEVER data corruption — only potential loss of the last ~200ms of transactions. This is acceptable for many workloads: session data, analytics events, queues, logging.",
      "steps": [
        "Assess data criticality: financial transactions should keep synchronous_commit = on. Session/analytics/queue data can safely use off.",
        "Set at session or transaction level first to test without affecting other workloads.",
        "Set globally in postgresql.conf or per-database/user if appropriate.",
        "Monitor pg_stat_bgwriter after enabling — checkpoint_sync_time should drop."
      ],
      "code": "-- Option 1: Per-transaction (safest for testing):\nBEGIN;\nSET LOCAL synchronous_commit = off;\nINSERT INTO events(user_id, action) VALUES (42, 'click');\nCOMMIT;  -- no fsync wait\n\n-- Option 2: Per-session:\nSET synchronous_commit = off;\n\n-- Option 3: Per-database (all connections to this DB):\nALTER DATABASE analytics_db SET synchronous_commit = off;\n\n-- Option 4: Per-role (specific application user):\nALTER ROLE app_writer SET synchronous_commit = off;\n\n-- Option 5: Global (postgresql.conf):\nsynchronous_commit = off\n-- Then: SELECT pg_reload_conf();\n\n-- Verify:\nSHOW synchronous_commit;\n-- Monitor: wal_writer_delay (default 200ms) = max data loss window\nSHOW wal_writer_delay;",
      "expected_impact": "Reduces per-commit latency by 10–100×. Enables 5,000–50,000+ commits/second vs. 500–5,000 with synchronous commit on spinning disk. No change to data integrity on normal operation."
    },
    "rec_wal_checkpoint_tune": {
      "id": "rec_wal_checkpoint_tune",
      "type": "recommendation",
      "title": "Tune Checkpoint Parameters to Reduce I/O Spikes",
      "priority": "high",
      "explanation": "Checkpoint tuning has two goals: (1) make checkpoints less frequent by increasing max_wal_size, and (2) spread checkpoint writes over the full interval using checkpoint_completion_target = 0.9. Together, these smooth I/O and prevent checkpoint pressure from backing up into backends.",
      "steps": [
        "Increase max_wal_size to reduce forced checkpoints (start at 2–4GB, or 4× current if logs show frequent checkpoints).",
        "Set checkpoint_completion_target = 0.9 to spread writes over 90% of the checkpoint interval.",
        "Consider increasing checkpoint_timeout from 5min to 10–15min for write-heavy OLAP workloads.",
        "Monitor pg_stat_bgwriter after changes — checkpoints_req should drop to 0.",
        "Ensure WAL disk has capacity for increased max_wal_size."
      ],
      "code": "-- postgresql.conf changes:\nmax_wal_size = 4GB                  -- default 1GB, increase to reduce checkpoint frequency\ncheckpoint_completion_target = 0.9  -- spread writes over 90% of interval\ncheckpoint_timeout = 10min          -- default 5min, allow longer intervals\nwal_compression = on                -- reduce WAL volume (PG9.5+, slight CPU cost)\n\n-- bgwriter tuning (smooth buffer writes between checkpoints):\nbgwriter_lru_maxpages = 200         -- default 100, write more buffers per round\nbgwriter_delay = 50                 -- default 200ms, check more frequently\n\n-- Apply without restart:\nSELECT pg_reload_conf();\n\n-- Verify after 10min:\nSELECT\n  checkpoints_req,      -- should drop toward 0\n  checkpoints_timed,    -- should increase (good — scheduled, not forced)\n  buffers_backend       -- should drop toward 0\nFROM pg_stat_bgwriter;",
      "expected_impact": "Eliminates I/O spikes from forced checkpoints. Spreads writes evenly across the checkpoint interval. buffers_backend dropping to 0 means backends no longer stall waiting to write dirty buffers."
    },
    "rec_wal_copy_load": {
      "id": "rec_wal_copy_load",
      "type": "recommendation",
      "title": "Use COPY for Bulk Loads — Drop Indexes During Load",
      "priority": "high",
      "explanation": "COPY is PostgreSQL's bulk load mechanism. It batches WAL records, bypasses individual statement overhead, and can load millions of rows per minute. Dropping indexes before loading and recreating them after is faster than maintaining indexes during load — index maintenance during INSERT has O(n log n) overhead vs. a single bulk index build.",
      "steps": [
        "Drop non-primary-key indexes before the load.",
        "Disable triggers if they are not needed during load.",
        "Use COPY FROM for file loads or COPY FROM STDIN for programmatic loads.",
        "Optionally wrap in a transaction to make it atomic.",
        "Recreate indexes after load — CREATE INDEX is parallelizable.",
        "Run ANALYZE after load to update statistics."
      ],
      "code": "-- Full bulk load pattern:\n\n-- Step 1: Drop indexes (keep PK)\nDROP INDEX IF EXISTS idx_orders_customer;\nDROP INDEX IF EXISTS idx_orders_created;\n\n-- Step 2: Optional — disable triggers\nALTER TABLE orders DISABLE TRIGGER ALL;\n\n-- Step 3: Bulk load\nBEGIN;\nCOPY orders (customer_id, amount, status, created_at)\nFROM '/data/orders_2024.csv'\nWITH (FORMAT csv, HEADER true, DELIMITER ',');\nCOMMIT;\n\n-- Step 4: Recreate indexes (in parallel if PG11+)\nSET max_parallel_maintenance_workers = 4;\nCREATE INDEX CONCURRENTLY idx_orders_customer ON orders(customer_id);\nCREATE INDEX CONCURRENTLY idx_orders_created ON orders(created_at DESC);\n\n-- Step 5: Re-enable triggers\nALTER TABLE orders ENABLE TRIGGER ALL;\n\n-- Step 6: Update statistics\nANALYZE orders;\n\n-- From application (Python psycopg2):\n-- with conn.cursor() as cur:\n--     cur.copy_from(fileobj, 'orders', sep=',', columns=('customer_id','amount'))\n\n-- For unlogged tables (staging, ETL):\nCREATE UNLOGGED TABLE orders_staging (LIKE orders);\nCOPY orders_staging FROM '/data/orders_2024.csv' WITH (FORMAT csv);\n-- Then INSERT INTO orders SELECT * FROM orders_staging;\n-- Then DROP TABLE orders_staging;",
      "expected_impact": "COPY loads 10–100× faster than individual INSERTs. Dropping indexes during load adds another 2–5× improvement for large tables. A 1M row load that takes 30 minutes with individual INSERTs can complete in 30–60 seconds with COPY + no indexes."
    },
    "rec_wal_unlogged": {
      "id": "rec_wal_unlogged",
      "type": "recommendation",
      "title": "Use UNLOGGED Tables for Temporary or Ephemeral Data",
      "priority": "medium",
      "explanation": "UNLOGGED tables skip WAL writes entirely — data is not replicated and is truncated on crash recovery. This makes them 2–10× faster for writes. Use cases: staging tables for ETL, session/cache tables, temporary computation tables, materialized view staging. Never use for durable business data.",
      "steps": [
        "Identify tables that are populated from another source (can be rebuilt) or that hold transient data.",
        "Create the table with UNLOGGED keyword.",
        "Accept that table content is lost on PostgreSQL crash (not normal shutdown).",
        "Use as staging area: load into UNLOGGED, process, INSERT into regular table."
      ],
      "code": "-- Create an unlogged table:\nCREATE UNLOGGED TABLE session_cache (\n  session_id TEXT PRIMARY KEY,\n  user_id INT NOT NULL,\n  data JSONB,\n  expires_at TIMESTAMPTZ NOT NULL\n);\n\n-- Convert existing table to unlogged (PG15+):\nALTER TABLE session_cache SET UNLOGGED;\n-- Convert back to logged:\nALTER TABLE session_cache SET LOGGED;\n\n-- ETL staging pattern:\nCREATE UNLOGGED TABLE raw_events_staging (LIKE raw_events);\nCOPY raw_events_staging FROM '/data/events.csv' WITH (FORMAT csv);\n-- Process and insert:\nINSERT INTO raw_events\nSELECT * FROM raw_events_staging WHERE is_valid(data);\nTRUNCATE raw_events_staging;\n\n-- Check which tables are unlogged:\nSELECT relname, relpersistence\nFROM pg_class\nWHERE relpersistence = 'u'  -- 'u' = unlogged\n  AND relkind = 'r';",
      "expected_impact": "2–10× write throughput improvement. WAL write rate drops to near zero for unlogged table operations. Significant reduction in I/O pressure on the WAL volume during bulk loads."
    },
    "rec_wal_buffers_tune": {
      "id": "rec_wal_buffers_tune",
      "type": "recommendation",
      "title": "Increase wal_buffers for High-Throughput Write Workloads",
      "priority": "medium",
      "explanation": "wal_buffers controls the in-memory buffer for WAL records before they are written to WAL segment files. On write-heavy workloads, a small wal_buffers creates contention at WALWriteLock. Increasing it to 16MB–64MB reduces this contention. Beyond 64MB, the benefit is minimal as WAL is written frequently anyway.",
      "steps": [
        "Measure current WAL write rate (MB/s) using pg_current_wal_lsn() before/after.",
        "Set wal_buffers to 16MB as a starting point for most workloads.",
        "Increase to 64MB for very high WAL throughput (> 100MB/s).",
        "Requires PostgreSQL restart (wal_buffers is not hot-reloadable).",
        "Verify WAL lock contention drops in pg_stat_activity after restart."
      ],
      "code": "-- postgresql.conf:\nwal_buffers = 16MB   -- default: -1 (auto = 1/32 of shared_buffers, max 64MB)\n-- Options: 8MB (moderate writes), 16MB (typical), 64MB (very high throughput)\n\n-- Requires restart:\n-- sudo systemctl restart postgresql\n\n-- After restart, monitor WAL contention:\nSELECT wait_event_type, wait_event, COUNT(*)\nFROM pg_stat_activity\nWHERE state != 'idle'\nGROUP BY 1, 2\nORDER BY 3 DESC;\n-- WALWriteLock should be gone or rare\n\n-- Verify setting took effect:\nSHOW wal_buffers;\n\n-- Also consider for write-heavy OLTP:\nwal_writer_delay = 10ms    -- default 200ms: flush WAL more frequently (reduces data loss window with async commit)\nwal_writer_flush_after = 1MB  -- flush after accumulating this much WAL",
      "expected_impact": "Reduces WALWriteLock contention on high-throughput write workloads. Typically provides 10–30% throughput improvement when WAL contention was the bottleneck. Combined with async commit, enables very high commit rates."
    },

    "rec_conn_pgbouncer": {
      "id": "rec_conn_pgbouncer",
      "type": "recommendation",
      "title": "Set Up PgBouncer for Connection Pooling",
      "priority": "high",
      "explanation": "PgBouncer is a lightweight connection pooler that sits between applications and PostgreSQL. In transaction mode, it multiplexes thousands of application connections into a small pool of PostgreSQL backends. A common configuration: 1000 app connections → 20 PostgreSQL backends, reducing memory use by 98% and eliminating connection setup overhead.",
      "steps": [
        "Install PgBouncer on the same host as the application or a dedicated proxy host.",
        "Configure pgbouncer.ini with your database connection details and pool settings.",
        "Set pool_mode = transaction for stateless applications (most common).",
        "Set max_client_conn = expected peak app connections (e.g. 1000).",
        "Set default_pool_size = target PostgreSQL backend count (typically 10–25 per database).",
        "Point application connection strings at PgBouncer (port 6432) instead of PostgreSQL directly.",
        "Monitor via PgBouncer admin interface (SHOW POOLS, SHOW STATS)."
      ],
      "code": "# pgbouncer.ini\n[databases]\n# Format: db_alias = host=pg_host port=5432 dbname=actual_db\nmyapp = host=127.0.0.1 port=5432 dbname=myapp_production\n\n[pgbouncer]\nlisten_port = 6432\nlisten_addr = 127.0.0.1\n\n# Pool mode: transaction (best multiplexing), session (safest), statement (rarely used)\npool_mode = transaction\n\n# Max connections PgBouncer accepts from clients:\nmax_client_conn = 1000\n\n# Server connections to PostgreSQL per database:\ndefault_pool_size = 20\n\n# Reserve pool for when default is exhausted:\nreserve_pool_size = 5\nreserve_pool_timeout = 3  # seconds before using reserve pool\n\n# Connection timeouts:\nserver_idle_timeout = 600   # close idle server conns after 10min\nclient_idle_timeout = 0     # keep client conns open indefinitely\nserver_connect_timeout = 15\n\n# Authentication:\nauth_type = scram-sha-256\nauth_file = /etc/pgbouncer/userlist.txt\n\n# Admin access:\nadmin_users = pgbouncer_admin\nstats_users = monitoring\n\n# Logging:\nlog_connections = 0  # reduce noise in production\nlog_disconnections = 0\n\n# userlist.txt format (or use auth_query for PostgreSQL auth):\n# \"app_user\" \"md5hash_or_password\"\n\n# Start:\n# pgbouncer -d /etc/pgbouncer/pgbouncer.ini\n\n# Monitor:\n# psql -h 127.0.0.1 -p 6432 -U pgbouncer_admin pgbouncer -c 'SHOW POOLS;'",
      "expected_impact": "Multiplexes thousands of application connections into tens of PostgreSQL backends. Eliminates connection setup latency. Reduces idle connection memory from GBs to tens of MB. The standard solution for > 100 concurrent application connections."

    "rec_conn_max_connections": {
      "id": "rec_conn_max_connections",
      "type": "recommendation",
      "title": "Tune max_connections and Add a Pooler",
      "priority": "medium",
      "explanation": "Increasing max_connections buys time but is not a long-term solution — each connection costs ~5–10MB of shared memory. The correct approach is to right-size max_connections for your hardware and add PgBouncer to handle application-level concurrency. A common rule: max_connections = (4 × CPU cores) + max_parallel_workers, plus connection pooler overhead.",
      "steps": [
        "Calculate a sensible max_connections: typically 4× CPU cores for OLTP, plus overhead for monitoring/admin (10–20 connections).",
        "Do NOT simply increase max_connections without adding a pooler — memory will be exhausted.",
        "Requires PostgreSQL restart.",
        "Simultaneously deploy PgBouncer so the max_connections limit is rarely approached."
      ],
      "code": "-- Current configuration:\nSHOW max_connections;\nSHOW superuser_reserved_connections;\n\n-- Memory calculation:\n-- shared_buffers + (max_connections × ~8MB) must fit in RAM\n-- Example: 32GB RAM, 8GB shared_buffers → 24GB for backends → max ~3000 connections\n-- But: 3000 idle connections = unusable. Use pooler instead.\n\n-- postgresql.conf:\nmax_connections = 200              -- for use behind PgBouncer\nsuperuser_reserved_connections = 5 -- reserved for admin access\n\n-- In PgBouncer, set:\n-- max_client_conn = 2000          -- app sees 2000 connection slots\n-- default_pool_size = 20          -- only 20 real PG backends per db\n\n-- After change, restart PostgreSQL:\n-- sudo systemctl restart postgresql\n\n-- Verify:\nSELECT setting FROM pg_settings WHERE name = 'max_connections';",
      "expected_impact": "Proper max_connections setting prevents memory exhaustion. Combined with PgBouncer, the system handles thousands of application connections with tens of PostgreSQL backends."
    },
    "rec_conn_pool_sizing": {
      "id": "rec_conn_pool_sizing",
      "type": "recommendation",
      "title": "Right-Size Your Connection Pool",
      "priority": "medium",
      "explanation": "The common mistake is making connection pools too large. More connections to PostgreSQL does not mean more throughput — it means more context switching and lock contention. The optimal pool size is typically close to the number of CPU cores (for CPU-bound queries) or I/O parallelism capacity (for I/O-bound queries). HikariCP's recommendation: pool_size = (core_count × 2) + effective_spindle_count.",
      "steps": [
        "Start with default_pool_size = 10–25 for most OLTP workloads.",
        "Monitor SHOW POOLS in PgBouncer — if cl_waiting > 0, the pool is too small.",
        "Monitor pg_stat_activity — if most backends are active simultaneously, pool may need to grow.",
        "For I/O-bound analytics: pool_size can be higher (50–100).",
        "Do not exceed max_connections ÷ number_of_databases."
      ],
      "code": "-- PgBouncer pool monitoring:\n-- psql -p 6432 -U pgbouncer_admin pgbouncer\nSHOW POOLS;\n-- Columns to watch:\n-- cl_active: clients with a server connection\n-- cl_waiting: clients waiting for a connection (should be 0)\n-- sv_active: server connections in use\n-- sv_idle: server connections waiting (pool capacity)\n-- sv_used: recently used, not in transaction\n\nSHOW STATS;\n-- avg_wait_time: client wait time (should be near 0)\n-- avg_query_time: query duration\n\n-- Adjust in pgbouncer.ini:\n-- default_pool_size = 25      -- increase if cl_waiting > 0\n-- reserve_pool_size = 10      -- emergency reserve\n-- max_client_conn = 2000      -- client-facing limit\n\n-- Reload without restart:\n-- RELOAD; -- in pgbouncer admin console\n-- or: kill -HUP $(cat /var/run/pgbouncer/pgbouncer.pid)",
      "expected_impact": "Correct pool sizing prevents both connection exhaustion (pool too small) and resource contention (pool too large). Typically 10–25 connections per database handles thousands of concurrent application requests."
    },
    "rec_conn_pgbouncer_txn": {
      "id": "rec_conn_pgbouncer_txn",
      "type": "recommendation",
      "title": "Handle Transaction Mode Incompatibilities in PgBouncer",
      "priority": "high",
      "explanation": "Transaction pool mode releases the server connection after each transaction, so session-level state (prepared statements, temp tables, advisory locks, LISTEN/NOTIFY, SET parameters) does not persist between transactions. Each of these requires a specific workaround or a switch to session mode for affected connections.",
      "steps": [
        "Prepared statements: use named prepared statements via PgBouncer's server_reset_query, or disable protocol-level prepared statements and use query parameters instead.",
        "SET parameters: embed settings in each query (SET search_path TO ... within the query) or use database-level defaults.",
        "LISTEN/NOTIFY: use a dedicated connection in session mode for pub/sub.",
        "Advisory locks: acquire and release within a single transaction.",
        "Temporary tables: use regular tables with session ID column, or a dedicated session-mode connection."
      ],
      "code": "# pgbouncer.ini — handle prepared statements:\n# Option 1: Disable protocol-level prepared statements at PgBouncer:\nprepare_mode = 0  # disable prepared statement caching at PgBouncer level\n\n# Option 2: Use named prepared statements and server_reset_query:\nserver_reset_query = DISCARD ALL  # reset session state between transactions\n\n# For LISTEN/NOTIFY — use a separate session-mode pool:\n[databases]\nmyapp = host=127.0.0.1 port=5432 dbname=myapp pool_mode=transaction\nmyapp_session = host=127.0.0.1 port=5432 dbname=myapp pool_mode=session\n\n# Application connects to myapp_session for LISTEN/NOTIFY\n# Application connects to myapp for regular queries\n\n-- In PostgreSQL: use search_path in connection string instead of SET:\n-- postgresql://user:pass@pgbouncer:6432/myapp?options=-csearch_path%3Dmyschema\n\n-- Or set at database level:\nALTER DATABASE myapp SET search_path TO myschema, public;\n\n-- Advisory locks: wrap acquire+release in single transaction:\nBEGIN;\nSELECT pg_advisory_xact_lock(12345);  -- xact lock releases with transaction\n-- do work\nCOMMIT;  -- lock released here\n-- Do NOT use pg_advisory_lock() in transaction mode (session-level, won't release)",
      "expected_impact": "Resolves application errors from session-state assumptions in transaction pool mode. Allows full use of PgBouncer's connection multiplexing while maintaining application correctness."
    },
    "rec_conn_idle_timeout": {
      "id": "rec_conn_idle_timeout",
      "type": "recommendation",
      "title": "Configure Idle Connection Timeouts",
      "priority": "medium",
      "explanation": "Idle connections consume memory and file descriptors. PostgreSQL has no built-in idle timeout (unlike MySQL), but it can be set via idle_in_transaction_session_timeout and tcp_keepalives. PgBouncer's server_idle_timeout and client_idle_timeout are more practical controls. At the OS level, tcp_keepalives_idle terminates dead connections.",
      "steps": [
        "Set idle_in_transaction_session_timeout to terminate sessions stuck in transactions (e.g., 30 minutes).",
        "Set statement_timeout to prevent runaway queries from holding connections.",
        "In PgBouncer, set server_idle_timeout to close idle server connections.",
        "Configure TCP keepalives to detect dead connections without waiting for timeout."
      ],
      "code": "-- postgresql.conf:\nidle_in_transaction_session_timeout = '30min'  -- kill sessions stuck in transactions\nstatement_timeout = '10min'                     -- kill runaway queries\ntcp_keepalives_idle = 60     -- start keepalive after 60s idle\ntcp_keepalives_interval = 10 -- send keepalive every 10s\ntcp_keepalives_count = 5     -- terminate after 5 failures\n\n-- Apply without restart:\nSELECT pg_reload_conf();\n\n-- Per-role timeout (stricter for app users):\nALTER ROLE app_user SET idle_in_transaction_session_timeout = '5min';\nALTER ROLE app_user SET statement_timeout = '30s';\n\n-- pgbouncer.ini:\nserver_idle_timeout = 600    -- close server connections idle > 10min\nclient_idle_timeout = 0      -- keep client connections (let app manage)\nserver_lifetime = 3600       -- recycle server connections every hour\n\n-- Manual cleanup (emergency):\nSELECT pg_terminate_backend(pid)\nFROM pg_stat_activity\nWHERE state = 'idle'\n  AND state_change < NOW() - INTERVAL '1 hour'\n  AND backend_type = 'client backend';",
      "expected_impact": "Prevents connection leaks from forgotten transactions. Frees memory from idle connections. idle_in_transaction_session_timeout is the most important setting — sessions stuck in transactions block autovacuum and hold locks indefinitely."
    },
    "rec_conn_idle_txn": {
      "id": "rec_conn_idle_txn",
      "type": "recommendation",
      "title": "Detect and Terminate Idle-in-Transaction Sessions",
      "priority": "high",
      "explanation": "Sessions in 'idle in transaction' state have opened a transaction but are not executing queries. They hold locks, prevent autovacuum from cleaning dead tuples, and block VACUUM. Applications cause this by opening transactions before user input (long-running UI operations) or by forgetting to COMMIT/ROLLBACK on error. These are the most dangerous idle connections.",
      "steps": [
        "Identify idle-in-transaction connections and their age.",
        "Set idle_in_transaction_session_timeout to auto-terminate them.",
        "In the application, ensure all code paths COMMIT or ROLLBACK, especially on exceptions.",
        "Use PgBouncer transaction mode to prevent long-held transactions from keeping server connections."
      ],
      "code": "-- Find idle-in-transaction sessions:\nSELECT\n  pid,\n  usename,\n  application_name,\n  client_addr,\n  state,\n  state_change,\n  EXTRACT(EPOCH FROM (NOW() - state_change)) AS idle_seconds,\n  query  -- last query that started the transaction\nFROM pg_stat_activity\nWHERE state = 'idle in transaction'\nORDER BY idle_seconds DESC;\n\n-- Find what locks they hold:\nSELECT\n  a.pid,\n  a.usename,\n  l.relation::regclass,\n  l.mode,\n  l.granted\nFROM pg_locks l\nJOIN pg_stat_activity a ON l.pid = a.pid\nWHERE a.state = 'idle in transaction';\n\n-- Terminate sessions stuck > 5 minutes:\nSELECT pg_terminate_backend(pid)\nFROM pg_stat_activity\nWHERE state = 'idle in transaction'\n  AND EXTRACT(EPOCH FROM (NOW() - state_change)) > 300;\n\n-- Prevent future occurrences:\n-- postgresql.conf:\nidle_in_transaction_session_timeout = '5min'  -- auto-terminate\n-- SELECT pg_reload_conf();",
      "expected_impact": "Immediately releases locks held by stuck transactions. Allows autovacuum to proceed on affected tables. Prevents table bloat accumulation caused by long-running idle transactions blocking dead tuple cleanup."
    },
    "vac_sym_root": {
      "id": "vac_sym_root",
      "type": "question",
      "question": "What maintenance problem are you experiencing?",
      "context": "PostgreSQL's MVCC model creates dead tuples on every UPDATE and DELETE. Autovacuum reclaims this space, but when it falls behind, tables bloat, queries slow down (more pages to scan), and XID wraparound becomes a safety risk. Identifying the specific failure mode determines the right intervention.",
      "options": [
        {
          "label": "Table is much larger than it should be — suspected bloat",
          "next": "diag_vac_bloat"
        },
        {
          "label": "Autovacuum is not running on a table or is too slow",
          "next": "diag_vac_autovac_lag"
        },
        {
          "label": "Warning about XID wraparound / transaction ID exhaustion",
          "next": "diag_vac_xid"
        },
        {
          "label": "VACUUM or autovacuum seems to be hurting performance",
          "next": "diag_vac_cost"
        }
      ]
    },
    "diag_vac_bloat": {
      "id": "diag_vac_bloat",
      "type": "diagnostic",
      "metric": "Table bloat ratio (live vs. dead tuples)",
      "question": "Run the bloat query below. What is the ratio of dead tuples to live tuples, and how large is the table on disk vs. estimated useful size?",
      "context": "Table bloat occurs when dead tuples accumulate faster than autovacuum can reclaim them. A table with 50% dead tuples is scanning 2× as many pages as necessary. pg_stat_user_tables provides dead tuple counts; pgstattuple provides byte-level bloat estimates. A bloat ratio > 20% warrants action.",
      "threshold": {
        "bad": "n_dead_tup / n_live_tup > 0.5 (> 50% dead). Table is > 2× its useful size. Sequential scans are reading large amounts of wasted pages.",
        "ok": "n_dead_tup / n_live_tup 0.1–0.5 (10–50%). Autovacuum is running but behind.",
        "good": "n_dead_tup / n_live_tup < 0.1 (< 10%). Autovacuum is keeping up."
      },
      "sql": "-- Dead tuple ratio:\nSELECT\n  schemaname,\n  relname AS table_name,\n  n_live_tup,\n  n_dead_tup,\n  ROUND(100.0 * n_dead_tup / NULLIF(n_live_tup + n_dead_tup, 0), 1) AS dead_pct,\n  pg_size_pretty(pg_total_relation_size(schemaname||'.'||relname)) AS total_size,\n  last_autovacuum,\n  last_autoanalyze\nFROM pg_stat_user_tables\nWHERE n_live_tup > 1000\nORDER BY n_dead_tup DESC\nLIMIT 20;\n\n-- For detailed byte-level bloat (requires pgstattuple extension):\n-- CREATE EXTENSION IF NOT EXISTS pgstattuple;\n-- SELECT * FROM pgstattuple('your_table');",
      "options": [
        {
          "label": "High dead tuple ratio (> 20%) — table is bloated",
          "next": "rec_vac_manual_vacuum"
        },
        {
          "label": "Table size is large but dead tuples are low — may be data growth, not bloat",
          "next": "rec_vac_bloat_check"
        },
        {
          "label": "Skip — I want to reclaim bloat space immediately",
          "next": "rec_vac_manual_vacuum",
          "skip": true
        }
      ]
    },
    "diag_vac_autovac_lag": {
      "id": "diag_vac_autovac_lag",
      "type": "diagnostic",
      "metric": "Autovacuum trigger thresholds vs. current dead tuple count",
      "question": "Check when autovacuum last ran on your table and whether the dead tuple count exceeds autovacuum_vacuum_threshold + autovacuum_vacuum_scale_factor × n_live_tup.",
      "context": "Autovacuum triggers when: dead tuples > autovacuum_vacuum_threshold (default 50) + autovacuum_vacuum_scale_factor (default 0.2) × row count. For a 10M row table, this means autovacuum won't trigger until there are 2,000,050 dead tuples — far too late. The thresholds need to be tightened for large tables.",
      "threshold": {
        "bad": "last_autovacuum is NULL or > 24 hours ago. Dead tuples are accumulating faster than autovacuum triggers.",
        "ok": "last_autovacuum within the last hour. Dead tuples are moderate but managed.",
        "good": "last_autovacuum within the last few minutes for high-update tables."
      },
      "sql": "-- Autovacuum status per table:\nSELECT\n  schemaname, relname,\n  n_dead_tup,\n  n_live_tup,\n  autovacuum_vacuum_threshold + autovacuum_vacuum_scale_factor * n_live_tup AS trigger_at,\n  last_autovacuum,\n  last_autoanalyze,\n  autovacuum_count\nFROM pg_stat_user_tables\nJOIN (\n  SELECT\n    current_setting('autovacuum_vacuum_threshold')::numeric AS autovacuum_vacuum_threshold,\n    current_setting('autovacuum_vacuum_scale_factor')::numeric AS autovacuum_vacuum_scale_factor\n) AS cfg ON true\nWHERE n_live_tup > 10000\nORDER BY n_dead_tup DESC\nLIMIT 20;\n\n-- Check if autovacuum workers are busy:\nSELECT pid, query, state, wait_event\nFROM pg_stat_activity\nWHERE query LIKE 'autovacuum%';",
      "options": [
        {
          "label": "Autovacuum is triggering too late for large tables (scale_factor is too high)",
          "next": "rec_vac_autovac_tune"
        },
        {
          "label": "Autovacuum is running but can't keep up (too few workers or throttled)",
          "next": "rec_vac_autovac_workers"
        },
        {
          "label": "Skip — show me how to tune autovacuum for large tables",
          "next": "rec_vac_autovac_tune",
          "skip": true
        }
      ]
    },
    "diag_vac_xid": {
      "id": "diag_vac_xid",
      "type": "diagnostic",
      "metric": "Transaction ID (XID) age and wraparound distance",
      "question": "Run the XID age query below. Is any database or table approaching 200 million XIDs remaining before wraparound?",
      "context": "PostgreSQL uses 32-bit transaction IDs that wrap around at ~2.1 billion. When age reaches ~200M XIDs before wraparound, autovacuum_freeze_max_age (default 200M), PostgreSQL triggers aggressive freeze vacuums. If wraparound is imminent (< 10M XIDs), PostgreSQL shuts down to prevent data loss. This is the most serious maintenance emergency.",
      "threshold": {
        "bad": "datfrozenxid age > 1.5 billion or relfrozenxid age > 500 million. Wraparound is a real risk. Aggressive VACUUM FREEZE needed immediately.",
        "ok": "Age 100–500 million. Autovacuum should handle it. Monitor closely.",
        "good": "Age < 100 million. Healthy — well within safe range."
      },
      "sql": "-- Database-level XID age:\nSELECT\n  datname,\n  age(datfrozenxid) AS xid_age,\n  2147483647 - age(datfrozenxid) AS xids_remaining,\n  pg_size_pretty(pg_database_size(datname)) AS db_size\nFROM pg_database\nORDER BY xid_age DESC;\n\n-- Table-level XID age (find the oldest tables):\nSELECT\n  schemaname, relname,\n  age(relfrozenxid) AS xid_age,\n  2147483647 - age(relfrozenxid) AS xids_remaining\nFROM pg_class c\nJOIN pg_namespace n ON n.oid = c.relnamespace\nWHERE relkind = 'r'\n  AND n.nspname NOT IN ('pg_catalog', 'information_schema')\nORDER BY xid_age DESC\nLIMIT 20;\n\n-- Current XID:\nSELECT txid_current();",
      "options": [
        {
          "label": "XID age > 500 million — wraparound risk, need VACUUM FREEZE now",
          "next": "rec_vac_xid_freeze"
        },
        {
          "label": "XID age is moderate — need to tune autovacuum freeze settings",
          "next": "rec_vac_freeze_tune"
        },
        {
          "label": "Skip — explain XID wraparound and how to prevent it",
          "next": "rec_vac_freeze_tune",
          "skip": true
        }
      ]
    },
    "diag_vac_cost": {
      "id": "diag_vac_cost",
      "type": "diagnostic",
      "metric": "Autovacuum cost delay and I/O throttling",
      "question": "Check autovacuum_vacuum_cost_delay. Is it set to a high value (> 2ms), causing autovacuum to be throttled and unable to keep up?",
      "context": "Autovacuum is deliberately throttled to avoid impacting production queries — it uses a cost-based delay mechanism. Default autovacuum_vacuum_cost_delay = 2ms (PG13+) or 20ms (older). If autovacuum is too slow, it's often because the cost delay is too high, or cost_limit is too low, causing it to sleep between each I/O operation.",
      "threshold": {
        "bad": "autovacuum_vacuum_cost_delay > 2ms AND autovacuum is visibly behind (growing dead tuples). Vacuum is sleeping more than working.",
        "ok": "autovacuum_vacuum_cost_delay = 2ms (PG13+ default). May still need tuning for very high-write tables.",
        "good": "Per-table storage parameters override to lower cost delay for high-traffic tables. Autovacuum is keeping up."
      },
      "sql": "-- Check autovacuum cost settings:\nSHOW autovacuum_vacuum_cost_delay;\nSHOW autovacuum_vacuum_cost_limit;\nSHOW vacuum_cost_page_hit;\nSHOW vacuum_cost_page_miss;\nSHOW vacuum_cost_page_dirty;\n\n-- Is autovacuum currently running (and on what):\nSELECT\n  pid,\n  query,\n  EXTRACT(EPOCH FROM (NOW() - query_start)) AS running_sec\nFROM pg_stat_activity\nWHERE query LIKE 'autovacuum:%'\nORDER BY running_sec DESC;\n\n-- Progress of running vacuum:\nSELECT * FROM pg_stat_progress_vacuum;",
      "options": [
        {
          "label": "Cost delay is high (> 2ms) and autovacuum is falling behind",
          "next": "rec_vac_cost_tune"
        },
        {
          "label": "Cost delay is low but still slow — may need more workers or maintenance_work_mem",
          "next": "rec_vac_autovac_workers"
        },
        {
          "label": "Skip — show me autovacuum cost tuning",
          "next": "rec_vac_cost_tune",
          "skip": true
        }
      ]
    },
    "rec_vac_manual_vacuum": {
      "id": "rec_vac_manual_vacuum",
      "type": "recommendation",
      "title": "Run Manual VACUUM and Consider pg_repack for Severe Bloat",
      "priority": "high",
      "explanation": "VACUUM reclaims dead tuple space and marks it as reusable — but it does NOT shrink the table file. To return space to the OS, you need VACUUM FULL (which locks the table) or pg_repack (zero-downtime). For tables with < 30% bloat, VACUUM is sufficient. For severe bloat (> 50%), pg_repack is the production-safe approach.",
      "steps": [
        "Run VACUUM ANALYZE on the affected table to reclaim dead space and update statistics.",
        "Check pg_stat_user_tables after to confirm dead tuples dropped to near 0.",
        "If table size did not shrink and bloat is severe (> 50%), use pg_repack.",
        "Install pg_repack extension and run pg_repack on the table with zero downtime.",
        "After repack, run ANALYZE to update statistics."
      ],
      "code": "-- Step 1: Standard VACUUM (reclaim dead tuples, no table lock):\nVACUUM (ANALYZE, VERBOSE) your_table;\n\n-- Step 2: Verify improvement:\nSELECT\n  n_live_tup, n_dead_tup,\n  pg_size_pretty(pg_total_relation_size('your_table')) AS size\nFROM pg_stat_user_tables\nWHERE relname = 'your_table';\n\n-- Step 3: If severe bloat remains, use pg_repack (requires extension):\n-- Install:\nCREATE EXTENSION pg_repack;\n\n-- Run from command line (non-blocking, table stays online):\n-- pg_repack -h localhost -U postgres -d mydb -t your_table\n-- Options:\n-- --no-kill-backend  -- don't kill competing backends\n-- --wait-timeout=60  -- wait up to 60s for lock\n-- --jobs=4           -- parallel index rebuild\n\n-- For extreme cases only (small tables, acceptable downtime):\n-- VACUUM FULL ANALYZE your_table;  -- LOCKS TABLE, rewrites on disk\n\n-- Monitor pg_repack progress:\nSELECT * FROM pg_stat_user_tables WHERE relname LIKE 'repack%';",
      "expected_impact": "VACUUM drops dead tuple count to near 0, reducing sequential scan cost proportional to bloat ratio. pg_repack physically reclaims disk space — a 100GB bloated table might shrink to 30GB, with proportional scan speed improvement."
    },
    "rec_vac_bloat_check": {
      "id": "rec_vac_bloat_check",
      "type": "recommendation",
      "title": "Distinguish Real Bloat from Data Growth",
      "priority": "low",
      "explanation": "Not all large tables are bloated. If dead tuple ratio is low but the table is large, the data itself has grown. In that case, investigate whether data archival or partitioning is needed rather than VACUUM tuning. Use pgstattuple for an accurate bloat estimate.",
      "steps": [
        "Install pgstattuple and run pgstattuple('table_name') for byte-level accuracy.",
        "Compare dead_tuple_len + free_space to table_len — that is true bloat.",
        "If bloat is < 10%, the table is just large — consider archiving or partitioning.",
        "If bloat is > 20%, proceed with VACUUM or pg_repack."
      ],
      "code": "CREATE EXTENSION IF NOT EXISTS pgstattuple;\n\nSELECT\n  table_len,\n  tuple_count,\n  tuple_len,\n  dead_tuple_count,\n  dead_tuple_len,\n  free_space,\n  ROUND(100.0 * (dead_tuple_len + free_space) / table_len, 1) AS bloat_pct\nFROM pgstattuple('your_table');\n-- bloat_pct < 10%: healthy\n-- bloat_pct 10-30%: moderate, VACUUM recommended\n-- bloat_pct > 30%: severe, VACUUM or pg_repack needed",
      "expected_impact": "Accurate bloat measurement prevents unnecessary intervention on healthy tables and correctly directs effort toward truly bloated ones."
    },
    "rec_vac_autovac_tune": {
      "id": "rec_vac_autovac_tune",
      "type": "recommendation",
      "title": "Tune Autovacuum Thresholds for Large Tables",
      "priority": "high",
      "explanation": "The default autovacuum_vacuum_scale_factor = 0.2 means autovacuum waits until 20% of the table is dead before triggering. For a 10M row table, that's 2M dead tuples before it acts. Large tables need per-table storage parameter overrides that set a fixed threshold rather than a percentage.",
      "steps": [
        "Identify high-write tables with > 1M rows where the default scale factor is too loose.",
        "Set per-table autovacuum storage parameters to use small fixed thresholds.",
        "For hot tables (millions of updates/day), reduce scale_factor to 0.01 or set a fixed threshold.",
        "Adjust autovacuum_analyze_scale_factor similarly for ANALYZE trigger.",
        "Monitor pg_stat_user_tables to verify autovacuum is now triggering more frequently."
      ],
      "code": "-- Per-table autovacuum settings (no restart required):\nALTER TABLE orders SET (\n  autovacuum_vacuum_scale_factor = 0.01,    -- trigger at 1% dead (vs 20%)\n  autovacuum_vacuum_threshold = 1000,        -- minimum 1000 dead tuples to trigger\n  autovacuum_analyze_scale_factor = 0.005,   -- analyze at 0.5% changes\n  autovacuum_vacuum_cost_delay = 2,          -- ms between I/O ops (lower = faster)\n  autovacuum_vacuum_cost_limit = 400         -- I/O cost budget per round (higher = faster)\n);\n\n-- Verify storage parameters:\nSELECT reloptions\nFROM pg_class\nWHERE relname = 'orders';\n\n-- Global defaults (postgresql.conf, requires reload):\nautovacuum_vacuum_scale_factor = 0.05     -- reduce global default\nautovacuum_vacuum_threshold = 500\nautovacuum_analyze_scale_factor = 0.02\n\n-- Apply:\nSELECT pg_reload_conf();\n\n-- Verify autovacuum is now triggering more frequently:\nSELECT relname, last_autovacuum, autovacuum_count\nFROM pg_stat_user_tables\nWHERE relname = 'orders';",
      "expected_impact": "Autovacuum triggers before dead tuple accumulation becomes a performance problem. Prevents table bloat on high-update tables. Eliminates the need for periodic manual VACUUM on properly configured tables."
    },
    "rec_vac_autovac_workers": {
      "id": "rec_vac_autovac_workers",
      "type": "recommendation",
      "title": "Increase Autovacuum Workers and maintenance_work_mem",
      "priority": "medium",
      "explanation": "The default autovacuum_max_workers = 3 means only 3 tables can be vacuumed simultaneously. On systems with many high-write tables, this creates a queue. Additionally, maintenance_work_mem controls how much memory each VACUUM worker uses for storing dead tuple TIDs — more memory means fewer table scan passes.",
      "steps": [
        "Increase autovacuum_max_workers from 3 to 5–10 for systems with many tables.",
        "Increase maintenance_work_mem for vacuum workers — each worker gets this much.",
        "Be mindful of total memory: 5 workers × 1GB = 5GB dedicated to autovacuum.",
        "Requires restart for autovacuum_max_workers. maintenance_work_mem can be set per-session."
      ],
      "code": "-- postgresql.conf:\nautovacuum_max_workers = 6        -- default 3; increase for many-table systems\nmaintenance_work_mem = 512MB      -- per-worker; 256MB–1GB typical\nautovacuum_naptime = 30s          -- check for tables needing vacuum every 30s (default 60s)\n\n-- Requires restart for autovacuum_max_workers.\n-- maintenance_work_mem can be applied with reload for new sessions.\nSELECT pg_reload_conf();\n\n-- Verify workers:\nSELECT COUNT(*) FROM pg_stat_activity WHERE query LIKE 'autovacuum%';\n\n-- For manual VACUUM with more memory:\nSET maintenance_work_mem = '2GB';\nVACUUM ANALYZE large_table;\nRESET maintenance_work_mem;",
      "expected_impact": "More workers means more tables vacuumed in parallel. Higher maintenance_work_mem means fewer passes per vacuum operation (important for tables with millions of dead tuples). Together, prevents autovacuum from falling behind on write-heavy systems."

    "rec_vac_xid_freeze": {
      "id": "rec_vac_xid_freeze",
      "type": "recommendation",
      "title": "Emergency VACUUM FREEZE for XID Wraparound Risk",
      "priority": "high",
      "explanation": "When XID age approaches 2 billion, PostgreSQL will start refusing writes and eventually shut down to prevent data loss. This is a production emergency. VACUUM FREEZE replaces old XIDs with FrozenTransactionId, stopping the wraparound clock. Run it immediately on the oldest tables, then on the entire database.",
      "steps": [
        "Immediately run VACUUM FREEZE on the tables with the highest XID age.",
        "Run VACUUM FREEZE on the entire database (takes time, but necessary).",
        "Monitor pg_stat_progress_vacuum to track progress.",
        "After emergency resolution, tune autovacuum_freeze_max_age to prevent recurrence.",
        "Consider adding a monitoring alert when XID age exceeds 500M."
      ],
      "code": "-- Emergency: freeze the oldest tables first:\n-- Find them:\nSELECT relname, age(relfrozenxid) AS xid_age\nFROM pg_class\nJOIN pg_namespace ON pg_namespace.oid = relnamespace\nWHERE relkind = 'r'\n  AND nspname NOT IN ('pg_catalog', 'information_schema')\nORDER BY xid_age DESC\nLIMIT 10;\n\n-- Freeze them (locks table briefly for each page):\nVACUUM FREEZE ANALYZE oldest_table_1;\nVACUUM FREEZE ANALYZE oldest_table_2;\n\n-- Full database freeze (very slow on large DBs — run in off-peak hours):\n-- vacuumdb --freeze --all --analyze -j 4 -h localhost -U postgres\n-- -j 4 = 4 parallel workers\n\n-- Monitor progress:\nSELECT\n  p.relid::regclass,\n  p.phase,\n  p.heap_blks_scanned,\n  p.heap_blks_total,\n  ROUND(100.0 * p.heap_blks_scanned / NULLIF(p.heap_blks_total, 0), 1) AS pct_done\nFROM pg_stat_progress_vacuum p;\n\n-- After emergency, prevent recurrence:\n-- postgresql.conf:\nautovacuum_freeze_max_age = 150000000  -- default 200M; trigger freeze vacuum earlier\nvacuum_freeze_min_age = 5000000        -- don't freeze very new rows (default 50M)\n-- SELECT pg_reload_conf();",
      "expected_impact": "Prevents PostgreSQL from entering read-only mode or shutting down due to XID exhaustion. Must be completed before XID age reaches ~2.1 billion. Each VACUUM FREEZE pass resets the clock for affected tables."
    },
    "rec_vac_freeze_tune": {
      "id": "rec_vac_freeze_tune",
      "type": "recommendation",
      "title": "Tune Autovacuum Freeze Settings to Prevent XID Wraparound",
      "priority": "medium",
      "explanation": "autovacuum_freeze_max_age (default 200M XIDs) controls when autovacuum proactively runs VACUUM FREEZE on a table, even if it has few dead tuples. Reducing this to 100–150M gives more headroom before wraparound becomes critical. The freeze vacuum is more I/O-intensive than regular vacuum, so schedule aggressively during off-peak periods.",
      "steps": [
        "Set autovacuum_freeze_max_age lower than the default (e.g., 150M) to trigger freeze vacuums earlier.",
        "Set autovacuum_freeze_table_age to 90% of autovacuum_freeze_max_age.",
        "Add a monitoring query or pg_nagios check for XID age > 1 billion.",
        "Ensure autovacuum workers have enough maintenance_work_mem for freeze vacuums."

      "code": "-- postgresql.conf:\nautovacuum_freeze_max_age = 150000000  -- default 200M; lower = more frequent freeze\nautovacuum_freeze_table_age = 120000000 -- start freeze vacuum at this age\nvacuum_freeze_min_age = 1000000         -- freeze tuples older than this XID age\nvacuum_freeze_table_age = 120000000     -- for manual VACUUM (no --freeze flag)\n\nSELECT pg_reload_conf();\n\n-- Monitoring query (run as a cron job or alerting query):\nSELECT\n  datname,\n  age(datfrozenxid) AS xid_age,\n  CASE\n    WHEN age(datfrozenxid) > 1500000000 THEN 'CRITICAL'\n    WHEN age(datfrozenxid) > 1000000000 THEN 'WARNING'\n    ELSE 'OK'\n  END AS status\nFROM pg_database\nORDER BY xid_age DESC;",
      "expected_impact": "Proactive freeze vacuums prevent XID wraparound from becoming an emergency. Lower freeze_max_age means slightly more I/O from freeze vacuums, but eliminates the risk of database shutdown from XID exhaustion."

    "rec_vac_cost_tune": {
      "id": "rec_vac_cost_tune",
      "type": "recommendation",
      "title": "Reduce Autovacuum Cost Delay to Allow Faster Vacuum",
      "priority": "medium",
      "explanation": "Autovacuum throttles itself using a cost-based sleep mechanism: after accumulating autovacuum_vacuum_cost_limit I/O cost units, it sleeps for autovacuum_vacuum_cost_delay milliseconds. The default in PG13+ is 2ms delay, but older versions default to 20ms — meaning vacuum sleeps 91% of the time. Lowering cost_delay or raising cost_limit dramatically increases vacuum throughput.",
      "steps": [
        "Check PostgreSQL version — PG13+ has better defaults (2ms delay).",
        "For PG12 and older, set autovacuum_vacuum_cost_delay = 2.",
        "For tables that are consistently behind, set per-table cost_delay = 0 and higher cost_limit.",
        "Monitor that autovacuum completes within acceptable time after tuning."
      ],
      "code": "-- Check current version and defaults:\nSELECT version();\nSHOW autovacuum_vacuum_cost_delay;  -- should be 2ms (PG13+) not 20ms\nSHOW autovacuum_vacuum_cost_limit;  -- default 200\n\n-- Global tuning (postgresql.conf):\nautovacuum_vacuum_cost_delay = 2ms    -- PG12 default was 20ms\nautovacuum_vacuum_cost_limit = 400    -- default 200; higher = more I/O per round\n\n-- Per-table tuning for hottest tables (no restart needed):\nALTER TABLE hot_orders_table SET (\n  autovacuum_vacuum_cost_delay = 0,    -- no sleep between I/O ops\n  autovacuum_vacuum_cost_limit = 800   -- more aggressive I/O budget\n);\n\n-- Cost model reference:\n-- vacuum_cost_page_hit = 1   (page in buffer cache)\n-- vacuum_cost_page_miss = 10 (page read from disk)\n-- vacuum_cost_page_dirty = 20 (page written to disk)\n-- At cost_limit=200: ~20 disk reads or 10 disk writes before sleeping\n\nSELECT pg_reload_conf();\n\n-- Verify autovacuum now runs faster:\nSELECT relname, last_autovacuum, autovacuum_count\nFROM pg_stat_user_tables\nWHERE relname = 'hot_orders_table';",
      "expected_impact": "Reducing cost_delay from 20ms to 2ms increases autovacuum throughput by ~10×. Setting cost_delay = 0 with high cost_limit allows autovacuum to run at full I/O speed on the most critical tables. Eliminates autovacuum lag on high-write tables."
    },

    "rec_cache_matview": {
      "id": "rec_cache_matview",
      "type": "recommendation",
      "title": "Create and Refresh Materialized Views for Expensive Queries",
      "priority": "high",
      "explanation": "Materialized views store query results on disk. Reads hit an indexed table instead of recomputing the expensive query. Use REFRESH MATERIALIZED VIEW CONCURRENTLY to refresh without blocking readers (requires a unique index). Schedule refreshes based on acceptable staleness — for dashboards, every 5 minutes is often sufficient.",
      "steps": [
        "Create the materialized view from the expensive query.",
        "Add a unique index to enable CONCURRENTLY refresh.",
        "Schedule REFRESH MATERIALIZED VIEW CONCURRENTLY on a pg_cron job or external cron.",
        "Update application queries to read from the matview instead of the base tables.",
        "Monitor matview size and refresh duration over time."
      ],
      "code": "-- Step 1: Create materialized view:\nCREATE MATERIALIZED VIEW customer_stats AS\nSELECT\n  c.customer_id,\n  c.name,\n  c.tier,\n  COUNT(o.id) AS order_count,\n  COALESCE(SUM(o.amount), 0) AS total_spent,\n  MAX(o.created_at) AS last_order_at\nFROM customers c\nLEFT JOIN orders o ON o.customer_id = c.customer_id\n  AND o.status = 'completed'\nGROUP BY c.customer_id, c.name, c.tier\nWITH DATA;  -- populate immediately\n\n-- Step 2: Add unique index (required for CONCURRENTLY):\nCREATE UNIQUE INDEX ON customer_stats(customer_id);\n\n-- Add other indexes for query patterns:\nCREATE INDEX ON customer_stats(tier);\nCREATE INDEX ON customer_stats(total_spent DESC);\n\n-- Step 3: Refresh (CONCURRENTLY = no read blocking):\nREFRESH MATERIALIZED VIEW CONCURRENTLY customer_stats;\n\n-- Step 4: Schedule with pg_cron:\nCREATE EXTENSION IF NOT EXISTS pg_cron;\nSELECT cron.schedule(\n  'refresh-customer-stats',\n  '*/5 * * * *',  -- every 5 minutes\n  'REFRESH MATERIALIZED VIEW CONCURRENTLY customer_stats'\n);\n\n-- Step 5: Application reads from matview:\n-- SELECT * FROM customer_stats WHERE tier = 'gold' ORDER BY total_spent DESC;\n\n-- Check matview freshness:\nSELECT schemaname, matviewname, ispopulated\nFROM pg_matviews;\n-- (No built-in last_refresh timestamp — add a refresh_log table if needed)",
      "expected_impact": "Converts an expensive multi-second query into a sub-millisecond index lookup. Dashboard queries that took 5–30 seconds now complete in 1–5ms. Refresh cost is paid once per interval, not once per request."
    },
    "rec_cache_live_aggregate": {
      "id": "rec_cache_live_aggregate",
      "type": "recommendation",
      "title": "Maintain Live Aggregates with Triggers or Incremental Updates",
      "priority": "medium",
      "explanation": "When data must always be current, maintain a summary table incrementally using triggers or application-level updates instead of full recomputation. A trigger updates a summary row on each INSERT/UPDATE/DELETE to the base table, keeping the aggregate always current without recomputing over the full dataset.",
      "steps": [
        "Create a summary table with the pre-aggregated columns.",
        "Write a trigger function that updates the summary row on each base table change.",
        "Apply the trigger to INSERT, UPDATE, DELETE on the base table.",
        "Application reads from the summary table directly."
      ],
      "code": "-- Summary table:\nCREATE TABLE order_summaries (\n  customer_id INT PRIMARY KEY REFERENCES customers(id),\n  order_count INT DEFAULT 0 NOT NULL,\n  total_spent NUMERIC(12,2) DEFAULT 0 NOT NULL,\n  last_order_at TIMESTAMPTZ\n);\n\n-- Trigger function:\nCREATE OR REPLACE FUNCTION update_order_summary()\nRETURNS TRIGGER AS $$\nBEGIN\n  IF TG_OP = 'INSERT' THEN\n    INSERT INTO order_summaries (customer_id, order_count, total_spent, last_order_at)\n    VALUES (NEW.customer_id, 1, NEW.amount, NEW.created_at)\n    ON CONFLICT (customer_id) DO UPDATE SET\n      order_count = order_summaries.order_count + 1,\n      total_spent = order_summaries.total_spent + NEW.amount,\n      last_order_at = GREATEST(order_summaries.last_order_at, NEW.created_at);\n\n  ELSIF TG_OP = 'DELETE' THEN\n    UPDATE order_summaries SET\n      order_count = order_count - 1,\n      total_spent = total_spent - OLD.amount\n    WHERE customer_id = OLD.customer_id;\n\n  ELSIF TG_OP = 'UPDATE' THEN\n    UPDATE order_summaries SET\n      total_spent = total_spent - OLD.amount + NEW.amount\n    WHERE customer_id = NEW.customer_id;\n  END IF;\n  RETURN NULL;\nEND;\n$$ LANGUAGE plpgsql;\n\n-- Attach trigger:\nCREATE TRIGGER trg_order_summary\nAFTER INSERT OR UPDATE OR DELETE ON orders\nFOR EACH ROW EXECUTE FUNCTION update_order_summary();\n\n-- Read always-current summary:\nSELECT * FROM order_summaries WHERE customer_id = 42;",
      "expected_impact": "Always-current aggregates with O(1) read cost. Write overhead is one additional row update per base table change — negligible vs. the cost of recomputing the full aggregate on each read."
    },
    "rec_cache_listen": {
      "id": "rec_cache_listen",
      "type": "recommendation",
      "title": "Implement Real-Time Cache Invalidation with LISTEN/NOTIFY",
      "priority": "high",
      "explanation": "LISTEN/NOTIFY is PostgreSQL's built-in pub/sub system. A trigger sends NOTIFY on data changes. Application processes listening on the channel receive the event in < 1ms and invalidate their local or Redis cache immediately. This eliminates stale reads without polling overhead. The payload (up to 8KB) can carry the changed row's primary key, enabling targeted (not full) cache invalidation.",
      "steps": [
        "Create a trigger function that calls pg_notify() on the relevant channel with the row's ID as payload.",
        "Attach the trigger to INSERT, UPDATE, DELETE on tables that need cache invalidation.",
        "In the application, open a dedicated persistent connection and call LISTEN channel_name.",
        "When a notification arrives, invalidate the specific cache key for the changed row.",
        "Handle connection loss gracefully — re-execute LISTEN and invalidate entire cache on reconnect."
      ],
      "code": "-- Step 1: Trigger function:\nCREATE OR REPLACE FUNCTION notify_order_change()\nRETURNS TRIGGER AS $$\nBEGIN\n  -- Payload: operation + primary key (JSON for structured data)\n  PERFORM pg_notify(\n    'order_changes',\n    json_build_object(\n      'op', TG_OP,\n      'id', COALESCE(NEW.id, OLD.id),\n      'customer_id', COALESCE(NEW.customer_id, OLD.customer_id)\n    )::text\n  );\n  RETURN NULL;\nEND;\n$$ LANGUAGE plpgsql;\n\n-- Step 2: Attach to table:\nCREATE TRIGGER trg_notify_order\nAFTER INSERT OR UPDATE OR DELETE ON orders\nFOR EACH ROW EXECUTE FUNCTION notify_order_change();\n\n-- Step 3: Application listener (Python asyncpg example):\n-- import asyncpg, json, asyncio\n--\n-- async def listen_for_changes(conn):\n--     await conn.execute('LISTEN order_changes')\n--     async for notification in conn.notifications():\n--         payload = json.loads(notification.payload)\n--         cache_key = f\"order:{payload['id']}\"\n--         await redis.delete(cache_key)  # targeted invalidation\n--         customer_key = f\"customer:{payload['customer_id']}:orders\"\n--         await redis.delete(customer_key)\n\n-- Step 4: Test from psql:\nLISTEN order_changes;\n-- In another session:\nUPDATE orders SET status = 'completed' WHERE id = 42;\n-- Should see notification in the first session\n\n-- Note: NOTIFY is transactional — notification only sent if transaction COMMITS\n-- Rollbacks do NOT send notifications (correct behavior)",
      "expected_impact": "Reduces cache staleness from polling interval (seconds) to < 1ms after commit. Enables targeted cache key invalidation instead of full cache flush. The persistent listener connection is lightweight (1 idle backend). Proven to support 100k+ concurrent application users when combined with connection pooling."
    },
    "rec_cache_shared_buffers": {
      "id": "rec_cache_shared_buffers",
      "type": "recommendation",
      "title": "Increase shared_buffers for Larger Working Sets",
      "priority": "medium",
      "explanation": "shared_buffers is PostgreSQL's in-process buffer cache. The common recommendation is 25% of RAM, but the correct value depends on the working set size. If your hot data fits in a larger shared_buffers, hit ratio will approach 100% and disk I/O will drop dramatically. Beyond a certain point, the OS page cache handles the rest — shared_buffers over 40% of RAM can cause diminishing returns.",
      "steps": [
        "Check current hit ratio using pg_statio_user_tables.",
        "Identify hot tables that are frequently read but have low hit ratios.",
        "Increase shared_buffers incrementally (25% → 30% → 40% of RAM).",
        "Requires PostgreSQL restart.",
        "Simultaneously set effective_cache_size to reflect total OS page cache.",
        "Monitor hit ratio improvement after restart."
      ],
      "code": "-- Identify tables with low hit ratios (most benefit from larger shared_buffers):\nSELECT\n  relname,\n  pg_size_pretty(pg_total_relation_size(relid)) AS size,\n  heap_blks_read AS disk_reads,\n  heap_blks_hit AS cache_hits,\n  ROUND(100.0 * heap_blks_hit / NULLIF(heap_blks_hit + heap_blks_read, 0), 1) AS hit_pct\nFROM pg_statio_user_tables\nWHERE heap_blks_read + heap_blks_hit > 1000\nORDER BY disk_reads DESC\nLIMIT 20;\n\n-- postgresql.conf:\n-- For a 32GB server:\nshared_buffers = 8GB               -- 25% of RAM (start here)\n-- Or more aggressively:\nshared_buffers = 12GB              -- 37.5% of RAM\n\neffective_cache_size = 24GB        -- total OS page cache estimate (32GB - 8GB shared_buffers)\n\n-- Requires restart:\n-- sudo systemctl restart postgresql\n\n-- After restart, reset stats and monitor:\nSELECT pg_stat_reset();\n-- Wait 1 hour of normal traffic\n-- Then recheck hit ratio",
      "expected_impact": "Each 1% improvement in hit ratio reduces disk I/O proportionally. Going from 90% to 99% hit ratio means 90% fewer disk reads. For a working set that fits in the larger shared_buffers, read latency drops from milliseconds (disk) to microseconds (memory)."
    },
    "rec_cache_effective_cache": {
      "id": "rec_cache_effective_cache",
      "type": "recommendation",
      "title": "Set effective_cache_size Correctly for Better Planner Decisions",
      "priority": "medium",
      "explanation": "effective_cache_size does not allocate memory — it tells the query planner how much total memory (shared_buffers + OS page cache) is available for caching. A correct value causes the planner to prefer index scans (which benefit from caching) over sequential scans. A value that is too low causes the planner to underestimate cache effectiveness and choose sequential scans unnecessarily.",
      "steps": [
        "Calculate: effective_cache_size = total RAM - shared_buffers - OS overhead (~ 2GB)",
        "Set it in postgresql.conf.",
        "This is a hint to the planner, not an allocation — it can be set without restart.",
        "Verify planner choices improve with EXPLAIN ANALYZE after change."
      ],
      "code": "-- Calculate correct value:\n-- Example: 64GB RAM server\n-- shared_buffers = 16GB\n-- OS overhead = 4GB\n-- effective_cache_size = 64 - 4 = 60GB\n\n-- postgresql.conf:\neffective_cache_size = 48GB   -- conservative (only counting shared_buffers + likely page cache)\n-- Or:\neffective_cache_size = 56GB   -- aggressive (trust OS to cache aggressively)\n\n-- Apply without restart:\nSELECT pg_reload_conf();\n-- Or per-session:\nSET effective_cache_size = '48GB';\n\n-- Verify planner uses it:\nSHOW effective_cache_size;\n\n-- Check impact on a specific query:\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM large_table WHERE indexed_col = 42;\n-- Should prefer Index Scan when effective_cache_size is set correctly\n-- If using Seq Scan despite index, effective_cache_size may be too low\n\n-- Current values:\nSHOW shared_buffers;\nSHOW effective_cache_size;",
      "expected_impact": "Correct effective_cache_size causes the planner to choose index scans over sequential scans for the right queries. This is especially important for large tables where the planner underestimates cache benefit. No memory is allocated — this is a free optimization."
    },
    "rec_cache_unlogged": {
      "id": "rec_cache_unlogged",
      "type": "recommendation",
      "title": "Use UNLOGGED Tables for Ephemeral High-Write Data",
      "priority": "medium",
      "explanation": "UNLOGGED tables skip WAL entirely — writes go directly to the data file with no WAL overhead. They are 2–10× faster for writes and produce no WAL traffic. Content is lost on crash (not normal shutdown). Ideal for: ETL staging, session storage, application-level cache tables, and result caches that can be rebuilt from primary data.",
      "steps": [
        "Identify tables that hold reconstructible or ephemeral data.",
        "Create them with UNLOGGED or convert existing tables with ALTER TABLE SET UNLOGGED.",
        "Add an expiry/cleanup mechanism (DELETE WHERE expires_at < NOW() or TRUNCATE on cycle).",
        "Accept that data is lost on crash — ensure the application handles this gracefully."
      ],
      "code": "-- Create an unlogged session table:\nCREATE UNLOGGED TABLE user_sessions (\n  session_id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  user_id INT NOT NULL,\n  data JSONB DEFAULT '{}',\n  created_at TIMESTAMPTZ DEFAULT NOW(),\n  expires_at TIMESTAMPTZ NOT NULL\n);\n\n-- Index for expiry cleanup:\nCREATE INDEX ON user_sessions(expires_at);\n-- Index for user lookup:\nCREATE INDEX ON user_sessions(user_id);\n\n-- Application cache table (e.g., expensive computation results):\nCREATE UNLOGGED TABLE computed_results (\n  cache_key TEXT PRIMARY KEY,\n  result JSONB NOT NULL,\n  computed_at TIMESTAMPTZ DEFAULT NOW(),\n  expires_at TIMESTAMPTZ NOT NULL\n);\n\n-- Cleanup expired entries (run periodically):\nDELETE FROM user_sessions WHERE expires_at < NOW();\nDELETE FROM computed_results WHERE expires_at < NOW();\n\n-- Convert existing table to unlogged (PG15+):\nALTER TABLE existing_staging_table SET UNLOGGED;\n\n-- Convert back if needed:\nALTER TABLE existing_staging_table SET LOGGED;\n\n-- ETL pattern:\nCREATE UNLOGGED TABLE import_staging (LIKE target_table INCLUDING ALL);\nCOPY import_staging FROM '/data/import.csv' WITH (FORMAT csv, HEADER);\n-- Process, validate, insert:\nINSERT INTO target_table SELECT * FROM import_staging WHERE is_valid(data);\nTRUNCATE import_staging;  -- ready for next batch",
      "expected_impact": "2–10× write throughput improvement for staging/cache tables. Zero WAL overhead means no impact on replication lag or checkpoint pressure from these tables. On a system with 50% of writes to ephemeral tables, overall WAL volume can halve."
    },

      "explanation": "PostgreSQL 18 (expected 2025–2026) introduces a server-side query result cache that stores the output of expensive queries in shared memory. Unlike materialized views (manual refresh) or application caches (external system), the query cache is automatic and invalidated on table modifications. It is particularly effective for repeated identical queries that hit large tables with infrequent writes.",

    "diag_qp_or_condition": {
      "id": "diag_qp_or_condition",
      "type": "diagnostic",
      "metric": "OR Condition — Multi-Index Eligibility",
      "question": "Check whether the OR is blocking multi-index usage",
      "context": "When a <code>WHERE</code> clause uses <code>OR</code> across two <strong>different</strong> columns — e.g. <code>WHERE customer_id = 123 OR email = 'x@y.com'</code> — PostgreSQL often cannot use both indexes simultaneously and falls back to a <strong>Seq Scan</strong>. Run EXPLAIN and check whether you see a Seq Scan with a Filter containing your OR condition. If yes, rewriting as a UNION of two separate queries lets each branch use its own index independently.",
      "threshold": {
        "bad": "Seq Scan with Filter containing OR across different columns — indexes completely bypassed",
        "ok": "Bitmap OR using both indexes — better, but still doing two index scans and merging",
        "good": "Two separate Index Scans combined with Append/Unique — each branch optimal"
      },
      "sql": "-- Diagnose: does your OR cause a Seq Scan?\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT * FROM support_tickets\nWHERE customer_id = 12345\n   OR email_address = 'user@example.com';\n\n-- Look for:\n--   Seq Scan on support_tickets\n--     Filter: ((customer_id = 12345) OR (email_address = ...))\n-- That means neither index is being used.",
      "options": [
        {
          "label": "Seq Scan with OR Filter — indexes not used",
          "next": "rec_qp_union_or"
        },
        {
          "label": "Bitmap OR Scan — both indexes used but want better performance",
          "next": "rec_qp_union_or"
        },
        {
          "label": "Skip — show me the UNION rewrite directly",
          "next": "rec_qp_union_or",
          "skip": true
        }
      ]
    },
    "rec_qp_union_or": {
      "id": "rec_qp_union_or",
      "type": "recommendation",
      "title": "Rewrite OR as UNION to Enable Per-Branch Index Use",
      "explanation": "A <code>WHERE col_a = ? OR col_b = ?</code> query on different columns usually forces a sequential scan because the planner cannot use two separate indexes simultaneously for OR logic. The fix is to rewrite as a <code>UNION</code> — each branch becomes its own query with its own index, and PostgreSQL deduplicates the result. Use <code>UNION ALL</code> when duplicates are impossible (e.g. looking up by different unique columns) for even better performance, since it skips the deduplication step.",
      "when_not_to": "UNION adds a sort/deduplication step unless you use UNION ALL. If the same row could appear in both branches (the columns are not mutually exclusive), UNION is required. Also, this rewrite only helps when indexes exist on both columns — if neither column is indexed, add indexes first.",
      "sql_example": "-- Before: Seq Scan — OR prevents index use\nSELECT * FROM support_tickets\nWHERE customer_id = 12345\n   OR email_address = 'user@example.com';\n\n-- After: two Index Scans, results combined\n(SELECT * FROM support_tickets WHERE customer_id = 12345)\nUNION\n(SELECT * FROM support_tickets WHERE email_address = 'user@example.com');\n\n-- Verify the new plan:\nEXPLAIN (ANALYZE, BUFFERS)\n(SELECT * FROM support_tickets WHERE customer_id = 12345)\nUNION ALL  -- use ALL if no overlap is possible\n(SELECT * FROM support_tickets WHERE email_address = 'user@example.com');\n-- Look for: two Index Scan branches under an Append node",
      "tags": [
        "Query rewriting",
        "OR",
        "UNION",
        "Index use"
      ],
      "source": "QueryPlan 2"
    },
    "rec_qp_having_to_where": {
      "id": "rec_qp_having_to_where",
      "type": "recommendation",
      "title": "Move Non-Aggregate Filters from HAVING to WHERE",
      "explanation": "A <code>HAVING</code> clause is evaluated <strong>after</strong> aggregation — so if it filters on a non-aggregated column (e.g. <code>HAVING product_id IN (1,2,3)</code>), PostgreSQL first aggregates <em>all</em> rows in the table, then discards most of the result. This is enormously wasteful. Moving the condition to <code>WHERE</code> applies it <strong>before</strong> aggregation, feeding only the relevant rows into the expensive <code>HashAggregate</code> or <code>GroupAggregate</code> step. In EXPLAIN output, the symptom is a <code>HashAggregate</code> with very high actual rows, followed by a <code>Filter</code> that removes most of them.",
      "when_not_to": "You cannot move aggregate-function conditions to WHERE — e.g. <code>HAVING COUNT(*) > 5</code> must stay in HAVING because the count is only known after grouping. This optimization applies only to conditions on raw column values that do not reference aggregate functions.",
      "sql_example": "-- Before: aggregates ALL of sales, then filters away most of it\nSELECT product_id, COUNT(*) AS num_sales\nFROM sales\nGROUP BY product_id\nHAVING product_id IN (1, 2, 3);  -- non-aggregate filter\n\n-- After: filters FIRST, then aggregates only 3 products' rows\nSELECT product_id, COUNT(*) AS num_sales\nFROM sales\nWHERE product_id IN (1, 2, 3)   -- moved to WHERE\nGROUP BY product_id;\n\n-- Verify with EXPLAIN:\nEXPLAIN (ANALYZE, BUFFERS)\nSELECT product_id, COUNT(*) FROM sales\nWHERE product_id IN (1, 2, 3)\nGROUP BY product_id;\n-- Look for: small Index Scan feeding a small GroupAggregate\n-- (not a massive HashAggregate followed by a Filter)",
      "tags": [
        "Query rewriting",
        "HAVING",
        "WHERE",
        "Aggregation",
        "GroupBy"
      ],
      "source": "QueryPlan 2"
    },
    "diag_part_existing_table": {
      "id": "diag_part_existing_table",
      "type": "diagnostic",
      "metric": "Table Size & Query Patterns",
      "question": "Let's assess whether your existing table is a good migration candidate",
      "context": "Migrating an existing production table to a partitioned structure is a significant operation. The <strong>4-phase safe migration approach</strong> avoids any downtime: create the new partitioned table in parallel, copy data in batches, then do a quick rename cutover. Before starting, confirm the table is large enough to justify the complexity — partitioning adds overhead for small tables.",
      "threshold": {
        "bad": "Table > 100GB or > 100M rows AND queries filter on the partition key — strong candidate",

        {
          "label": "Skip — show me the migration steps directly",
